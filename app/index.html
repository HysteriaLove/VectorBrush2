<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VectorBrush</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #26282c;
    --panel: #303338;
    --panel-edge: #1c1e21;
    --text: #d8dade;
    --text-dim: #9a9da3;
    --accent: #4da3ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 13px/1.4 "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  #topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
  }
  #topbar .brand {
    font-weight: 600;
    letter-spacing: .4px;
    margin-right: 8px;
  }
  #topbar .brand span { color: var(--accent); }
  button {
    font: inherit;
    color: var(--text);
    background: #3c4046;
    border: 1px solid #24262a;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
  }
  button:hover { background: #474c53; }
  button:active { background: #2f3237; }
  button:disabled { opacity: .45; cursor: default; }
  .sep { width: 1px; align-self: stretch; background: var(--panel-edge); margin: 0 4px; }
  .spacer { flex: 1; }
  .ctl { display: flex; align-items: center; gap: 4px; color: var(--text-dim); font-size: 12px; }
  .ctl input[type="color"] {
    width: 28px; height: 24px; padding: 0; border: 1px solid #24262a;
    border-radius: 4px; background: #3c4046; cursor: pointer;
  }
  .ctl input[type="number"] {
    width: 52px; font: inherit; color: var(--text);
    background: #3c4046; border: 1px solid #24262a; border-radius: 4px; padding: 3px 6px;
  }
  #topbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #fileinfo { color: var(--text-dim); font-size: 12px; }

  #middle { flex: 1; display: flex; min-height: 0; }

  #tools {
    width: 46px;
    background: var(--panel);
    border-right: 1px solid var(--panel-edge);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 8px;
    gap: 6px;
  }
  #tools button {
    width: 34px; height: 34px;
    padding: 0;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #tools button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  #canvaswrap { flex: 1; position: relative; min-width: 0; }
  #stage-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #layerspanel {
    width: 168px; /* resizable via the grip; min/max enforced in JS */
    flex: none;
    background: var(--panel);
    border-left: 1px solid var(--panel-edge);
    display: flex; flex-direction: column;
    font-size: 12px;
    user-select: none;
    overflow-y: auto;
  }
  #panelgrip {
    flex: none; width: 8px; cursor: ew-resize;
    background: var(--panel);
    border-left: 1px solid var(--panel-edge);
    display: flex; align-items: center; justify-content: center;
  }
  #panelgrip::before {
    content: ""; width: 2px; height: 34px; border-radius: 2px;
    background: var(--text-dim); opacity: 0.5;
  }
  #panelgrip:hover, #panelgrip.dragging { background: #3d5a80; }
  /* section grips: drag to resize the list above (heights persist) */
  .vgrip {
    flex: none; height: 7px; cursor: ns-resize;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
    border-bottom: 1px solid var(--panel-edge);
    display: flex; align-items: center; justify-content: center;
  }
  .vgrip::before {
    content: ""; height: 2px; width: 34px; border-radius: 2px;
    background: var(--text-dim); opacity: 0.5;
  }
  .vgrip:hover, .vgrip.dragging { background: #3d5a80; }
  #scenebar {
    display: flex; gap: 4px; padding: 6px;
    border-bottom: 1px solid var(--panel-edge);
  }
  #scenebar select { flex: 1; min-width: 0; background: #2b2d31; color: var(--text); border: 1px solid var(--panel-edge); border-radius: 3px; }
  #layerhead {
    display: flex; align-items: center; gap: 2px;
    padding: 4px 6px; border-bottom: 1px solid var(--panel-edge);
    color: var(--text-dim);
  }
  #layerhead .spacer { flex: 1; }
  #layerspanel button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    width: 22px; height: 20px; font-size: 11px; line-height: 1;
    cursor: pointer; padding: 0;
  }
  #layerspanel button:hover { background: #3a3d42; }
  #layerlist { flex: none; overflow-y: auto; } /* height via its grip */
  .layerrow {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 6px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
  }
  .layerrow.active { background: #3d5a80; }
  .layerrow .toggle {
    width: 16px; text-align: center; cursor: pointer; opacity: 0.85;
  }
  .layerrow .toggle.off { opacity: 0.3; }
  .layerrow .lname {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 2DMaterials panel — fill styles with their deterministic cost badge */
  #mathead {
    display: flex; align-items: center; gap: 2px;
    padding: 4px 6px;
    border-top: 1px solid var(--panel-edge);
    border-bottom: 1px solid var(--panel-edge);
    color: var(--text-dim);
  }
  #mat-gpu { font-size: 10px; }
  #matlist { overflow-y: auto; } /* height via its grip */
  .matrow2 {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 6px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
  }
  .matrow2.active { background: #3d5a80; }
  .matrow2 .sw {
    width: 14px; height: 14px; border-radius: 2px;
    border: 1px solid var(--panel-edge); flex: none;
  }
  .matrow2 .mname { flex: 1; overflow: hidden; white-space: nowrap; }
  .matrow2 .badge {
    font-size: 10px; color: var(--text-dim); white-space: nowrap;
  }
  .matrow2 .badge.gpu { color: #e6a23c; }
  .matdivider {
    padding: 3px 6px; font-size: 10px; color: var(--text-dim);
    border-top: 1px solid var(--panel-edge);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  #matedit { padding: 6px; border-top: 1px solid var(--panel-edge); }
  #matedit.hidden { display: none; }
  #matedit label { display: inline-flex; align-items: center; gap: 4px; margin: 2px 4px 2px 0; }
  #matedit select, #matedit input[type="number"] {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
  }
  #matedit input[type="color"] { width: 26px; height: 18px; padding: 0; border: none; background: none; }
  .matrow.hidden { display: none; }
  /* matcap pipeline debug views: bump map, normal map, shaded result */
  #mat-debug-row { display: flex; gap: 6px; margin-top: 4px; }
  .matdbg { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .matdbg canvas {
    background:
      repeating-conic-gradient(#2b2d31 0 25%, #34373c 0 50%) 0 0 / 12px 12px;
    border: 1px solid var(--panel-edge); border-radius: 2px;
    image-rendering: pixelated;
  }
  .matdbg span { font-size: 9px; color: var(--text-dim); }
  #mat-profile {
    margin-top: 4px; font-size: 10px; line-height: 1.5;
    color: var(--text-dim); white-space: pre-wrap;
  }

  /* Actors panel (actors.js) + the symbol-edit breadcrumb */
  #actorhead {
    display: flex; align-items: center; gap: 2px;
    padding: 4px 6px;
    border-top: 1px solid var(--panel-edge);
    border-bottom: 1px solid var(--panel-edge);
    color: var(--text-dim);
  }
  #actorlist { overflow-y: auto; } /* height via its grip */
  .actrow {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 6px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
  }
  .actrow.active { background: #3d5a80; }
  .actrow .aname {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .actrow.posesub { padding-left: 20px; font-size: 11px; color: var(--text-dim); }
  .actrow.posesub.editing { color: #6cf; }
  .pthumb {
    width: 48px; height: 36px; flex: none;
    border: 1px solid var(--panel-edge); border-radius: 2px;
    background: #26282c; /* placeholder rung until the render streams in */
  }
  #editcrumb {
    position: absolute; top: 8px; left: 8px; z-index: 5;
    display: flex; align-items: center; gap: 8px;
    background: #16181be0; border: 1px solid var(--panel-edge);
    border-radius: 4px; padding: 4px 10px 4px 4px;
    color: var(--text); font-size: 12px;
  }
  #editcrumb.hidden { display: none; }
  #editcrumb button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    padding: 2px 8px; cursor: pointer;
  }
  #editcrumb button:hover { background: #3d5a80; }
  /* the app context menu (right-click is app-owned) */
  #appmenu {
    position: fixed; z-index: 200; min-width: 170px;
    background: #16181b; border: 1px solid var(--panel-edge);
    border-radius: 4px; padding: 3px;
    box-shadow: 0 6px 22px #000a;
    font-size: 12px; color: var(--text);
  }
  .appmenuitem { padding: 6px 12px; border-radius: 3px; cursor: pointer; }
  .appmenuitem:hover { background: #3d5a80; }

  #debugpanel {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--panel-edge);
    overflow-y: auto;
    padding: 10px;
    font: 11px/1.5 Consolas, "Cascadia Mono", monospace;
    color: var(--text);
  }
  #debugpanel.hidden { display: none; }
  /* The properties row keeps a CONSTANT height (controls gray out
     instead of hiding) so the canvas below never jumps. */
  #propbar {
    flex: none; height: 34px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 10px; overflow: hidden;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
  }
  #text-opts { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  #text-opts.inactive { opacity: 0.35; pointer-events: none; }
  #text-opts .txtstyle {
    width: 24px; height: 22px; padding: 0;
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px; cursor: pointer;
  }
  #text-opts .txtstyle.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #text-opts input[type=number] { width: 52px; }
  /* workspace bar — the project sections as tabs (Architecture §2) */
  #workspacebar {
    flex: none; height: 32px;
    display: flex; align-items: center; gap: 8px;
    padding: 0 8px;
    background: #1b1d20;
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
    user-select: none;
  }
  #workspacebar button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    height: 24px; padding: 0 10px; cursor: pointer;
  }
  #workspacebar button:hover { background: #3a3d42; }
  #ws-name {
    color: var(--text-dim); max-width: 160px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #ws-tabs { flex: 1; display: flex; gap: 2px; overflow-x: auto; }
  .wstab {
    flex: none; padding: 4px 12px; cursor: pointer;
    color: var(--text-dim); border-radius: 4px 4px 0 0;
    border: 1px solid transparent; border-bottom: none;
  }
  .wstab:hover { color: var(--text); background: #26282c; }
  .wstab.active {
    color: #6cf; background: var(--panel);
    border-color: var(--panel-edge);
  }
  /* stub workspaces: future sections mount here; the editor hides */
  #workspace-stub { display: none; }
  body.ws-stub-mode #propbar,
  body.ws-stub-mode #timebar,
  body.ws-stub-mode #middle { display: none; }
  body.ws-stub-mode #workspace-stub {
    display: flex; flex: 1;
    align-items: center; justify-content: center;
    background: #26282c; color: var(--text);
    text-align: center;
  }
  #ws-stub-title { color: #6cf; margin-bottom: 8px; }
  #ws-stub-note { color: var(--text-dim); max-width: 480px; line-height: 1.6; }

  /* mounted workspaces (brainstorm, writing, …): the active container
     covers the editor chrome */
  body.ws-mount-mode #propbar,
  body.ws-mount-mode #timebar,
  body.ws-mount-mode #middle { display: none; }
  #brainstorm-board, #writing-view, #pitch-view, #boards-view { display: none; }
  #brainstorm-board.wsactive, #writing-view.wsactive, #pitch-view.wsactive,
  #boards-view.wsactive {
    display: flex; flex: 1; flex-direction: column; min-height: 0;
  }

  /* Boards workspace (boards.js) — beats, panels, animatic */
  #bd-tools {
    flex: none; height: 30px;
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
  }
  #bd-tools button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    height: 22px; padding: 0 8px; cursor: pointer;
  }
  #bd-tools button:hover { background: #3a3d42; }
  #bd-tools button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #bd-tools select {
    max-width: 220px; background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px; height: 22px;
  }
  #bd-tools input[type="number"] {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
  }
  #bd-hint { color: var(--text-dim); font-size: 11px; margin-left: auto; }
  #bd-toolstrip { display: inline-flex; gap: 2px; margin-left: 4px; }
  #bd-body { flex: 1; min-height: 0; display: flex; }
  #bd-stage { flex: 1; width: 100%; height: 100%; touch-action: none; }
  #bd-caption {
    flex: none; margin: 0; resize: none;
    background: #2b2d31; color: var(--text);
    border: none; border-top: 1px solid var(--panel-edge);
    padding: 6px 10px; font: 13px/1.4 system-ui, sans-serif;
    outline: none;
  }
  #bd-strip {
    flex: none; height: 74px;
    display: flex; gap: 6px; align-items: center;
    padding: 0 10px; overflow-x: auto;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
  }
  #boards-view.animatic #bd-caption,
  #boards-view.animatic #bd-strip { display: none; }
  #bd-lines {
    flex: none; width: 220px; overflow-y: auto;
    background: var(--panel);
    border-left: 1px solid var(--panel-edge);
    font-size: 12px; padding: 6px;
  }
  .bdline {
    display: flex; align-items: flex-start; gap: 4px;
    background: #2b2d31; border: 1px solid var(--panel-edge);
    border-radius: 3px; padding: 4px 6px; margin-bottom: 4px;
    color: var(--text);
  }
  .bdline.missing { color: #e6a23c; }
  .bdline .aname { flex: 1; white-space: pre-wrap; word-break: break-word; }
  .bdline button {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; padding: 0 2px;
  }
  #bd-beats {
    flex: none; max-height: 190px; overflow-y: auto;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
    padding: 4px 10px;
  }
  .bdbeat { margin-bottom: 4px; }
  .bdbeathead {
    display: flex; align-items: center; gap: 4px;
    color: var(--text-dim); font-size: 11px; padding: 2px 0;
  }
  .bdbeathead .aname { color: var(--text); }
  .bdbeathead button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    width: 20px; height: 18px; font-size: 10px; cursor: pointer; padding: 0;
  }
  .bdpanels { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 4px; }
  #boards-view.animatic #bd-tools,
  #boards-view.animatic #bd-beats,
  #boards-view.animatic #bd-lines { display: none; }

  /* Pitch workspace (pitch.js) — sequential slide deck */
  #pt-tools {
    flex: none; height: 30px;
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
  }
  #pt-tools button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    height: 22px; padding: 0 8px; cursor: pointer;
  }
  #pt-tools button:hover { background: #3a3d42; }
  #pt-tools button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #pt-hint { color: var(--text-dim); font-size: 11px; margin-left: auto; }
  #pt-toolstrip { display: inline-flex; gap: 2px; margin-left: 4px; }
  #pt-body { flex: 1; min-height: 0; display: flex; position: relative; }
  #pt-stage { flex: 1; width: 100%; height: 100%; touch-action: none; }
  #pt-texts { position: absolute; inset: 0; }
  #pt-texts.nohit { pointer-events: none; }
  .pttext {
    position: absolute; max-width: 70%;
    color: #1b1b1b; font-family: system-ui, sans-serif;
    line-height: 1.25; white-space: pre-wrap; cursor: grab;
    user-select: none; -webkit-user-select: none;
  }
  .pttext.editing, .pttext[contenteditable="true"] {
    outline: 1px dashed #3d5a80; cursor: text;
    user-select: text; -webkit-user-select: text;
    background: #ffffffc0; min-width: 40px;
  }
  #pt-strip {
    flex: none; height: 74px;
    display: flex; gap: 6px; align-items: center;
    padding: 0 10px; overflow-x: auto;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
  }
  .ptthumb {
    flex: none; position: relative; cursor: pointer;
    border: 2px solid var(--panel-edge); border-radius: 3px;
    background: #1b1d20; line-height: 0;
  }
  .ptthumb.cur { border-color: var(--accent); }
  .ptthumb span {
    position: absolute; left: 3px; bottom: 3px;
    font-size: 10px; line-height: 1; color: #fff;
    background: #000a; border-radius: 2px; padding: 1px 4px;
  }
  #pitch-view.presenting #pt-tools,
  #pitch-view.presenting #pt-strip { display: none; }
  #bb-tools {
    flex: none; height: 30px;
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
  }
  #bb-tools button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    height: 22px; padding: 0 8px; cursor: pointer;
  }
  #bb-tools button:hover { background: #3a3d42; }
  #bb-tools button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #bb-hint { color: var(--text-dim); font-size: 11px; margin-left: auto; }
  #bb-canvas {
    flex: 1; position: relative; overflow: hidden;
    background: #26282c;
    background-image: radial-gradient(#33363b 1px, transparent 1px);
    background-size: 24px 24px;
    touch-action: none; user-select: none;
  }
  #bb-layer { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
  .bbitem {
    position: absolute;
    background: #fff9d0; color: #222;
    border: 1px solid #00000040; border-radius: 3px;
    box-shadow: 0 2px 8px #00000050;
  }
  .bbitem.bb-image { background: #1b1d20; padding: 0; }
  .bbitem.bb-image img { width: 100%; height: 100%; object-fit: fill; display: block; }
  .bbitem.bb-sketch { background: #fffef2; }
  .bbitem.bb-sketch canvas { width: 100%; height: 100%; display: block; }
  .bbtext {
    width: 100%; height: 100%; padding: 8px;
    font: 13px/1.4 system-ui, sans-serif;
    overflow: hidden; white-space: pre-wrap; word-break: break-word;
    outline: none; cursor: default;
  }
  .bbtext[contenteditable="true"] {
    cursor: text; background: #fffce0;
    user-select: text; -webkit-user-select: text; /* the board disables selection */
  }
  .bbitem.selected { outline: 2px solid #3d5a80; outline-offset: 1px; }
  #bb-ink { position: absolute; left: 0; top: 0; pointer-events: none; }
  #bb-layer.nohit { pointer-events: none; }
  #bb-marquee {
    position: absolute; pointer-events: none;
    border: 1px dashed #6cf; background: #6cf2;
  }
  #bb-toolstrip { display: inline-flex; gap: 2px; margin-left: 4px; }
  #bb-toolstrip button.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  /* Writing workspace (writing.js) — documents + dialogue Lines */
  #wr-tools {
    flex: none; height: 30px;
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
  }
  #wr-tools button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    height: 22px; padding: 0 8px; cursor: pointer;
  }
  #wr-tools button:hover { background: #3a3d42; }
  #wr-hint { color: var(--text-dim); font-size: 11px; margin-left: auto; }
  #wr-body { flex: 1; display: flex; min-height: 0; }
  #wr-docs {
    width: 180px; flex: none; overflow-y: auto;
    background: var(--panel);
    border-right: 1px solid var(--panel-edge);
    font-size: 12px;
  }
  .wrdoc {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 8px; cursor: pointer; color: var(--text);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .wrdoc.active { background: #3d5a80; }
  .wrdoc .aname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wrdoc button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    width: 20px; height: 18px; font-size: 10px; cursor: pointer; padding: 0;
  }
  #wr-editor { flex: 1; overflow-y: auto; background: #26282c; padding: 24px; }
  .wrempty { color: var(--text-dim); text-align: center; padding: 40px; }
  .wrpage {
    max-width: 680px; margin: 0 auto; min-height: 420px;
    background: #f4f1e8; color: #1b1b1b;
    border-radius: 4px; padding: 36px 56px 48px;
    box-shadow: 0 4px 18px #00000070;
  }
  .wrblock { position: relative; margin-bottom: 10px; }
  .wrblock .wrctl {
    position: absolute; right: -46px; top: 0;
    display: none; flex-direction: column; gap: 2px;
  }
  .wrblock:hover .wrctl { display: flex; }
  .wrctl button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    width: 22px; height: 18px; font-size: 10px; cursor: pointer; padding: 0;
  }
  .wredit { outline: none; min-height: 1.3em; user-select: text; -webkit-user-select: text; }
  .wrbody { min-height: 360px; white-space: pre-wrap; }
  .wredit:empty::before { content: attr(data-ph); color: #9a988c; }
  .wrtext { font: 14px/1.5 Georgia, "Times New Roman", serif; }
  .wr-line { padding: 0 44px; }
  .wrchar {
    text-align: center; font: 700 12px/1.5 system-ui, sans-serif;
    text-transform: uppercase; letter-spacing: 0.06em; color: #3a3a3a;
  }
  .wrdial { font: 14px/1.45 Georgia, "Times New Roman", serif; margin: 0 28px; }
  .bbdel {
    position: absolute; top: -9px; right: -9px; width: 18px; height: 18px;
    display: none; align-items: center; justify-content: center;
    background: #c0392b; color: #fff; border-radius: 50%;
    font-size: 10px; cursor: pointer;
  }
  .bbresize {
    position: absolute; right: -6px; bottom: -6px; width: 12px; height: 12px;
    display: none;
    background: #3d5a80; border: 1px solid #fff8; border-radius: 2px;
    cursor: nwse-resize;
  }
  .bbitem:hover .bbdel, .bbitem:hover .bbresize { display: flex; }

  /* timeline rail (Sequence/Roughs) — frame columns of the active layer */
  #timebar {
    flex: none; height: 30px;
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
    user-select: none;
  }
  #timebar button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    height: 22px; min-width: 24px; cursor: pointer; padding: 0 4px;
  }
  #timebar button:hover { background: #3a3d42; }
  #timebar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #tl-counter { color: var(--text-dim); min-width: 52px; text-align: center; }
  #tl-frames {
    flex: 1; display: flex; align-items: center; gap: 1px;
    overflow-x: auto; height: 100%;
  }
  .tlcell {
    flex: none; width: 13px; height: 18px;
    background: #2b2d31; border: 1px solid var(--panel-edge);
    border-radius: 2px; cursor: pointer;
  }
  .tlcell.filled { background: #45484e; }
  .tlcell.hold { opacity: 0.45; }
  .tlcell.cur { border-color: var(--accent); background: var(--accent); }

  #ctxmenu {
    position: absolute; z-index: 20; min-width: 180px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 4px; box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    font-size: 12px; color: var(--text); padding: 4px 0;
  }
  #ctxmenu.hidden { display: none; }
  .ctxitem { padding: 6px 14px; cursor: pointer; }
  .ctxitem:hover { background: #3d5a80; }
  #debugpanel h4 {
    font: 600 11px/1.4 "Segoe UI", sans-serif;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin: 10px 0 4px;
  }
  #debugpanel h4:first-child { margin-top: 0; }
  #debugpanel h5 {
    font: 600 11px/1.4 "Segoe UI", sans-serif;
    color: var(--text-dim);
    margin: 8px 0 2px;
  }
  #debugpanel table { border-collapse: collapse; width: 100%; }
  #debugpanel td { padding: 1px 6px 1px 0; vertical-align: top; white-space: nowrap; }
  #debugpanel td:first-child { color: var(--text-dim); }
  #debugpanel .rec { color: #e24fd8; margin-bottom: 4px; }
  #debugpanel .dim { color: var(--text-dim); }
  #debugpanel .sw {
    display: inline-block;
    width: 10px; height: 10px;
    border: 1px solid #000;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: -1px;
  }

  #statusbar {
    display: flex;
    gap: 18px;
    padding: 4px 10px;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
    color: var(--text-dim);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
  }
  #status-msg { color: var(--text); }
  /* OperationEstimator badge (debug mode) */
  #status-est.est-ok { color: #7fbf7f; }
  #status-est.est-watch { color: #d4c05a; }
  #status-est.est-warn { color: #e6a23c; }
  #status-est.est-hot { color: #ff7a7a; font-weight: bold; }

  #toast {
    position: absolute;
    left: 50%; bottom: 40px;
    transform: translateX(-50%);
    background: #16181b;
    border: 1px solid #000;
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
    max-width: 70%;
  }
  #toast.show { opacity: 1; }

  /* homescreen shell (shell.js) — covers the editor on #home */
  #home-screen {
    position: fixed; inset: 0;
    background: #26282c;
    z-index: 60;
    display: none;
    justify-content: center;
    align-items: flex-start;
    overflow: auto;
  }
  #home-panel { margin-top: 60px; width: 560px; max-width: 92vw; }
  #home-brand { font-size: 22px; color: #eee; margin-bottom: 14px; }
  #home-brand span { color: #6cf; }
  #home-brand em { color: #888; font-style: normal; font-size: 13px; }
  #home-new { margin-bottom: 12px; }
  .home-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 6px;
    background: #2e3136; border: 1px solid #3a3d42; border-radius: 4px;
  }
  .home-row .nm { flex: 1; color: #ddd; cursor: pointer; }
  .home-row .nm:hover { color: #6cf; }
  .home-row .when { color: #777; font-size: 11px; }
  #home-empty { color: #888; padding: 18px 4px; }
  #home-hint { color: #666; font-size: 11px; margin-top: 14px; }
</style>
</head>
<body>
  <div id="workspacebar">
    <button id="ws-home" title="Save and return to the projects menu">◀ Projects</button>
    <span id="ws-name">scratch</span>
    <div id="ws-tabs"></div>
    <button id="ws-save" title="Save the project package now">Save</button>
  </div>
  <div id="home-screen">
    <div id="home-panel">
      <div id="home-brand">Vector<span>Brush</span> <em>· projects</em></div>
      <button id="home-new">＋ New Project</button>
      <button id="home-import">Import .y2kproj…</button>
      <input type="file" id="home-import-file" accept=".y2kproj,.zip"
             style="display:none">
      <div id="home-projects"></div>
      <div id="home-hint">Rung-0 prototype shell — projects autosave to
        this browser's package store as journaled ops; export/import
        moves them as .y2kproj packages.</div>
    </div>
  </div>
  <div id="topbar">
    <div class="brand">Vector<span>Brush</span></div>
    <button id="btn-open" title="Open .swf or .y2kvector (legacy .vbd) (Ctrl+O)">Open…</button>
    <button id="btn-save" title="Save as compact .y2kvector">Save .y2kvector</button>
    <button id="btn-save-swf" title="Export as SWF v7 (opens in Flash MX 2004)">Save .swf</button>
    <button id="btn-log" title="Export the action log (deterministic bug repro)">Save log</button>
    <div class="sep"></div>
    <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>↶</button>
    <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>↷</button>
    <button id="btn-delete" title="Delete selection (Del)">🗑</button>
    <div class="sep"></div>
    <label class="ctl" title="Stroke color">
      ✎<input type="color" id="stroke-color" value="#000000">
    </label>
    <label class="ctl" title="Stroke width (px)">
      <input type="number" id="stroke-width" value="1" min="0.05" max="10" step="0.25">px
    </label>
    <label class="ctl" title="Fill color (brush + bucket)">
      🪣<input type="color" id="fill-color" value="#66ccff">
    </label>
    <label class="ctl" title="Brush size (px)">
      🖌<input type="number" id="brush-size" value="10" min="1" max="100" step="1">px
    </label>
    <label class="ctl" title="Eraser size (px)">
      🧽<input type="number" id="eraser-size" value="20" min="2" max="100" step="2">px
    </label>
    <div class="sep"></div>
    <button id="btn-zoom-out" title="Zoom out">−</button>
    <button id="btn-zoom-100" title="Zoom to 100%">100%</button>
    <button id="btn-zoom-in" title="Zoom in">+</button>
    <button id="btn-fit" title="Fit stage in window">Fit</button>
    <div class="sep"></div>
    <button id="btn-debug" title="Vector debug view (D)">Debug</button>
    <div class="spacer"></div>
    <div id="fileinfo">no file loaded</div>
  </div>

  <div id="propbar">
    <span id="text-opts" class="inactive">
      <label class="ctl" title="Font family">
        <select id="text-font" style="max-width:130px"></select>
      </label>
      <label class="ctl" title="Text size (pt)">
        <input type="number" id="text-size" value="24" min="4" max="200" step="1">pt
      </label>
      <label class="ctl" title="Text color">
        <input type="color" id="text-color" value="#000000">
      </label>
      <button id="text-bold" class="txtstyle" title="Bold"><b>B</b></button>
      <button id="text-italic" class="txtstyle" title="Italic"><i>I</i></button>
      <button id="text-align-l" class="txtstyle" title="Align left">⯇</button>
      <button id="text-align-c" class="txtstyle" title="Align center">☰</button>
      <button id="text-align-r" class="txtstyle" title="Align right">⯈</button>
      <label class="ctl" title="Letter spacing (px)">
        A↔<input type="number" id="text-spacing" value="0" min="-20" max="60" step="0.5">
      </label>
      <label class="ctl" title="X (px)">X<input type="number" id="text-x" step="1" style="width:56px"></label>
      <label class="ctl" title="Y (px)">Y<input type="number" id="text-y" step="1" style="width:56px"></label>
      <label class="ctl" title="Box width (px) — text re-wraps">W<input type="number" id="text-w" step="1" min="10" style="width:56px"></label>
      <label class="ctl" title="Box height (px) — grows the box">H<input type="number" id="text-h" step="1" min="1" style="width:56px"></label>
      <button id="btn-fonts" title="List the system's fonts (or drop a .ttf on the canvas)">Fonts…</button>
    </span>
    <label class="ctl" title="Selection rotation (degrees) — type 0 to snap upright">
      ⟳<input type="number" id="sel-rotation" value="0" step="1" style="width:56px" disabled>°
    </label>
  </div>

  <div id="timebar">
    <button id="tl-play" title="Play / stop (Enter)">▶</button>
    <button id="tl-add" title="Add a blank frame to the active layer (F7)">＋</button>
    <button id="tl-del" title="Remove the current frame from the active layer">－</button>
    <button id="tl-onion" title="Onion skin (previous/next frame ghosts)">🧅</button>
    <label class="ctl" title="Frames per second">
      <input type="number" id="tl-fps" value="24" min="1" max="120" step="1"
             style="width:44px"> fps
    </label>
    <span id="tl-counter">1 / 1</span>
    <div id="tl-frames"></div>
  </div>

  <div id="workspace-stub">
    <div>
      <h2 id="ws-stub-title"></h2>
      <p id="ws-stub-note"></p>
    </div>
  </div>

  <div id="brainstorm-board"></div>
  <div id="pitch-view"></div>
  <div id="writing-view"></div>
  <div id="boards-view"></div>

  <div id="middle">
    <div id="tools">
      <button data-tool="select" class="active" title="Selection tool (V)">➤</button>
      <button data-tool="transform" title="Free Transform (Q)">▣</button>
      <button data-tool="lasso" title="Lasso (L)">➰</button>
      <button data-tool="pencil" title="Pencil tool (P)">✎</button>
      <button data-tool="line" title="Line tool (N)">╱</button>
      <button data-tool="oval" title="Oval tool (O)">◯</button>
      <button data-tool="rect" title="Rectangle tool (R)">▭</button>
      <button data-tool="text" title="Text tool (T)">T</button>
      <button data-tool="brush" title="Brush (B)">🖌</button>
      <button data-tool="bucket" title="Paint bucket (K)">🪣</button>
      <button data-tool="eraser" title="Eraser (E)">🧽</button>
    </div>
    <div id="canvaswrap">
      <canvas id="stage-canvas"></canvas>
      <div id="editcrumb" class="hidden">
        <button id="crumb-back" title="Back to the scene">◀ Scene</button>
        <span id="crumb-label"></span>
      </div>
      <div id="ctxmenu" class="hidden"></div>
      <div id="toast"></div>
    </div>
    <div id="panelgrip" title="Drag to resize the panel"></div>
    <div id="layerspanel">
      <div id="scenebar">
        <select id="scene-select" title="Scene"></select>
        <button id="btn-scene-add" title="Add scene">+</button>
      </div>
      <div id="layerhead">
        <span>Layers</span>
        <span class="spacer"></span>
        <button id="btn-layer-add" title="New layer">+</button>
        <button id="btn-layer-del" title="Delete layer">−</button>
        <button id="btn-layer-up" title="Move layer up">▲</button>
        <button id="btn-layer-down" title="Move layer down">▼</button>
      </div>
      <div id="layerlist"></div>
      <div class="vgrip" id="grip-layers" title="Drag to resize the layer list"></div>
      <div id="mathead">
        <span>Materials</span>
        <span class="spacer"></span>
        <button id="btn-mat-add" title="New material (global — usable on every layer)">+</button>
        <span id="mat-gpu" title="WebGPU availability for gpu-class materials"></span>
      </div>
      <div id="matlist"></div>
      <div class="vgrip" id="grip-mats" title="Drag to resize the material list"></div>
      <div id="matedit" class="hidden">
        <label>Type
          <select id="mat-type"></select>
        </label>
        <div class="matrow" id="mat-color-row">
          <label>Color <input type="color" id="mat-color"></label>
        </div>
        <div class="matrow hidden" id="mat-grad-row">
          <label>A <input type="color" id="mat-grad-a"></label>
          <label>B <input type="color" id="mat-grad-b"></label>
          <label>∠ <input type="number" id="mat-grad-angle" step="15" style="width:44px"></label>
        </div>
        <div class="matrow hidden" id="mat-matcap-row">
          <label>Bump <input type="number" id="mat-bump" min="0" max="400" step="10" style="width:48px"></label>
          <label>Blur <input type="number" id="mat-blur" min="0" max="16" step="1" style="width:40px"></label>
          <label>Res
            <select id="mat-res">
              <option value="0.5">0.5×</option>
              <option value="1" selected>1×</option>
              <option value="2">2×</option>
            </select>
          </label>
        </div>
        <div class="matrow hidden" id="mat-matcap-tex-row">
          <label>Matcap <select id="mat-matcap-sel"></select></label>
          <button id="mat-matcap-load" title="Load a matcap image (embedded in the document)">Load…</button>
          <input type="file" id="mat-matcap-file" accept="image/*" style="display:none">
        </div>
        <div class="matrow hidden" id="mat-debug-row">
          <div class="matdbg"><canvas id="mat-dbg-bump" width="84" height="64"></canvas><span>bump</span></div>
          <div class="matdbg"><canvas id="mat-dbg-normal" width="84" height="64"></canvas><span>normal</span></div>
          <div class="matdbg"><canvas id="mat-dbg-result" width="84" height="64"></canvas><span>result</span></div>
        </div>
        <div id="mat-profile"></div>
      </div>
      <div id="actorhead">
        <span>Library</span>
        <span class="spacer"></span>
        <button id="btn-actor-add" title="New actor">🎭+</button>
        <button id="btn-bg-add" title="New background object">🖼+</button>
        <button id="btn-actor-import" title="Import .y2kactor">⭱</button>
        <input type="file" id="actor-import-file" accept=".y2kactor"
               style="display:none">
      </div>
      <div id="actorlist"></div>
      <div class="vgrip" id="grip-actors" title="Drag to resize the actor list"></div>
    </div>
    <div id="debugpanel" class="hidden">
      <div id="dbg-est"></div>
      <div id="dbg-edge"></div>
      <div id="dbg-stream"></div>
      <div id="dbg-styles"></div>
    </div>
  </div>

  <div id="statusbar">
    <span id="status-doc">—</span>
    <span id="status-pos"></span>
    <span id="status-zoom"></span>
    <span id="status-est" title="OperationEstimator (debug)"></span>
    <span class="spacer"></span>
    <span id="status-msg"></span>
  </div>

  <input type="file" id="file-input" accept=".swf,.y2kvector,.vbd,.ttf,.ttc" style="display:none">

  <script src="js/bitio.js"></script>
  <script src="js/doc.js"></script>
  <script src="js/streaming.js"></script>
  <script src="js/geom.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/matcap.js"></script>
  <script src="js/operation-estimator.js"></script>
  <script src="js/swf.js"></script>
  <script src="js/trace.js"></script>
  <script src="js/render.js"></script>
  <script src="js/y2kvector.js"></script>
  <script src="js/swfwrite.js"></script>
  <script src="js/fit.js"></script>
  <script src="js/merge.js"></script>
  <script src="js/faces.js"></script>
  <script src="js/normalize.js"></script>
  <script src="js/bucket.js"></script>
  <script src="js/swath.js"></script>
  <script src="lib/paper-core.min.js"></script>
  <script src="js/paperglue.js"></script>
  <script src="js/mask.js"></script>
  <script src="js/eraser.js"></script>
  <script src="js/brush.js"></script>
  <script src="js/planarity.js"></script>
  <script src="js/journal.js"></script>
  <script src="js/history.js"></script>
  <script src="js/debug.js"></script>
  <script src="js/pencil.js"></script>
  <script src="js/shapes.js"></script>
  <script src="js/arrow.js"></script>
  <script src="js/transform.js"></script>
  <script src="js/lasso.js"></script>
  <script src="js/ttf.js"></script>
  <script src="js/project.js"></script>
  <script src="js/actors.js"></script>
  <script src="js/library.js"></script>
  <script src="js/thumbs.js"></script>
  <script src="js/brainstorm.js"></script>
  <script src="js/pitch.js"></script>
  <script src="js/writing.js"></script>
  <script src="js/boards.js"></script>
  <script src="js/text.js"></script>
  <script src="js/fonts-builtin.js"></script>
  <script src="js/session.js"></script>
  <script src="js/packagestore.js"></script>
  <script src="lib/pixi.min.js"></script>
  <script src="js/pixi-render.js"></script>
  <script src="js/main.js"></script>
  <script src="js/shell.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VectorBrush</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #26282c;
    --panel: #303338;
    --panel-edge: #1c1e21;
    --text: #d8dade;
    --text-dim: #9a9da3;
    --accent: #4da3ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 13px/1.4 "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  #topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
  }
  #topbar .brand {
    font-weight: 600;
    letter-spacing: .4px;
    margin-right: 8px;
  }
  #topbar .brand span { color: var(--accent); }
  button {
    font: inherit;
    color: var(--text);
    background: #3c4046;
    border: 1px solid #24262a;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
  }
  button:hover { background: #474c53; }
  button:active { background: #2f3237; }
  button:disabled { opacity: .45; cursor: default; }
  .sep { width: 1px; align-self: stretch; background: var(--panel-edge); margin: 0 4px; }
  .spacer { flex: 1; }
  .ctl { display: flex; align-items: center; gap: 4px; color: var(--text-dim); font-size: 12px; }
  .ctl input[type="color"] {
    width: 28px; height: 24px; padding: 0; border: 1px solid #24262a;
    border-radius: 4px; background: #3c4046; cursor: pointer;
  }
  .ctl input[type="number"] {
    width: 52px; font: inherit; color: var(--text);
    background: #3c4046; border: 1px solid #24262a; border-radius: 4px; padding: 3px 6px;
  }
  #topbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #fileinfo { color: var(--text-dim); font-size: 12px; }

  #middle { flex: 1; display: flex; min-height: 0; }

  #tools {
    width: 46px;
    background: var(--panel);
    border-right: 1px solid var(--panel-edge);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 8px;
    gap: 6px;
  }
  #tools button {
    width: 34px; height: 34px;
    padding: 0;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #tools button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  #canvaswrap { flex: 1; position: relative; min-width: 0; }
  #stage-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #layerspanel {
    width: 168px;
    background: var(--panel);
    border-left: 1px solid var(--panel-edge);
    display: flex; flex-direction: column;
    font-size: 12px;
    user-select: none;
  }
  #scenebar {
    display: flex; gap: 4px; padding: 6px;
    border-bottom: 1px solid var(--panel-edge);
  }
  #scenebar select { flex: 1; min-width: 0; background: #2b2d31; color: var(--text); border: 1px solid var(--panel-edge); border-radius: 3px; }
  #layerhead {
    display: flex; align-items: center; gap: 2px;
    padding: 4px 6px; border-bottom: 1px solid var(--panel-edge);
    color: var(--text-dim);
  }
  #layerhead .spacer { flex: 1; }
  #layerspanel button {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
    width: 22px; height: 20px; font-size: 11px; line-height: 1;
    cursor: pointer; padding: 0;
  }
  #layerspanel button:hover { background: #3a3d42; }
  #layerlist { flex: 1; overflow-y: auto; }
  .layerrow {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 6px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
  }
  .layerrow.active { background: #3d5a80; }
  .layerrow .toggle {
    width: 16px; text-align: center; cursor: pointer; opacity: 0.85;
  }
  .layerrow .toggle.off { opacity: 0.3; }
  .layerrow .lname {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 2DMaterials panel — fill styles with their deterministic cost badge */
  #mathead {
    display: flex; align-items: center; gap: 2px;
    padding: 4px 6px;
    border-top: 1px solid var(--panel-edge);
    border-bottom: 1px solid var(--panel-edge);
    color: var(--text-dim);
  }
  #mat-gpu { font-size: 10px; }
  #matlist { max-height: 150px; overflow-y: auto; }
  .matrow2 {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 6px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
  }
  .matrow2.active { background: #3d5a80; }
  .matrow2 .sw {
    width: 14px; height: 14px; border-radius: 2px;
    border: 1px solid var(--panel-edge); flex: none;
  }
  .matrow2 .mname { flex: 1; overflow: hidden; white-space: nowrap; }
  .matrow2 .badge {
    font-size: 10px; color: var(--text-dim); white-space: nowrap;
  }
  .matrow2 .badge.gpu { color: #e6a23c; }
  #matedit { padding: 6px; border-top: 1px solid var(--panel-edge); }
  #matedit.hidden { display: none; }
  #matedit label { display: inline-flex; align-items: center; gap: 4px; margin: 2px 4px 2px 0; }
  #matedit select, #matedit input[type="number"] {
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px;
  }
  #matedit input[type="color"] { width: 26px; height: 18px; padding: 0; border: none; background: none; }
  .matrow.hidden { display: none; }
  /* matcap pipeline debug views: bump map, normal map, shaded result */
  #mat-debug-row { display: flex; gap: 6px; margin-top: 4px; }
  .matdbg { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .matdbg canvas {
    background:
      repeating-conic-gradient(#2b2d31 0 25%, #34373c 0 50%) 0 0 / 12px 12px;
    border: 1px solid var(--panel-edge); border-radius: 2px;
    image-rendering: pixelated;
  }
  .matdbg span { font-size: 9px; color: var(--text-dim); }
  #mat-profile {
    margin-top: 4px; font-size: 10px; line-height: 1.5;
    color: var(--text-dim); white-space: pre-wrap;
  }

  #debugpanel {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--panel-edge);
    overflow-y: auto;
    padding: 10px;
    font: 11px/1.5 Consolas, "Cascadia Mono", monospace;
    color: var(--text);
  }
  #debugpanel.hidden { display: none; }
  /* The properties row keeps a CONSTANT height (controls gray out
     instead of hiding) so the canvas below never jumps. */
  #propbar {
    flex: none; height: 34px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 10px; overflow: hidden;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    font-size: 12px; color: var(--text);
  }
  #text-opts { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  #text-opts.inactive { opacity: 0.35; pointer-events: none; }
  #text-opts .txtstyle {
    width: 24px; height: 22px; padding: 0;
    background: #2b2d31; color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 3px; cursor: pointer;
  }
  #text-opts .txtstyle.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #text-opts input[type=number] { width: 52px; }
  #ctxmenu {
    position: absolute; z-index: 20; min-width: 180px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 4px; box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    font-size: 12px; color: var(--text); padding: 4px 0;
  }
  #ctxmenu.hidden { display: none; }
  .ctxitem { padding: 6px 14px; cursor: pointer; }
  .ctxitem:hover { background: #3d5a80; }
  #debugpanel h4 {
    font: 600 11px/1.4 "Segoe UI", sans-serif;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin: 10px 0 4px;
  }
  #debugpanel h4:first-child { margin-top: 0; }
  #debugpanel h5 {
    font: 600 11px/1.4 "Segoe UI", sans-serif;
    color: var(--text-dim);
    margin: 8px 0 2px;
  }
  #debugpanel table { border-collapse: collapse; width: 100%; }
  #debugpanel td { padding: 1px 6px 1px 0; vertical-align: top; white-space: nowrap; }
  #debugpanel td:first-child { color: var(--text-dim); }
  #debugpanel .rec { color: #e24fd8; margin-bottom: 4px; }
  #debugpanel .dim { color: var(--text-dim); }
  #debugpanel .sw {
    display: inline-block;
    width: 10px; height: 10px;
    border: 1px solid #000;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: -1px;
  }

  #statusbar {
    display: flex;
    gap: 18px;
    padding: 4px 10px;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
    color: var(--text-dim);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
  }
  #status-msg { color: var(--text); }
  /* OperationEstimator badge (debug mode) */
  #status-est.est-ok { color: #7fbf7f; }
  #status-est.est-watch { color: #d4c05a; }
  #status-est.est-warn { color: #e6a23c; }
  #status-est.est-hot { color: #ff7a7a; font-weight: bold; }

  #toast {
    position: absolute;
    left: 50%; bottom: 40px;
    transform: translateX(-50%);
    background: #16181b;
    border: 1px solid #000;
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
    max-width: 70%;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
  <div id="topbar">
    <div class="brand">Vector<span>Brush</span></div>
    <button id="btn-open" title="Open .swf or .vbd (Ctrl+O)">Open…</button>
    <button id="btn-save" title="Save as compact .vbd">Save .vbd</button>
    <button id="btn-save-swf" title="Export as SWF v7 (opens in Flash MX 2004)">Save .swf</button>
    <button id="btn-log" title="Export the action log (deterministic bug repro)">Save log</button>
    <div class="sep"></div>
    <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>↶</button>
    <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>↷</button>
    <button id="btn-delete" title="Delete selection (Del)">🗑</button>
    <div class="sep"></div>
    <label class="ctl" title="Stroke color">
      ✎<input type="color" id="stroke-color" value="#000000">
    </label>
    <label class="ctl" title="Stroke width (px)">
      <input type="number" id="stroke-width" value="1" min="0.05" max="10" step="0.25">px
    </label>
    <label class="ctl" title="Fill color (brush + bucket)">
      🪣<input type="color" id="fill-color" value="#66ccff">
    </label>
    <label class="ctl" title="Brush size (px)">
      🖌<input type="number" id="brush-size" value="10" min="1" max="100" step="1">px
    </label>
    <label class="ctl" title="Eraser size (px)">
      🧽<input type="number" id="eraser-size" value="20" min="2" max="100" step="2">px
    </label>
    <div class="sep"></div>
    <button id="btn-zoom-out" title="Zoom out">−</button>
    <button id="btn-zoom-100" title="Zoom to 100%">100%</button>
    <button id="btn-zoom-in" title="Zoom in">+</button>
    <button id="btn-fit" title="Fit stage in window">Fit</button>
    <div class="sep"></div>
    <button id="btn-debug" title="Vector debug view (D)">Debug</button>
    <div class="spacer"></div>
    <div id="fileinfo">no file loaded</div>
  </div>

  <div id="propbar">
    <span id="text-opts" class="inactive">
      <label class="ctl" title="Font family">
        <select id="text-font" style="max-width:130px"></select>
      </label>
      <label class="ctl" title="Text size (pt)">
        <input type="number" id="text-size" value="24" min="4" max="200" step="1">pt
      </label>
      <label class="ctl" title="Text color">
        <input type="color" id="text-color" value="#000000">
      </label>
      <button id="text-bold" class="txtstyle" title="Bold"><b>B</b></button>
      <button id="text-italic" class="txtstyle" title="Italic"><i>I</i></button>
      <button id="text-align-l" class="txtstyle" title="Align left">⯇</button>
      <button id="text-align-c" class="txtstyle" title="Align center">☰</button>
      <button id="text-align-r" class="txtstyle" title="Align right">⯈</button>
      <label class="ctl" title="Letter spacing (px)">
        A↔<input type="number" id="text-spacing" value="0" min="-20" max="60" step="0.5">
      </label>
      <label class="ctl" title="X (px)">X<input type="number" id="text-x" step="1" style="width:56px"></label>
      <label class="ctl" title="Y (px)">Y<input type="number" id="text-y" step="1" style="width:56px"></label>
      <label class="ctl" title="Box width (px) — text re-wraps">W<input type="number" id="text-w" step="1" min="10" style="width:56px"></label>
      <label class="ctl" title="Box height (px) — grows the box">H<input type="number" id="text-h" step="1" min="1" style="width:56px"></label>
      <button id="btn-fonts" title="List the system's fonts (or drop a .ttf on the canvas)">Fonts…</button>
    </span>
    <label class="ctl" title="Selection rotation (degrees) — type 0 to snap upright">
      ⟳<input type="number" id="sel-rotation" value="0" step="1" style="width:56px" disabled>°
    </label>
  </div>

  <div id="middle">
    <div id="tools">
      <button data-tool="select" class="active" title="Selection tool (V)">➤</button>
      <button data-tool="transform" title="Free Transform (Q)">▣</button>
      <button data-tool="lasso" title="Lasso (L)">➰</button>
      <button data-tool="pencil" title="Pencil tool (P)">✎</button>
      <button data-tool="line" title="Line tool (N)">╱</button>
      <button data-tool="oval" title="Oval tool (O)">◯</button>
      <button data-tool="rect" title="Rectangle tool (R)">▭</button>
      <button data-tool="text" title="Text tool (T)">T</button>
      <button data-tool="brush" title="Brush (B)">🖌</button>
      <button data-tool="bucket" title="Paint bucket (K)">🪣</button>
      <button data-tool="eraser" title="Eraser (E)">🧽</button>
    </div>
    <div id="canvaswrap">
      <canvas id="stage-canvas"></canvas>
      <div id="ctxmenu" class="hidden"></div>
      <div id="toast"></div>
    </div>
    <div id="layerspanel">
      <div id="scenebar">
        <select id="scene-select" title="Scene"></select>
        <button id="btn-scene-add" title="Add scene">+</button>
      </div>
      <div id="layerhead">
        <span>Layers</span>
        <span class="spacer"></span>
        <button id="btn-layer-add" title="New layer">+</button>
        <button id="btn-layer-del" title="Delete layer">−</button>
        <button id="btn-layer-up" title="Move layer up">▲</button>
        <button id="btn-layer-down" title="Move layer down">▼</button>
      </div>
      <div id="layerlist"></div>
      <div id="mathead">
        <span>Materials</span>
        <span class="spacer"></span>
        <span id="mat-gpu" title="WebGPU availability for gpu-class materials"></span>
      </div>
      <div id="matlist"></div>
      <div id="matedit" class="hidden">
        <label>Type
          <select id="mat-type"></select>
        </label>
        <div class="matrow" id="mat-color-row">
          <label>Color <input type="color" id="mat-color"></label>
        </div>
        <div class="matrow hidden" id="mat-grad-row">
          <label>A <input type="color" id="mat-grad-a"></label>
          <label>B <input type="color" id="mat-grad-b"></label>
          <label>∠ <input type="number" id="mat-grad-angle" step="15" style="width:44px"></label>
        </div>
        <div class="matrow hidden" id="mat-matcap-row">
          <label>Bump <input type="number" id="mat-bump" min="0" max="400" step="10" style="width:48px"></label>
          <label>Blur <input type="number" id="mat-blur" min="0" max="16" step="1" style="width:40px"></label>
          <label>Res
            <select id="mat-res">
              <option value="0.5">0.5×</option>
              <option value="1" selected>1×</option>
              <option value="2">2×</option>
            </select>
          </label>
        </div>
        <div class="matrow hidden" id="mat-matcap-tex-row">
          <label>Matcap <select id="mat-matcap-sel"></select></label>
          <button id="mat-matcap-load" title="Load a matcap image (embedded in the document)">Load…</button>
          <input type="file" id="mat-matcap-file" accept="image/*" style="display:none">
        </div>
        <div class="matrow hidden" id="mat-debug-row">
          <div class="matdbg"><canvas id="mat-dbg-bump" width="84" height="64"></canvas><span>bump</span></div>
          <div class="matdbg"><canvas id="mat-dbg-normal" width="84" height="64"></canvas><span>normal</span></div>
          <div class="matdbg"><canvas id="mat-dbg-result" width="84" height="64"></canvas><span>result</span></div>
        </div>
        <div id="mat-profile"></div>
      </div>
    </div>
    <div id="debugpanel" class="hidden">
      <div id="dbg-est"></div>
      <div id="dbg-edge"></div>
      <div id="dbg-stream"></div>
      <div id="dbg-styles"></div>
    </div>
  </div>

  <div id="statusbar">
    <span id="status-doc">—</span>
    <span id="status-pos"></span>
    <span id="status-zoom"></span>
    <span id="status-est" title="OperationEstimator (debug)"></span>
    <span class="spacer"></span>
    <span id="status-msg"></span>
  </div>

  <input type="file" id="file-input" accept=".swf,.vbd,.ttf,.ttc" style="display:none">

  <script src="js/bitio.js"></script>
  <script src="js/doc.js"></script>
  <script src="js/geom.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/matcap.js"></script>
  <script src="js/operation-estimator.js"></script>
  <script src="js/swf.js"></script>
  <script src="js/trace.js"></script>
  <script src="js/render.js"></script>
  <script src="js/vbd.js"></script>
  <script src="js/swfwrite.js"></script>
  <script src="js/fit.js"></script>
  <script src="js/merge.js"></script>
  <script src="js/faces.js"></script>
  <script src="js/normalize.js"></script>
  <script src="js/bucket.js"></script>
  <script src="js/swath.js"></script>
  <script src="lib/paper-core.min.js"></script>
  <script src="js/paperglue.js"></script>
  <script src="js/mask.js"></script>
  <script src="js/eraser.js"></script>
  <script src="js/brush.js"></script>
  <script src="js/planarity.js"></script>
  <script src="js/journal.js"></script>
  <script src="js/history.js"></script>
  <script src="js/debug.js"></script>
  <script src="js/pencil.js"></script>
  <script src="js/shapes.js"></script>
  <script src="js/arrow.js"></script>
  <script src="js/transform.js"></script>
  <script src="js/lasso.js"></script>
  <script src="js/ttf.js"></script>
  <script src="js/project.js"></script>
  <script src="js/text.js"></script>
  <script src="js/fonts-builtin.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

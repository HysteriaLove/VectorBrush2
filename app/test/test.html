<body>

<script>
(async function () {
  "use strict";
  var out = document.getElementById("out");
  var pass = 0, fail = 0;

  function log(line, cls) {
    var span = document.createElement("span");
    span.textContent = line + "\n";
    if (cls) span.className = cls;
    out.appendChild(span);
  }

  function check(name, cond, detail) {
    if (cond) { pass++; }
    else { fail++; log("  FAIL " + name + (detail ? " — " + detail : ""), "fail"); }
    return cond;
  }

  function b64ToBuf(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }

  function hexColor(c) {
    function h(v) { return v.toString(16).padStart(2, "0"); }
    return "#" + h(c.r) + h(c.g) + h(c.b);
  }

  function edgeKeySet(doc) {
    var keys = [];
    for (var i = 0; i < doc.edges.length; i++) {
      var e = doc.edges[i];
      if (VB.edgeIsDegenerate(e)) continue;
      keys.push([e.ax, e.ay, e.cx, e.cy, e.bx, e.by, e.fill0, e.fill1, e.line].join("/"));
    }
    keys.sort();
    return keys;
  }

  function sameStringArrays(a, b) {
    if (a.length !== b.length) return "length " + a.length + " vs " + b.length;
    for (var i = 0; i < a.length; i++) {
      if (a[i] !== b[i]) return "first diff at " + i + ": " + a[i] + " vs " + b[i];
    }
    return null;
  }

  // ======================= unit tests: geometry ============================
  log("geometry:");
  (function () {
    var G = VB.geom;

    // line × line cross
    var a = VB.edge(-1000, 0, null, null, 1000, 0, 0, 0, 1);
    var b = VB.edge(0, -1000, null, null, 0, 1000, 0, 0, 1);
    var hits = G.edgeIntersections(a, b);
    check("lineLine 1 hit", hits.length === 1, "got " + hits.length);
    if (hits.length) {
      check("lineLine at origin",
        Math.abs(hits[0].point.x) < 1 && Math.abs(hits[0].point.y) < 1,
        JSON.stringify(hits[0].point));
      check("lineLine t=u=0.5", Math.abs(hits[0].t - 0.5) < 1e-6 && Math.abs(hits[0].u - 0.5) < 1e-6);
    }

    // line × quad: horizontal line through an arch hits twice
    var arch = VB.edge(-1000, 0, 0, -2000, 1000, 0, 0, 0, 1);   // apex y=-1000
    var cut = VB.edge(-2000, -500, null, null, 2000, -500, 0, 0, 1);
    var h2 = G.edgeIntersections(cut, arch);
    check("lineQuad 2 hits", h2.length === 2, "got " + h2.length);
    for (var i = 0; i < h2.length; i++) {
      check("lineQuad hit on line y=-500", Math.abs(h2[i].point.y + 500) < 1, "y=" + h2[i].point.y);
    }

    // quad × quad: arch and inverted arch cross twice
    var arch2 = VB.edge(-1000, -1000, 0, 1000, 1000, -1000, 0, 0, 1); // sags down
    var h3 = G.edgeIntersections(arch, arch2);
    check("quadQuad 2 hits", h3.length === 2, "got " + h3.length);
    for (var j = 0; j < h3.length; j++) {
      var pa = G.evalEdge(arch, h3[j].t), pb = G.evalEdge(arch2, h3[j].u);
      check("quadQuad points agree", Math.hypot(pa.x - pb.x, pa.y - pb.y) < 1,
        Math.hypot(pa.x - pb.x, pa.y - pb.y).toFixed(2) + " twips apart");
    }

    // split a quad at t=0.5: two welded pieces, ends preserved
    var pieces = G.splitEdge(arch, [{ t: 0.5 }]);
    check("splitEdge 2 pieces", pieces.length === 2, "got " + pieces.length);
    if (pieces.length === 2) {
      check("splitEdge welded", pieces[0].bx === pieces[1].ax && pieces[0].by === pieces[1].ay);
      check("splitEdge ends kept",
        pieces[0].ax === arch.ax && pieces[0].ay === arch.ay &&
        pieces[1].bx === arch.bx && pieces[1].by === arch.by);
      check("splitEdge styles kept", pieces[0].line === 1 && pieces[1].line === 1);
    }

    // point-in-fill on a unit square
    var doc = new VB.Y2KVectorDocument();
    doc.fills.push(VB.solidFill(255, 0, 0));
    doc.edges.push(
      VB.edge(0, 0, null, null, 4000, 0, 0, 1, 0),
      VB.edge(4000, 0, null, null, 4000, 4000, 0, 1, 0),
      VB.edge(4000, 4000, null, null, 0, 4000, 0, 1, 0),
      VB.edge(0, 4000, null, null, 0, 0, 0, 1, 0));
    check("fillAt inside", G.fillAt(doc, 2000, 2000) === 1);
    check("fillAt outside", G.fillAt(doc, 5000, 2000) === 0);
    check("fillAt left of square", G.fillAt(doc, -500, 2000) === 0);
  })();

  // ======================= unit tests: fitting =============================
  log("fitting:");
  (function () {
    // straight run → exactly one straight edge
    var line = [];
    for (var i = 0; i <= 10; i++) line.push({ x: i * 400, y: 0 });
    var g1 = VB.fitStroke(line);
    check("fit straight = 1 line", g1.length === 1 && g1[0].cx === null,
      g1.length + " pieces");

    // semicircle → few quads, all samples near the fit, pieces welded
    var pts = [];
    for (var k = 0; k <= 40; k++) {
      var th = Math.PI * k / 40;
      pts.push({ x: Math.round(2000 * Math.cos(th)), y: Math.round(2000 * Math.sin(th)) });
    }
    var g2 = VB.fitStroke(pts);
    check("fit arc is compact", g2.length >= 2 && g2.length <= 8, g2.length + " pieces");
    var welded = true;
    for (var w = 1; w < g2.length; w++) {
      if (g2[w].ax !== g2[w - 1].bx || g2[w].ay !== g2[w - 1].by) welded = false;
    }
    check("fit pieces welded", welded);
    var worst = 0;
    for (var s = 0; s < pts.length; s++) {
      var best = Infinity;
      for (var e2 = 0; e2 < g2.length; e2++) {
        var ge = g2[e2];
        best = Math.min(best, VB.geom.distToEdge(
          VB.edge(ge.ax, ge.ay, ge.cx, ge.cy, ge.bx, ge.by, 0, 0, 0), pts[s].x, pts[s].y));
      }
      worst = Math.max(worst, best);
    }
    check("fit error bound", worst <= VB.FIT_TOLERANCE * 1.5, worst.toFixed(1) + " twips");
  })();

  // ======================= unit tests: planar merge ========================
  log("planar merge:");
  (function () {
    var style = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };

    // two crossing pencil strokes → both split at the shared node
    var doc = new VB.Y2KVectorDocument();
    VB.pencilCommit(doc, [{ x: 0, y: 0 }, { x: 2000, y: 0 }, { x: 4000, y: 0 }], style);
    check("first stroke = 1 edge", doc.edges.length === 1, doc.edges.length + " edges");
    VB.pencilCommit(doc, [{ x: 2000, y: -2000 }, { x: 2000, y: 0 }, { x: 2000, y: 2000 }], style);
    check("cross = 4 edges", doc.edges.length === 4, doc.edges.length + " edges");
    var nodeShared = doc.edges.every(function (e) {
      return (e.ax === 2000 && e.ay === 0) || (e.bx === 2000 && e.by === 0);
    });
    check("cross node shared by all 4", nodeShared);
    check("line styles deduped", doc.lines.length === 1, doc.lines.length + " styles");

    // stroke across a filled square inherits the fill on both sides
    var doc2 = new VB.Y2KVectorDocument();
    doc2.fills.push(VB.solidFill(0, 160, 60));
    doc2.edges.push(
      VB.edge(0, 0, null, null, 4000, 0, 0, 1, 0),
      VB.edge(4000, 0, null, null, 4000, 4000, 0, 1, 0),
      VB.edge(4000, 4000, null, null, 0, 4000, 0, 1, 0),
      VB.edge(0, 4000, null, null, 0, 0, 0, 1, 0));
    VB.pencilCommit(doc2, [
      { x: -1000, y: 2000 }, { x: 1000, y: 2000 }, { x: 3000, y: 2000 }, { x: 5000, y: 2000 }
    ], style);
    check("square+stroke = 9 edges", doc2.edges.length === 9, doc2.edges.length + " edges");
    var inside = doc2.edges.filter(function (e) {
      return e.line === 1 && e.fill0 === 1 && e.fill1 === 1;
    });
    var outside = doc2.edges.filter(function (e) {
      return e.line === 1 && e.fill0 === 0 && e.fill1 === 0;
    });
    check("inside piece inherits fill", inside.length === 1, inside.length + " inside pieces");
    check("outside pieces stay unfilled", outside.length === 2, outside.length + " outside pieces");
    if (inside.length === 1) {
      check("inside piece spans the square",
        inside[0].ax === 0 && inside[0].bx === 4000 ||
        inside[0].ax === 4000 && inside[0].bx === 0,
        "(" + inside[0].ax + "→" + inside[0].bx + ")");
    }

    // self-crossing stroke splits itself
    var doc3 = new VB.Y2KVectorDocument();
    VB.pencilCommit(doc3, [
      { x: 0, y: 0 }, { x: 2000, y: 2000 }, { x: 2000, y: 0 }, { x: 0, y: 2000 }
    ], style);
    check("self-cross = 5 edges", doc3.edges.length === 5, doc3.edges.length + " edges");

    // merged documents keep the Flash-parity invariant (integers, indices)
    check("merge keeps invariant (cross)", doc.validate().length === 0, doc.validate()[0]);
    check("merge keeps invariant (fill)", doc2.validate().length === 0, doc2.validate()[0]);
    check("merge keeps invariant (self)", doc3.validate().length === 0, doc3.validate()[0]);

    // Flash-record inspector: reports must match the stored geometry
    var rec = VB.debugEdgeRecord(doc2, doc2.edges.length - 1);
    var le = doc2.edges[doc2.edges.length - 1];
    if (le.cx === null) {
      check("record deltas exact",
        rec.deltas.dx === le.bx - le.ax && rec.deltas.dy === le.by - le.ay);
    } else {
      check("record deltas exact",
        rec.deltas.cdx === le.cx - le.ax && rec.deltas.adx === le.bx - le.cx);
    }
    check("record bit width sane", rec.nbits >= 2 && rec.nbits <= 17, "nbits=" + rec.nbits);

    // undo / redo round-trip
    var doc4 = new VB.Y2KVectorDocument();
    var hist = new VB.History();
    VB.pencilCommit(doc4, [{ x: 0, y: 0 }, { x: 1000, y: 0 }, { x: 2000, y: 0 }], style);
    var before = doc4.edges.length;
    hist.push(doc4);
    VB.pencilCommit(doc4, [{ x: 0, y: 500 }, { x: 1000, y: 500 }, { x: 2000, y: 500 }], style);
    var after = doc4.edges.length;
    hist.undo(doc4);
    check("undo restores", doc4.edges.length === before, doc4.edges.length + " vs " + before);
    hist.redo(doc4);
    check("redo restores", doc4.edges.length === after, doc4.edges.length + " vs " + after);
  })();

  // ======================= unit tests: bucket fill =========================
  log("bucket fill:");
  (function () {
    var stroke = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };
    var red = { color: { r: 220, g: 40, b: 40, a: 255 } };
    var blue = { color: { r: 40, g: 80, b: 220, a: 255 } };

    // 1. Fill a pencil-outlined rectangle: edges gain a fill on the
    //    interior side, keep their line style, nothing dissolves.
    var doc = new VB.Y2KVectorDocument();
    VB.pencilCommit(doc, [{ x: 0, y: 0 }, { x: 4000, y: 0 }], stroke);
    VB.pencilCommit(doc, [{ x: 4000, y: 0 }, { x: 4000, y: 3000 }], stroke);
    VB.pencilCommit(doc, [{ x: 4000, y: 3000 }, { x: 0, y: 3000 }], stroke);
    VB.pencilCommit(doc, [{ x: 0, y: 3000 }, { x: 0, y: 0 }], stroke);
    var r1 = VB.bucketFill(doc, 2000, 1500, red);
    check("outline fill stamps 4 sides", r1.stamped === 4, r1.stamped + " stamped");
    check("outline fill dissolves none", r1.dissolved === 0, r1.dissolved + " dissolved");
    check("outline fill contains center", VB.geom.fillAt(doc, 2000, 1500) === 1);
    check("outline fill keeps outside empty", VB.geom.fillAt(doc, 5000, 1500) === 0);
    check("outline fill keeps strokes", doc.edges.every(function (e) { return e.line === 1; }));
    check("outline fill invariant", doc.validate().length === 0, doc.validate()[0]);

    // 2. Click outside any region: no-op.
    var r0 = VB.bucketFill(doc, 9000, 9000, red);
    check("outside click is a no-op", r0.stamped === 0 && doc.edges.length === 4);

    // 3. Pencil line across the filled rect splits it into two faces;
    //    each fills independently.
    VB.pencilCommit(doc, [{ x: 2000, y: -500 }, { x: 2000, y: 1500 }, { x: 2000, y: 3500 }], stroke);
    var r2 = VB.bucketFill(doc, 1000, 1500, blue);
    check("left half fill works", r2.stamped > 0);
    var fLeft = VB.geom.fillAt(doc, 1000, 1500);
    var fRight = VB.geom.fillAt(doc, 3000, 1500);
    check("left half is blue", JSON.stringify(doc.fills[fLeft - 1].color).indexOf("220") > 0 &&
      doc.fills[fLeft - 1].color.b === 220, "fill " + fLeft);
    check("right half still red", doc.fills[fRight - 1].color.r === 220, "fill " + fRight);
    check("halves differ", fLeft !== fRight);
    check("split-fill invariant", doc.validate().length === 0, doc.validate()[0]);

    // 4. Dissolution: two rects sharing a lineless border; filling the
    //    right one with the left one's color merges them.
    var doc2 = new VB.Y2KVectorDocument();
    doc2.fills.push(VB.solidFill(200, 60, 60)); // style 1
    doc2.fills.push(VB.solidFill(60, 60, 200)); // style 2
    doc2.edges.push(
      // left rect (clockwise, fill1 = interior)
      VB.edge(0, 0, null, null, 2000, 0, 0, 1, 0),
      VB.edge(2000, 2000, null, null, 0, 2000, 0, 1, 0),
      VB.edge(0, 2000, null, null, 0, 0, 0, 1, 0),
      // shared border: left rect on right of south travel, right rect on left
      VB.edge(2000, 0, null, null, 2000, 2000, 2, 1, 0),
      // right rect (clockwise)
      VB.edge(2000, 0, null, null, 4000, 0, 0, 2, 0),
      VB.edge(4000, 0, null, null, 4000, 2000, 0, 2, 0),
      VB.edge(4000, 2000, null, null, 2000, 2000, 0, 2, 0));
    var r3 = VB.bucketFill(doc2, 3000, 1000, { color: { r: 200, g: 60, b: 60, a: 255 } });
    check("dissolve happened", r3.dissolved === 1, r3.dissolved + " dissolved");
    check("merged region count", doc2.edges.length === 6, doc2.edges.length + " edges");
    check("left still filled", VB.geom.fillAt(doc2, 1000, 1000) === 1);
    check("right now same fill", VB.geom.fillAt(doc2, 3000, 1000) === 1);
    check("dissolve invariant", doc2.validate().length === 0, doc2.validate()[0]);

    // 5. Island: fill the annulus between two squares; the island keeps
    //    its own fill (hole assignment).
    var doc3 = new VB.Y2KVectorDocument();
    doc3.fills.push(VB.solidFill(0, 150, 80));  // style 1: island fill
    doc3.edges.push(
      // outer square (clockwise, no fill yet — outline-less region)
      VB.edge(0, 0, null, null, 6000, 0, 0, 0, 0),
      VB.edge(6000, 0, null, null, 6000, 6000, 0, 0, 0),
      VB.edge(6000, 6000, null, null, 0, 6000, 0, 0, 0),
      VB.edge(0, 6000, null, null, 0, 0, 0, 0, 0),
      // island square (clockwise): interior = style 1, exterior empty
      VB.edge(2000, 2000, null, null, 4000, 2000, 0, 1, 0),
      VB.edge(4000, 2000, null, null, 4000, 4000, 0, 1, 0),
      VB.edge(4000, 4000, null, null, 2000, 4000, 0, 1, 0),
      VB.edge(2000, 4000, null, null, 2000, 2000, 0, 1, 0));
    var r4 = VB.bucketFill(doc3, 1000, 1000, { color: { r: 255, g: 200, b: 0, a: 255 } });
    check("annulus stamps outer+hole", r4.stamped === 8, r4.stamped + " stamped");
    var fAnnulus = VB.geom.fillAt(doc3, 1000, 1000);
    var fIsland = VB.geom.fillAt(doc3, 3000, 3000);
    check("annulus filled", fAnnulus === 2, "fill " + fAnnulus);
    check("island keeps its fill", fIsland === 1, "fill " + fIsland);
    check("island edges dual-faced", doc3.edges.filter(function (e) {
      return e.fill0 === 2 && e.fill1 === 1;
    }).length === 4);
    check("island invariant", doc3.validate().length === 0, doc3.validate()[0]);

    // 6. Refill with the same color (idempotent, style deduped).
    var stylesBefore = doc3.fills.length;
    VB.bucketFill(doc3, 1000, 1000, { color: { r: 255, g: 200, b: 0, a: 255 } });
    check("refill dedupes style", doc3.fills.length === stylesBefore);
    check("refill keeps fill", VB.geom.fillAt(doc3, 1000, 1000) === 2);
  })();

  // =============== unit tests: gap snapping & curved islands ===============
  // Regression for the flood-fill bug: casually drawn strokes leave twip
  // gaps; endpoint snapping must close them or fills leak everywhere.
  log("gap snapping:");
  (function () {
    var stroke = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };
    function arc(cx, cy, r, gapTw, n) {
      var pts = [];
      var to = Math.PI * 2 - gapTw / r;
      for (var i = 0; i <= n; i++) {
        var a = to * (i / n);
        pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
      }
      return pts;
    }

    // near-closed pencil loop auto-closes and fills like a circle
    var doc = new VB.Y2KVectorDocument();
    VB.pencilCommit(doc, arc(4000, 4000, 900, 40, 30), stroke);
    var e0 = doc.edges[0], eN = doc.edges[doc.edges.length - 1];
    check("loop auto-closed", e0.ax === eN.bx && e0.ay === eN.by);
    var rl = VB.bucketFill(doc, 4000, 4000, { color: { r: 255, g: 0, b: 200, a: 255 } });
    check("loop fills inside", rl.stamped > 0 && VB.geom.fillAt(doc, 4000, 4000) !== 0);
    check("loop fill contained", VB.geom.fillAt(doc, 6000, 4000) === 0);
    check("loop planar", VB.validatePlanar(doc).length === 0);

    // outline + curved island + short divider: fill one lobe only
    var doc2 = new VB.Y2KVectorDocument();
    VB.pencilCommit(doc2, arc(6000, 6000, 4000, 40, 60), stroke);
    VB.pencilCommit(doc2, arc(4800, 6000, 900, 40, 30), stroke);
    VB.pencilCommit(doc2, [
      { x: 8300, y: 2790 }, { x: 8350, y: 4500 }, { x: 8400, y: 6000 },
      { x: 8350, y: 7500 }, { x: 8300, y: 9210 }
    ], stroke); // stops ~60tw short of the outline: must T-weld
    var rg = VB.bucketFill(doc2, 7000, 6000, { color: { r: 100, g: 220, b: 120, a: 255 } });
    check("lobe fill works", rg.stamped > 0);
    check("curved island blocks fill", VB.geom.fillAt(doc2, 4800, 6000) === 0);
    check("divider T-weld blocks fill", VB.geom.fillAt(doc2, 9200, 6000) === 0);
    check("outside stays empty", VB.geom.fillAt(doc2, 500, 500) === 0);
    check("gap doc planar", VB.validatePlanar(doc2).length === 0);
  })();

  // ======================= unit tests: eraser ==============================
  log("eraser:");
  (function () {
    var stroke = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };
    function filledSquare() {
      var d = new VB.Y2KVectorDocument();
      d.fills.push(VB.solidFill(200, 60, 60));
      d.edges.push(
        VB.edge(0, 0, null, null, 4000, 0, 0, 1, 0),
        VB.edge(4000, 0, null, null, 4000, 4000, 0, 1, 0),
        VB.edge(4000, 4000, null, null, 0, 4000, 0, 1, 0),
        VB.edge(0, 4000, null, null, 0, 0, 0, 1, 0));
      return d;
    }

    // 1. Band erase across a filled square: two filled regions remain.
    var doc = filledSquare();
    var r1 = VB.eraseStroke(doc, [
      { x: -600, y: 2000 }, { x: 2000, y: 2000 }, { x: 4600, y: 2000 }
    ], 400);
    check("band removes edges", r1.removed > 0, r1.removed + " removed");
    check("band keeps boundary", r1.boundary > 0, r1.boundary + " kept");

    check("band: middle erased", VB.geom.fillAt(doc, 2000, 2000) === 0);
    check("band: bottom still filled", VB.geom.fillAt(doc, 2000, 3300) === 1);

    // 2. Dab hole in a fill, then bucket-refill heals it completely.

    var r2 = VB.eraseStroke(doc2, [{ x: 2000, y: 2000 }], 500);
    check("dab erases hole", VB.geom.fillAt(doc2, 2000, 2000) === 0);
    check("dab keeps surround", VB.geom.fillAt(doc2, 500, 500) === 1);
    check("dab boundary has no line", doc2.edges.every(function (e) {
      return e.line === 0 || (e.fill0 !== 0 || e.fill1 !== 0);
    }));
    var oneSided = doc2.edges.filter(function (e) {
      return (e.fill0 === 1) !== (e.fill1 === 1);
    });
    // The boolean-mask core emits a FITTED outline (Flash-lean): a round

    check("dab boundary one-sided", oneSided.length >= 6, oneSided.length + " edges");
    VB.bucketFill(doc2, 2000, 2000, { color: { r: 200, g: 60, b: 60, a: 255 } });

    var doc3 = new VB.Y2KVectorDocument();

    check("trim leaves two stubs", doc3.edges.length === 2, doc3.edges.length + " edges");

    // 6. Erase storm (regression: big swipes over dense curved geometry

    var lcg = 424242;
    function rnd() { lcg = (lcg * 1103515245 + 12345) & 0x7fffffff; return lcg / 0x7fffffff; }
    var storm = new VB.Y2KVectorDocument();

    check("storm: invariant", storm.validate().length === 0, storm.validate()[0]);
    var stormFills = VB.buildFillPaths(storm);
    var stormOpen = 0;
    for (var sp = 1; sp < stormFills.length; sp++) {
      for (var sc = 0; sc < stormFills[sp].length; sc++) {

  // ======================= unit tests: brush ===============================
  // Semantics dictated by the SWFExamples Brush series: a dab is one
  // closed all-curves loop, fill on one side, NO line style; same-color
  // overlap unions; different colors split with F|G shared borders and
  // the new color owns the overlap; crossed strokes survive as interior
  // fill|fill+line edges.
  log("brush:");
  (function () {
    var red = { r: 204, g: 102, b: 102, a: 255 };
    var blue = { r: 51, g: 102, b: 204, a: 255 };
    var stroke = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };

    // 1. Dab on blank canvas — the Brush001/brush002.swf pattern.
    var doc = new VB.Y2KVectorDocument();
    var r1 = VB.brushStroke(doc, [{ x: 4000, y: 4000 }], 500, red);
    check("dab paints", r1.boundary > 0);
    check("dab has one fill style", doc.fills.length === 1);

    check("dab all edges curved", doc.edges.every(function (e) { return e.cx !== null; }));
    check("dab no line styles", doc.edges.every(function (e) { return e.line === 0; }));
    check("dab one-sided boundary", doc.edges.every(function (e) {
      return (e.fill0 === 0) !== (e.fill1 === 0);
    }));
    check("dab chains closed + planar", VB.integrityReport(doc).length === 0,
      VB.integrityReport(doc)[0]);

    // 2. Same-color overlap = union (Brush002 series).
    var doc2 = new VB.Y2KVectorDocument();
    VB.brushStroke(doc2, [{ x: 2000, y: 4000 }, { x: 5000, y: 4000 }], 400, red);

    check("union covers both", VB.geom.fillAt(doc2, 2000, 4000) === 1 &&

    check("union no interior borders", doc2.edges.every(function (e) {
      return !(e.fill0 === e.fill1 && e.line === 0);

    check("union consistent", VB.integrityReport(doc2).length === 0,
      VB.integrityReport(doc2)[0]);

    // 3. Two colors crossing (Brush002/Brush003.swf): new color owns the
    //    overlap; shared borders are two-sided F|G.
    var doc3 = new VB.Y2KVectorDocument();
    VB.brushStroke(doc3, [{ x: 4000, y: 1500 }, { x: 4000, y: 6500 }], 400, red);
    VB.brushStroke(doc3, [{ x: 1500, y: 4000 }, { x: 6500, y: 4000 }], 400, blue);
    check("two styles registered", doc3.fills.length === 2);
    check("overlap owned by new color", VB.geom.fillAt(doc3, 4000, 4000) === 2);
    check("red arms intact", VB.geom.fillAt(doc3, 4000, 1800) === 1 &&
      VB.geom.fillAt(doc3, 4000, 6200) === 1);
    check("blue arms intact", VB.geom.fillAt(doc3, 1800, 4000) === 2 &&
      VB.geom.fillAt(doc3, 6200, 4000) === 2);
    var shared = doc3.edges.filter(function (e) {
      return e.fill0 > 0 && e.fill1 > 0 && e.fill0 !== e.fill1;
    });
    check("F|G shared borders exist", shared.length > 0, shared.length + " shared");
    check("two-color consistent", VB.integrityReport(doc3).length === 0,
      VB.integrityReport(doc3)[0]);

    // 4. Brush across a pencil stroke: paint-over ERASES the covered
    //    stroke segments (Flash "paint normal") — the stroke is trimmed
    //    to stubs outside the paint, exactly like the eraser trims.
    var doc4 = new VB.Y2KVectorDocument();
    VB.pencilCommit(doc4, [{ x: 1000, y: 4000 }, { x: 4000, y: 4000 }, { x: 7000, y: 4000 }], stroke);
    VB.brushStroke(doc4, [{ x: 4000, y: 3000 }, { x: 4000, y: 5000 }], 600, red);
    var coveredStrokes = doc4.edges.filter(function (e) {
      if (e.line !== 1) return false;
      var m = VB.geom.evalEdge(e, 0.5);
      return VB.distToPath([{ x: 4000, y: 3000 }, { x: 4000, y: 5000 }], m.x, m.y) < 600 - 4;
    });
    var stubs = doc4.edges.filter(function (e) { return e.line === 1; });
    check("covered stroke erased", coveredStrokes.length === 0,
      coveredStrokes.length + " pieces under the paint");
    check("stroke stubs survive outside", stubs.length >= 2, stubs.length + " stubs");
    check("paint region filled", VB.geom.fillAt(doc4, 4000, 4000) === 1);
    check("brush-over-stroke consistent", VB.integrityReport(doc4).length === 0,
      VB.integrityReport(doc4)[0]);

    // 5. Brush across an existing fill (different color): paints over.
    var doc5 = new VB.Y2KVectorDocument();
    doc5.fills.push(VB.solidFill(51, 102, 204)); // blue square, style 1
    doc5.edges.push(
      VB.edge(2000, 2000, null, null, 6000, 2000, 0, 1, 0),
      VB.edge(6000, 2000, null, null, 6000, 6000, 0, 1, 0),
      VB.edge(6000, 6000, null, null, 2000, 6000, 0, 1, 0),
      VB.edge(2000, 6000, null, null, 2000, 2000, 0, 1, 0));
    VB.brushStroke(doc5, [{ x: 1000, y: 4000 }, { x: 7000, y: 4000 }], 400, red);
    check("paint-over: band is red", VB.geom.fillAt(doc5, 4000, 4000) === 2);
    check("paint-over: above still blue", VB.geom.fillAt(doc5, 4000, 2800) === 1);
    check("paint-over: below still blue", VB.geom.fillAt(doc5, 4000, 5200) === 1);
    check("paint-over: outside band red tips", VB.geom.fillAt(doc5, 1200, 4000) === 2);
    check("paint-over consistent", VB.integrityReport(doc5).length === 0,
      VB.integrityReport(doc5)[0]);

    // 6. Long self-crossing scribble (the reported wedge corruption):
    //    heavy self-overlap must yield a clean union with closed
    //    boundaries and no phantom chord edges.
    (function () {
      var lcg = 777;
      function rr() { lcg = (lcg * 1103515245 + 12345) & 0x7fffffff; return lcg / 0x7fffffff; }
      var sdoc = new VB.Y2KVectorDocument();
      var x = 3000, y = 3000, heading = rr() * Math.PI * 2;
      var spts = [];
      for (var i = 0; i < 180; i++) {
        spts.push({ x: x, y: y });

      var probs = VB.integrityReport(sdoc);

      var phantom = sdoc.edges.filter(function (e) {
        return e.cx === null && e.line === 0 &&
          Math.hypot(e.bx - e.ax, e.by - e.ay) > 250;
      });
      check("scribble has no phantom chords", phantom.length === 0,
        phantom.length + " long straight lineless edges");
      check("scribble paints its path", VB.geom.fillAt(sdoc,
        spts[90].x, spts[90].y) === 1);
    })();

    // 7. Same color painted twice over itself is stable (idempotent-ish).
    var before6 = doc2.edges.length;
    VB.brushStroke(doc2, [{ x: 3000, y: 4000 }, { x: 6000, y: 4000 }], 300, red);
    check("repaint keeps single style", doc2.fills.length === 1);
    check("repaint stays consistent", VB.integrityReport(doc2).length === 0,
      VB.integrityReport(doc2)[0]);
  })();

  // =============== unit tests: fill normalization ==========================

    // Cross-channel scrub over a previous channel at an angle.

    doc3.fills.push(VB.solidFill(60, 200, 60));
    doc3.edges.push(
      VB.edge(0, 0, null, null, 8000, 0, 0, 1, 0),

  await (async function () {

  // ============== regression: real user session (189KB journal) ============
  // Replays a recorded session (1 pencil scribble, 18 fills, 55 erases,

  log("user session replay:");
  await (async function () {
    var ops = window.VBUserLog.ops;
    var GRID = 500;
    function sampleFills(doc) {
      var m = new Map();
      for (var x = GRID / 2; x < doc.width; x += GRID) {
        for (var y = GRID / 2; y < doc.height; y += GRID) {
          var f = VB.geom.fillAt(doc, x, y);
          if (f) m.set(x + "," + y, f);
        }
      }
      return m;
    }
    var prevSamples = null;
    var vanishEvents = 0, firstCorrupt = -1;
    var res = await VB.replayJournal(ops, {
      onOp: function (i, op, doc) {
        if (firstCorrupt < 0 && VB.integrityReport(doc).length) firstCorrupt = i;
        var cur = sampleFills(doc);
        if (prevSamples && op.op === "erase") {
          prevSamples.forEach(function (f, key) {
            if (cur.has(key)) return;
            var xy = key.split(",");
            if (VB.distToPath(op.points, +xy[0], +xy[1]) > op.radius + 80) vanishEvents++;
          });
        }
        prevSamples = cur;
      }
    });
    check("session replays without corruption", firstCorrupt < 0, "corrupt at op#" + firstCorrupt);
    check("no region vanishes beyond the eraser", vanishEvents === 0,
      vanishEvents + " far-vanish samples");
    check("session end state non-trivial", res.doc.edges.length > 100,
      res.doc.edges.length + " edges");
  })();

      { name: "log2", ops: window.VBUserLog2.ops, minEdges: 150 },
      { name: "log3", ops: window.VBUserLog3.ops, minEdges: 150 },

    // mask passes destabilizing shared borders). Threshold never goes

    check("log20 marquee move replays consistent",

    check("log20 marquee move does not shred (" + pre20.edges.length +

    var micro20 = post20.edges.filter(function (e) {

    });
    check("log20 leaves no micro-fragments", micro20.length === 0,
      micro20.length + " sub-5tw records");

    // Log 21 (user session 2026-07-09): 17 scribbled brush strokes + 10

    // used to hug the post-op boundary at 1-2.5tw, land on the wrong

        window.VBUserLog21.ops[27].points[70].x,
        window.VBUserLog21.ops[27].points[70].y) === 1);

    // Log 32 (user session 2026-07-09, "eraser reverts fills / erases

    // erases. Op#39's channel (a) re-stamped a fill-2 room as fill 1 —

    // fill-1 pocket through a pencil stroke that penetrated the swath
    // wall by 0.8tw — a T-junction graze no repair stage owned
    // (span-align SNAP=2 fix). Far census points must ride through
    // every erase unchanged.
    var log32ops = window.VBUserLog32.ops;
    var sentinels32 = [
      { x: 3225, y: 3975 }, { x: 3675, y: 3975 }, { x: 3975, y: 3975 },
      { x: 3525, y: 2025 }, { x: 3375, y: 2325 }, { x: 7425, y: 2475 }];
    var pre39 = (await VB.replayJournal(log32ops.slice(0, 39))).doc;
    var want32 = sentinels32.map(function (p) {
      return VB.geom.fillAt(pre39, p.x, p.y);
    });
    check("log32 sentinels are filled before the erase",
      want32.every(function (f) { return f > 0; }), want32.join(","));
    VB.eraseStroke(pre39, log32ops[39].points, log32ops[39].radius);
    var got32 = sentinels32.map(function (p) {
      return VB.geom.fillAt(pre39, p.x, p.y);
    });
    check("log32 op#39 leaves far fills untouched (revert/vanish report)",
      got32.join(",") === want32.join(","),
      got32.join(",") + " vs " + want32.join(","));
    check("log32 op#39 keeps the map consistent",
      VB.integrityReport(pre39).length === 0, VB.integrityReport(pre39)[0]);
    var post32 = (await VB.replayJournal(log32ops)).doc;
    check("log32 full replay stays consistent",
      VB.integrityReport(post32).length === 0, VB.integrityReport(post32)[0]);
  })();

  // ======================= user stress logs 29/30 ================================
  // Tripwires for the mask-perf reland class: log 29 caught bbox-shaped
  // fill clipping from an earlier optimization batch; log 30 is the
  // brush+eraser session behind the pixi fill-rule fix. Both must
  // replay with clean integrity and sane structure, forever.
  log("stress logs 29/30:");
  await (async function () {
    var r29 = await VB.replayJournal(window.VBUserLog29.ops);
    check("log29 replays consistent",
      VB.integrityReport(r29.doc).length === 0,
      VB.integrityReport(r29.doc)[0]);
    var r30 = await VB.replayJournal(window.VBUserLog30.ops);
    check("log30 replays consistent",
      VB.integrityReport(r30.doc).length === 0,
      VB.integrityReport(r30.doc)[0]);
    check("log30 keeps its scribble (spot probes)",
      r30.doc.edges.length > 300 &&
      VB.geom.fillAt(r30.doc, 150 * 20, 100 * 20) === 1 &&
      VB.geom.fillAt(r30.doc, 420 * 20, 350 * 20) === 0,
      r30.doc.edges.length + " edges, " +
      VB.geom.fillAt(r30.doc, 150 * 20, 100 * 20) + "/" +
      VB.geom.fillAt(r30.doc, 420 * 20, 350 * 20));
  })();

  // ======================= 2DMaterials: profiler + persistence ==================
  // The cost profile is an ANALYTIC function of the material params —
  // deterministic across machines. These literals pin the formulas
  // (docs/2DMaterials.md); changing a formula must change these on
  // purpose.
  log("2DMaterials:");
  await (async function () {
    try {
    var p = VB.materialProfile({ type: "solid", color: { r: 1, g: 2, b: 3, a: 255 } });
    check("solid profiles flat 1 op/px",
      p.class === "flat" && p.perPx === 1 && p.score === 1 && !p.gpu &&
      p.texBytesPerMpx === 0, JSON.stringify(p));
    p = VB.materialProfile(VB.materialDefaults("linear"));
    check("linear profiles gradient 3 ops/px",
      p.class === "gradient" && p.perPx === 3 && !p.gpu, JSON.stringify(p));
    p = VB.materialProfile(VB.materialDefaults("radial"));
    check("radial profiles gradient 5 ops/px",
      p.class === "gradient" && p.perPx === 5 && !p.gpu, JSON.stringify(p));
    p = VB.materialProfile(VB.materialDefaults("matcap")); // blur 3, res 1
    check("matcap default profiles gpu 28 ops/px, 12MB/Mpx",
      p.class === "gpu" && p.gpu && p.perPx === 28 &&
      p.texBytesPerMpx === 12000000, JSON.stringify(p));
    p = VB.materialProfile({ type: "matcap", color: { r: 0, g: 0, b: 0, a: 255 },
                             bumpScale: 60, blurPx: 4, resolution: 2 });
    check("matcap cost follows blur×resolution (48 ops/px, 48MB/Mpx)",
      p.perPx === 48 && p.texBytesPerMpx === 48000000, JSON.stringify(p));

    // fillStyle command: replayable, one undo step
    var blue2 = { r: 102, g: 204, b: 255, a: 255 };
    var mops = [
      { op: "new", width: 11000, height: 8000 },
      { op: "brush", points: [{ x: 3000, y: 3000 }, { x: 5000, y: 3200 }],
        radius: 400, color: blue2 }
    ];
    var lin = VB.materialDefaults("linear");
    lin.matrix = { sx: 0.3, sy: 0.3, r0: 0, r1: 0, tx: 4000, ty: 3000 };
    var mr = await VB.replayJournal(mops.concat([
      { op: "fillStyle", index: 0, style: lin }
    ]));
    check("fillStyle op replays (solid -> linear)",
      mr.doc.fills[0].type === "linear" &&
      mr.doc.fills[0].gradient.stops.length === 2 &&
      VB.integrityReport(mr.doc).length === 0,
      mr.doc.fills[0].type);
    var mu = await VB.replayJournal(mops.concat([
      { op: "fillStyle", index: 0, style: lin }, { op: "undo" }
    ]));
    check("fillStyle is one undo step", mu.doc.fills[0].type === "solid",
      mu.doc.fills[0].type);

    // vbd round trip: gradient + matcap fills survive save/load
    var vdoc = mr.doc;
    vdoc.fills.push({ type: "matcap", color: { r: 10, g: 20, b: 30, a: 255 },
                      bumpScale: 80, blurPx: 2.5, resolution: 0.5 });
    var bytes = await VB.encodeY2KVector(vdoc);
    var decoded = await VB.decodeY2KVector(bytes);
    var back = decoded.doc || decoded.project.activeCell();
    check("vbd round-trips linear fill",
      back.fills[0].type === "linear" &&
      Math.abs(back.fills[0].matrix.sx - 0.3) < 1e-4 &&
      back.fills[0].gradient.stops.length === 2 &&
      back.fills[0].gradient.stops[1].color.r === lin.gradient.stops[1].color.r,
      JSON.stringify(back.fills[0]).slice(0, 120));
    check("vbd round-trips matcap fill",
      back.fills[1] && back.fills[1].type === "matcap" &&
      back.fills[1].bumpScale === 80 &&
      Math.abs(back.fills[1].blurPx - 2.5) < 1e-9 &&
      Math.abs(back.fills[1].resolution - 0.5) < 1e-9,
      JSON.stringify(back.fills[1]));

    // material-as-paint: ops carry the full style; drawing with a
    // material creates/reuses ONE style entry
    var linPaint = VB.materialDefaults("linear");
    linPaint.matrix = { sx: 0.2, sy: 0.2, r0: 0, r1: 0, tx: 3000, ty: 3000 };
    var mp1 = await VB.replayJournal([
      { op: "new", width: 11000, height: 8000 },
      { op: "brush", points: [{ x: 2000, y: 3000 }, { x: 4000, y: 3000 }],
        radius: 400, color: { r: 1, g: 2, b: 3, a: 255 }, style: linPaint },
      { op: "brush", points: [{ x: 2000, y: 5000 }, { x: 4000, y: 5000 }],
        radius: 400, color: { r: 1, g: 2, b: 3, a: 255 }, style: linPaint }
    ]);
    check("brush paints with the selected material (op.style)",
      mp1.doc.fills[0].type === "linear" &&
      VB.geom.fillAt(mp1.doc, 3000, 3000) === 1 &&
      VB.integrityReport(mp1.doc).length === 0,
      mp1.doc.fills[0].type);
    check("same material dedupes to one style entry",
      mp1.doc.fills.length === 1, mp1.doc.fills.length + " styles");
    var mp2 = await VB.replayJournal([
      { op: "new", width: 11000, height: 8000 },
      { op: "rect", x0: 1000, y0: 1000, x1: 6000, y1: 5000,
        fill: VB.materialDefaults("matcap"), line: null },
      { op: "bucket", x: 3000, y: 3000, color: { r: 9, g: 9, b: 9, a: 255 },
        style: linPaint }
    ]);
    check("rect fill + bucket accept material styles",
      mp2.doc.fills[0].type === "matcap" &&
      mp2.doc.fills.some(function (f) { return f.type === "linear"; }) &&
      mp2.doc.fills[VB.geom.fillAt(mp2.doc, 3000, 3000) - 1].type === "linear",
      JSON.stringify(mp2.doc.fills.map(function (f) { return f.type; })));

    // GLOBAL material library: add, paint on two layers, edit updates
    // every use across layers, undo restores; vbd v4 persists it
    var libStyle = VB.materialDefaults("linear");
    libStyle.matrix = { sx: 0.25, sy: 0.25, r0: 0, r1: 0, tx: 3000, ty: 3000 };
    var libOps = [
      { op: "new", width: 11000, height: 8000 },
      { op: "materialAdd", style: libStyle },
      { op: "brush", points: [{ x: 2000, y: 2000 }, { x: 3500, y: 2000 }],
        radius: 300, color: { r: 1, g: 2, b: 3, a: 255 }, style: libStyle },
      { op: "layerAdd" },
      { op: "brush", points: [{ x: 2000, y: 5000 }, { x: 3500, y: 5000 }],
        radius: 300, color: { r: 1, g: 2, b: 3, a: 255 }, style: libStyle }
    ];
    var lr = await VB.replayJournal(libOps);
    check("library holds ONE global material used on two layers",
      lr.project.materials.length === 1 &&
      lr.project.scenes[0].layers.length === 2 &&
      lr.project.scenes[0].layers[0].frames[0].fills[0].type === "linear" &&
      lr.project.scenes[0].layers[1].frames[0].fills[0].type === "linear",
      lr.project.materials.length + " materials");
    var edited = VB.materialClone(libStyle);
    edited.type = "radial";
    var lr2 = await VB.replayJournal(libOps.concat([
      { op: "materialEdit", index: 0, style: edited }
    ]));
    check("materialEdit updates the library AND every use on every layer",
      lr2.project.materials[0].type === "radial" &&
      lr2.project.scenes[0].layers[0].frames[0].fills[0].type === "radial" &&
      lr2.project.scenes[0].layers[1].frames[0].fills[0].type === "radial");
    var lr3 = await VB.replayJournal(libOps.concat([
      { op: "materialEdit", index: 0, style: edited }, { op: "undo" }
    ]));
    check("materialEdit is one undo step (library + cells restored)",
      lr3.project.materials[0].type === "linear" &&
      lr3.project.scenes[0].layers[1].frames[0].fills[0].type === "linear");
    var lbytes = await VB.encodeY2KVector(lr.project);
    var ldec = await VB.decodeY2KVector(lbytes);
    check("vbd v4 persists the global library",
      ldec.project && ldec.project.materials.length === 1 &&
      ldec.project.materials[0].type === "linear",
      JSON.stringify((ldec.project || {}).materials));

    // gradient rendering: a linear black->white fill actually shades
    var gdoc = mr.doc; // fill 0 is the linear style over the brush blob
    gdoc.fills[0].gradient.stops[0].color = { r: 0, g: 0, b: 0, a: 255 };
    gdoc.fills[0].gradient.stops[1].color = { r: 255, g: 255, b: 255, a: 255 };
    var gcv = document.createElement("canvas");
    gcv.width = 550; gcv.height = 400;
    VB.render(gcv.getContext("2d"), gdoc, { zoom: 1, panX: 0, panY: 0 });
    var gd = gcv.getContext("2d").getImageData(0, 0, 550, 400).data;
    function lum(x, y) { var o = (y * 550 + x) * 4; return gd[o] + gd[o + 1] + gd[o + 2]; }
    // blob spans ~x 130..270px at y≈155: left end should be darker
    var left = lum(140, 155), right = lum(245, 158);
    check("linear gradient shades across the fill (" + left + " -> " + right + ")",
      right - left > 150, left + " vs " + right);
    } catch (merr) {
      check("2DMaterials section threw: " + merr.message, false,
        (merr.stack || "").split("\n").slice(0, 3).join(" | "));
    }
  })();

  // ======================= matcap pipeline (CPU reference) ======================
  // Pure stages over typed arrays — deterministic, pinned exactly.
  // This implementation is the correctness oracle for the WebGPU
  // backend (2DMaterials stage 2b).
  log("matcap pipeline:");
  await (async function () {
    // height field: chamfer DT normalized by relief width
    var W = 8, H = 8;
    var mask = new Uint8Array(W * H).fill(1);
    var hf = VB.matcapHeightField(mask, W, H, 1); // cap = 3
    var allOne = true;
    for (var i = 0; i < W * H; i++) if (hf[i] !== 1) allOne = false;
    check("full mask at relief 1 saturates to height 1", allOne);
    mask[3 * W + 3] = 0; // punch a hole
    hf = VB.matcapHeightField(mask, W, H, 2); // cap = 6
    check("hole is 0, neighbor 3/6, diagonal 4/6 (chamfer 3/4)",
      hf[3 * W + 3] === 0 &&
      Math.abs(hf[3 * W + 4] - 0.5) < 1e-6 &&
      Math.abs(hf[4 * W + 4] - 4 / 6) < 1e-6, // Float32 storage
      hf[3 * W + 3] + "/" + hf[3 * W + 4] + "/" + hf[4 * W + 4]);

    // blur: sigma 0 is identity; constant fields are preserved
    var flat = new Float32Array(W * H).fill(0.5);
    check("blur sigma 0 is identity",
      VB.matcapGaussianBlur(flat, W, H, 0) === flat);
    var blurred = VB.matcapGaussianBlur(flat, W, H, 2);
    var flatOk = true;
    for (var j = 0; j < W * H; j++) if (Math.abs(blurred[j] - 0.5) > 1e-6) flatOk = false;
    check("blur preserves a constant field", flatOk);

    // normal map: a linear x-ramp tilts nx only, interior is uniform
    var NW = 9, NH = 5;
    var ramp = new Float32Array(NW * NH);
    for (var y = 0; y < NH; y++) {
      for (var x = 0; x < NW; x++) ramp[y * NW + x] = x / (NW - 1);
    }
    var nm = VB.matcapNormalMap(ramp, NW, NH, 2.0);
    var o = (2 * NW + 4) * 3; // center texel
    // dx = 1/(NW-1) = 0.125; nx = -0.25 before normalize; ny = 0
    var exp = -0.25 / Math.sqrt(1 + 0.0625);
    check("Sobel normal of an x-ramp: nx exact, ny 0",
      Math.abs(nm[o] - exp) < 1e-6 && Math.abs(nm[o + 1]) < 1e-9 &&
      nm[o + 2] > 0.9, nm[o] + "," + nm[o + 1] + "," + nm[o + 2]);

    // builtin matcaps: deterministic, lit from the upper-left
    var tex = VB.builtinMatcap("studio");
    var c0 = tex.data[(64 * 256 + 64) * 4];      // upper-left of the sphere
    var c1 = tex.data[(192 * 256 + 192) * 4];    // lower-right
    check("studio matcap is lit from the upper-left",
      tex.w === 256 && c0 > c1 + 40, c0 + " vs " + c1);
    check("all four builtins generate",
      VB.matcapBuiltins.every(function (n) {
        var t = VB.builtinMatcap(n);
        return t.data.length === 256 * 256 * 4;
      }));

    // whole pipeline on a synthetic square fill
    var mdoc = new VB.Y2KVectorDocument();
    mdoc.width = 11000; mdoc.height = 8000;
    mdoc.fills.push(VB.materialDefaults("matcap"));
    mdoc.edges.push(
      VB.edge(1000, 1000, null, null, 5000, 1000, 0, 1, 0),
      VB.edge(5000, 1000, null, null, 5000, 4000, 0, 1, 0),
      VB.edge(5000, 4000, null, null, 1000, 4000, 0, 1, 0),
      VB.edge(1000, 4000, null, null, 1000, 1000, 0, 1, 0));
    var buf = VB.matcapBuffers(mdoc, 1, mdoc.fills[0], 64);
    var ctr = ((buf.h >> 1) * buf.w + (buf.w >> 1));
    check("pipeline buffers: square coverage, flat center normal",
      buf && buf.mask[ctr] === 1 &&
      buf.height[ctr] > 0.9 &&
      Math.abs(buf.normals[ctr * 3]) < 0.05 &&
      Math.abs(buf.normals[ctr * 3 + 1]) < 0.05 &&
      buf.normals[ctr * 3 + 2] > 0.95,
      buf ? buf.w + "×" + buf.h + " n=" + buf.normals[ctr * 3 + 2] : "null");
    var px = VB.matcapPixels(buf, VB.builtinMatcap("studio"));
    check("matcap pixels: opaque inside the region",
      px[ctr * 4 + 3] === 255 && px[3] === 0 /* corner texel outside? */ ||
      px[ctr * 4 + 3] === 255,
      px[ctr * 4 + 3] + "/" + px[3]);
    var d1 = VB.matcapDebugCanvas(buf, "bump");
    var d2 = VB.matcapDebugCanvas(buf, "normal");
    check("debug views render bump and normal canvases",
      d1.width === buf.w && d2.width === buf.w);

    // scanline coverage === per-pixel ray casting, on real curved
    // geometry (the perf path must not change a single pixel)
    var cdoc = (await VB.replayJournal([
      { op: "new", width: 11000, height: 8000 },
      { op: "brush", points: [{ x: 2000, y: 2500 }, { x: 4000, y: 2000 },
                              { x: 5000, y: 4000 }, { x: 3000, y: 4500 }],
        radius: 500, color: { r: 5, g: 5, b: 5, a: 255 } }
    ])).doc;
    var cbuf = VB.matcapBuffers(cdoc, 1, VB.materialDefaults("matcap"), 48);
    var mism = 0;
    for (var cy2 = 0; cy2 < cbuf.h; cy2++) {
      for (var cx2 = 0; cx2 < cbuf.w; cx2++) {
        var wx = cbuf.bbox.xmin + (cx2 + 0.5) * (cbuf.bbox.xmax - cbuf.bbox.xmin) / cbuf.w;
        var wy = cbuf.bbox.ymin + (cy2 + 0.5) * (cbuf.bbox.ymax - cbuf.bbox.ymin) / cbuf.h;
        var ref = VB.geom.fillParity(cdoc.edges, 1, wx, wy) ? 1 : 0;
        if (ref !== cbuf.mask[cy2 * cbuf.w + cx2]) mism++;
      }
    }
    check("scanline coverage matches per-pixel parity exactly",
      mism === 0, mism + " mismatched texels of " + (cbuf.w * cbuf.h));

    // embedded matcap textures decode: a real PNG b64 goes from
    // "loading" (null) to a 256² texture, with onMatcapReady fired —
    // the custom "Load…" pipeline end to end
    var tinyCv = document.createElement("canvas");
    tinyCv.width = 8; tinyCv.height = 8;
    var tinyCtx = tinyCv.getContext("2d");
    tinyCtx.fillStyle = "rgb(200,50,25)";
    tinyCtx.fillRect(0, 0, 8, 8);
    var tinyB64 = tinyCv.toDataURL("image/png").split(",")[1];
    var embStyle = VB.materialDefaults("matcap");
    embStyle.matcap = { b64: tinyB64 };
    var ready = new Promise(function (resolve) {
      var prevReady = VB.onMatcapReady;
      VB.onMatcapReady = function () {
        VB.onMatcapReady = prevReady;
        resolve();
      };
      setTimeout(resolve, 3000); // decode watchdog
    });
    var first = VB.matcapTexture(embStyle);
    await ready;
    var texEmb = VB.matcapTexture(embStyle);
    check("embedded matcap decodes to a usable texture",
      first === null && texEmb && texEmb.w === 256 &&
      texEmb.data[0] > 150 && texEmb.data[1] < 120,
      (first === null) + "/" + (texEmb && texEmb.w) + "/" +
      (texEmb && texEmb.data[0] + "," + texEmb.data[1]));

    // vbd: tag-4 matcap with builtin id and embedded texture round-trips
    var mstyle = VB.materialDefaults("matcap");
    mstyle.matcap = "chrome";
    var mdoc2 = new VB.Y2KVectorDocument();
    mdoc2.width = 11000; mdoc2.height = 8000;
    mdoc2.fills.push(mstyle);
    mdoc2.fills.push({ type: "matcap", color: { r: 1, g: 2, b: 3, a: 255 },
                       matcap: { b64: "aGVsbG8h" },
                       bumpScale: 40, blurPx: 1, resolution: 1 });
    var mbytes = await VB.encodeY2KVector(mdoc2);
    var mdec = await VB.decodeY2KVector(mbytes);
    var mback = mdec.doc || mdec.project.activeCell();
    check("vbd round-trips builtin matcap id",
      mback.fills[0].matcap === "chrome", JSON.stringify(mback.fills[0].matcap));
    check("vbd round-trips embedded matcap texture",
      mback.fills[1].matcap && mback.fills[1].matcap.b64 === "aGVsbG8h",
      JSON.stringify(mback.fills[1].matcap));
  })();

  // ======================= pixi backend: pure helpers ===========================
  // GPU-free pieces of the Pixi backend (the full renderer gates on
  // app/test/pixi-parity.html, which needs WebGL).
  log("pixi backend helpers:");
  (function () {
    // hole nesting: square, its hole, a sibling, an island in the hole
    var sq = function (x0, y0, s) {
      return { sx: x0, sy: y0, pts: [
        { x: x0 + s, y: y0, cx: null, cy: null },
        { x: x0 + s, y: y0 + s, cx: null, cy: null },
        { x: x0, y: y0 + s, cx: null, cy: null },
        { x: x0, y: y0, cx: null, cy: null }], closed: true };
    };
    var nested = VB.pixiAssignHoles([
      sq(0, 0, 1000), sq(200, 200, 600), sq(2000, 0, 300), sq(350, 350, 100)
    ], VB.pixiFlattenChain);
    check("hole nesting depths 0/1/0/2",
      nested[0].depth === 0 && nested[1].depth === 1 &&
      nested[2].depth === 0 && nested[3].depth === 2,
      nested.map(function (e) { return e.depth; }).join("/"));
    check("hole attaches to its outline",
      nested[0].children.length === 1 && nested[0].children[0] === 1);
    check("hairline floor", VB.pixiHairWidth(20, 1) === 20 &&
      VB.pixiHairWidth(5, 1) === 20 && VB.pixiHairWidth(5, 4) === 5);
    // content hash: stable, and sensitive to claim changes
    var hd = new VB.Y2KVectorDocument();
    hd.width = 11000; hd.height = 8000;
    hd.fills.push({ type: "solid", color: { r: 1, g: 2, b: 3, a: 255 } });
    hd.edges.push(VB.edge(0, 0, null, null, 100, 0, 0, 1, 0));
    var h1 = VB.pixiHashCell(hd);
    check("cell hash is stable", h1 === VB.pixiHashCell(hd));
    hd.edges[0].fill1 = 0;
    check("cell hash tracks claim changes", h1 !== VB.pixiHashCell(hd));
  })();

  // ======================= OperationEstimator ===================================
  // Estimates are analytic and deterministic (docs/OperationEstimator.md)
  // — exact literals pin the formulas for clean cases; structure,
  // warnings and determinism cover the rest.
  log("OperationEstimator:");
  await (async function () {
    // material paint estimate: 2000×2000tw = 100×100px = 0.01 Mpx
    var box = { xmin: 0, ymin: 0, xmax: 2000, ymax: 2000 };
    var mp = VB.estimateMaterialPaint(
      { type: "solid", color: { r: 1, g: 2, b: 3, a: 255 } }, box);
    check("solid paint = 10000 px-ops over 0.01Mpx",
      mp.paintPxOps === 10000 && mp.textureBytes === 0 && mp.gpuPasses === 0,
      JSON.stringify(mp));
    mp = VB.estimateMaterialPaint(VB.materialDefaults("matcap"), box);
    check("matcap paint = 280000 px-ops + 120000 tex bytes + 4 passes",
      mp.paintPxOps === 280000 && mp.textureBytes === 120000 && mp.gpuPasses === 4,
      JSON.stringify(mp));

    // line into an EMPTY doc: 2+12+20+0+0 cpu, 40 record bits = 74
    var edoc = new VB.Y2KVectorDocument();
    edoc.width = 11000; edoc.height = 8000;
    var lineOp = { op: "line", a: { x: 1000, y: 1000 }, b: { x: 5000, y: 4000 },
                   style: { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } } };
    var lp = VB.operationEstimate({ doc: edoc }, lineOp, { phase: "preflight" });
    check("line into empty doc scores exactly 74 (ok)",
      lp.totals.score === 74 && lp.totals.cpuUnits === 34 &&
      lp.totals.recordBits === 40 && lp.level === "ok",
      JSON.stringify(lp.totals));

    // renderFrame of a 4-edge filled square: cpu 20 + solid paint over
    // the 550×400px stage (220000 px-ops) = 220020
    var rdoc2 = new VB.Y2KVectorDocument();
    rdoc2.width = 11000; rdoc2.height = 8000;
    rdoc2.fills.push({ type: "solid", color: { r: 9, g: 9, b: 9, a: 255 } });
    rdoc2.edges.push(
      VB.edge(1000, 1000, null, null, 5000, 1000, 0, 1, 0),
      VB.edge(5000, 1000, null, null, 5000, 4000, 0, 1, 0),
      VB.edge(5000, 4000, null, null, 1000, 4000, 0, 1, 0),
      VB.edge(1000, 4000, null, null, 1000, 1000, 0, 1, 0));
    var rp = VB.operationEstimate({ doc: rdoc2 }, { op: "renderFrame" },
                                  { phase: "preflight" });
    check("renderFrame square scores exactly 220020",
      rp.totals.score === 220020 && rp.totals.cpuUnits === 20 &&
      rp.totals.paintPxOps === 220000, JSON.stringify(rp.totals));

    // fixed shape geometry
    var rectP = VB.operationEstimate({ doc: edoc },
      { op: "rect", x0: 1000, y0: 1000, x1: 4000, y1: 3000,
        fill: { r: 1, g: 2, b: 3, a: 255 } }, { phase: "preflight" });
    var ovalP = VB.operationEstimate({ doc: edoc },
      { op: "oval", x0: 1000, y0: 1000, x1: 4000, y1: 3000,
        fill: { r: 1, g: 2, b: 3, a: 255 } }, { phase: "preflight" });
    check("rect G=4, oval G=8 (documented constants)",
      rectP.stages[0].count === 4 && ovalP.stages[0].count === 8,
      rectP.stages[0].count + "/" + ovalP.stages[0].count);

    // eraser blank-space short circuit
    var ep = VB.operationEstimate({ doc: edoc },
      { op: "erase", points: [{ x: 1000, y: 1000 }, { x: 2000, y: 1000 }],
        radius: 200 }, { phase: "preflight" });
    check("blank erase warns blank-erase",
      ep.warnings.some(function (w) { return w.code === "blank-erase"; }),
      JSON.stringify(ep.warnings));

    // fillStyle mutates zero geometry: no pair-test/noding stages
    var fdoc2 = (await VB.replayJournal([
      { op: "new", width: 11000, height: 8000 },
      { op: "brush", points: [{ x: 2000, y: 2000 }, { x: 3000, y: 2000 }],
        radius: 300, color: { r: 102, g: 204, b: 255, a: 255 } }
    ])).doc;
    var fp = VB.operationEstimate({ doc: fdoc2 },
      { op: "fillStyle", index: 0, style: VB.materialDefaults("linear") },
      { phase: "preflight" });
    check("fillStyle estimates zero geometry mutation",
      !fp.stages.some(function (s) { return s.unit === "pair-test"; }),
      JSON.stringify(fp.stages.map(function (s) { return s.unit; })));

    // determinism: same doc + same op = byte-identical profile
    var bop = { op: "brush", points: [{ x: 2500, y: 2100 }, { x: 3500, y: 2300 }],
                radius: 250, color: { r: 10, g: 20, b: 30, a: 255 } };
    var e1 = VB.operationEstimate({ doc: fdoc2 }, bop, { phase: "preflight" });
    var e2 = VB.operationEstimate({ doc: fdoc2 }, bop, { phase: "preflight" });
    check("estimates are deterministic",
      JSON.stringify(e1) === JSON.stringify(e2));

    // every op returns a valid profile; unknown ops degrade gracefully
    var kinds = ["pencil", "line", "brush", "erase", "bucket", "rect", "oval",
                 "fillStyle", "paste", "regionTransform", "regionDelete",
                 "transformSel", "deleteSel", "textCreate", "textBreak",
                 "undo", "layerAdd", "zzz-not-an-op"];
    var allValid = kinds.every(function (k) {
      var p = VB.operationEstimate({ doc: fdoc2 },
        { op: k, points: [{ x: 1000, y: 1000 }], index: 0,
          x: 1000, y: 1000, x0: 0, y0: 0, x1: 100, y1: 100,
          a: { x: 0, y: 0 }, b: { x: 10, y: 10 } }, { phase: "preflight" });
      return p && p.totals.score >= 0 && p.stages.length > 0 &&
        p.stages.every(function (s) { return s.count >= 0 && s.score >= 0; });
    });
    check("every op kind yields a valid non-negative profile", allValid);

    // postcommit: comparison block + anomaly warnings
    var post = VB.operationEstimate({ doc: fdoc2 }, bop, {
      phase: "postcommit",
      result: { boundary: 0, removed: 0 },
      preflight: { totals: { score: 60000 } }
    });
    check("postcommit flags unexpected-noop",
      post.confidence === "postcommit" && post.comparison &&
      post.warnings.some(function (w) { return w.code === "unexpected-noop"; }),
      JSON.stringify(post.warnings));
    var post2 = VB.operationEstimate({ doc: fdoc2 }, bop, {
      phase: "postcommit",
      result: { boundary: 40 },
      preflight: { totals: { score: 10 } }
    });
    check("postcommit flags unexpected-growth",
      post2.warnings.some(function (w) { return w.code === "unexpected-growth"; }) &&
      post2.comparison.ratio > 2,
      JSON.stringify(post2.comparison));
  })();

  // ======================= clipboard: copy / paste commands =====================
  // Copy captures a self-contained clip (plain planar-map JSON); paste
  // is ONE registered command dispatched by the same registry live and
  // in replay. Text copies as textCreate ops.
  log("clipboard:");
  await (async function () {
    var blue = { r: 102, g: 204, b: 255, a: 255 };
    var ops0 = [
      { op: "new", width: 11000, height: 8000 },
      { op: "brush", points: [{ x: 2000, y: 2000 }, { x: 3000, y: 2200 }],
        radius: 300, color: blue }
    ];
    var r0 = await VB.replayJournal(ops0);
    check("clipboard body painted", VB.geom.fillAt(r0.doc, 2500, 2100) === 1);
    var band = [{ x: 1500, y: 1500 }, { x: 3600, y: 1500 },
                { x: 3600, y: 2700 }, { x: 1500, y: 2700 }];
    var clip = VB.clipFromLifted(VB.regionLift(r0.doc, band), null);
    check("region copy captures the blob",
      clip.edges.length > 0 && clip.fills.length === 1,
      clip.edges.length + " edges");
    var r1 = await VB.replayJournal(ops0.concat([
      { op: "paste", clip: clip, m: [1, 0, 0, 1, 4000, 500] }
    ]));
    check("paste replays consistent",
      VB.integrityReport(r1.doc).length === 0, VB.integrityReport(r1.doc)[0]);
    check("pasted copy lands at the offset, original untouched",
      VB.geom.fillAt(r1.doc, 6500, 2600) === 1 &&
      VB.geom.fillAt(r1.doc, 2500, 2100) === 1,
      VB.geom.fillAt(r1.doc, 6500, 2600) + "/" + VB.geom.fillAt(r1.doc, 2500, 2100));
    var r2 = await VB.replayJournal(ops0.concat([
      { op: "paste", clip: clip, m: [1, 0, 0, 1, 4000, 500] },
      { op: "undo" }
    ]));
    check("paste is one undo step",
      VB.geom.fillAt(r2.doc, 6500, 2600) === 0 &&
      VB.geom.fillAt(r2.doc, 2500, 2100) === 1);

    // paste-as-float: the pasted clip is an UNCOMMITTED transform
    // float — the document is untouched while the user places it;
    // click-away lands exactly ONE paste op at the final placement,
    // and cancelling drops the float without journaling anything.
    var fdoc = (await VB.replayJournal(ops0)).doc;
    var beforeEdges = fdoc.edges.length;
    var fproj = VB.wrapDoc(fdoc);
    var journalF = [], toolF;
    var appF = {
      doc: fdoc,
      view: { zoom: 1 },
      record: function (op) { journalF.push(op); },
      history: new VB.History(),
      docChanged: function () { toolF.discard(); },
      requestRender: function () {}, setMsg: function () {},
      setCursor: function () {},
      exec: function (op) {
        appF.record(op);
        VB.applyOp({ doc: fdoc, project: fproj, history: appF.history,
                     sync: function () {} }, op);
        appF.docChanged();
      }
    };
    toolF = VB.FreeTransformTool(appF);
    check("adoptClip floats without touching the doc",
      toolF.adoptClip(clip, [1, 0, 0, 1, 4000, 500]) === true &&
      fdoc.edges.length === beforeEdges &&
      toolF.hasSession() && !!toolF.float,
      fdoc.edges.length + " edges, session " + toolF.hasSession());
    var fb = toolF.box;
    var fcx = (fb.x0 + fb.x1) / 2 + 4000, fcy = (fb.y0 + fb.y1) / 2 + 500;
    toolF.onDown({ x: fcx, y: fcy }, {});
    toolF.onMove({ x: fcx + 500, y: fcy + 300 });
    toolF.onUp({ x: fcx + 500, y: fcy + 300 });
    check("float drag journals nothing, doc untouched",
      journalF.length === 0 && fdoc.edges.length === beforeEdges,
      journalF.length + " ops, " + fdoc.edges.length + " edges");
    toolF.onDown({ x: 10800, y: 7800 }, {}); // click away commits
    toolF.onUp({ x: 10800, y: 7800 });
    check("click-away lands ONE paste op",
      journalF.length === 1 && journalF[0].op === "paste",
      JSON.stringify(journalF.map(function (o) { return o.op; })));
    check("paste lands at final position, original intact",
      VB.geom.fillAt(fdoc, 7000, 2900) === 1 &&
      VB.geom.fillAt(fdoc, 2500, 2100) === 1,
      VB.geom.fillAt(fdoc, 7000, 2900) + "/" + VB.geom.fillAt(fdoc, 2500, 2100));
    var afterCommit = fdoc.edges.length;
    toolF.adoptClip(clip, [1, 0, 0, 1, 4000, 500]);
    toolF.undoPending(); // pops the seed gesture -> zero -> cancel
    check("undo-to-zero cancels the paste outright",
      journalF.length === 1 && fdoc.edges.length === afterCommit &&
      !toolF.hasSession(),
      journalF.length + " ops, session " + toolF.hasSession());

    // text copy: self-contained parts recreate the block in a FRESH doc
    var ttfC = VB.parseTTF(window.VBTTFFixture.bytes());
    var tdc = new VB.Y2KVectorDocument();
    tdc.width = 11000; tdc.height = 8000;
    VB.textApplyOp(tdc, VB.buildTextOp(ttfC, { name: "VBTest" }, "AB AB", 400,
      { r: 20, g: 60, b: 200, a: 255 }, 1000, 1000, 1500, 1, 30));
    var parts = VB.textCopyOps(tdc, tdc.texts[0]);
    check("text copy yields one self-contained part",
      parts.length === 1 && parts[0].font.glyphs.length > 0,
      parts.length + " parts");
    var tdc2 = new VB.Y2KVectorDocument();
    tdc2.width = 11000; tdc2.height = 8000;
    VB.textApplyOp(tdc2, parts[0]);
    var srcB = tdc.texts[0], dstB = tdc2.texts[0];
    function advs(b) {
      return JSON.stringify(b.records.map(function (r) {
        return r.glyphs.map(function (g) { return g.adv; });
      }));
    }
    check("text paste recreates records verbatim",
      dstB.records.length === srcB.records.length &&
      advs(dstB) === advs(srcB) &&
      dstB.wrapWidth === srcB.wrapWidth && dstB.spacing === srcB.spacing,
      advs(dstB) + " vs " + advs(srcB));
  })();

  // ======================= unit tests: shape primitives =====================
  // Line (N) / Oval (O) / Rectangle (R): filled shapes run the brush's
  // boolean-mask pipeline (paint-over beneath, stroke stamped on the
  // fence); stroke-only shapes and lines are planar merges.
  log("shape primitives:");
  await (async function () {
    var red = { r: 204, g: 102, b: 102, a: 255 };
    var blue = { r: 102, g: 204, b: 255, a: 255 };
    var blk = { width: 40, color: { r: 0, g: 0, b: 0, a: 255 } };

    // 1. filled + stroked oval on a blank canvas
    var doc = new VB.Y2KVectorDocument();
    doc.width = 11000; doc.height = 8000;
    var n = VB.shapeCommit(doc, VB.ellipseLoop(4000, 3000, 2000, 1500), red, blk);
    check("oval is 8 records", n === 8, n + " records");
    check("oval filled inside", VB.geom.fillAt(doc, 4000, 3000) === 1);
    check("oval empty outside", VB.geom.fillAt(doc, 500, 500) === 0);
    check("oval boundary carries the stroke",
      doc.edges.length > 0 && doc.edges.every(function (e) { return e.line === 1; }));
    check("oval consistent", VB.integrityReport(doc).length === 0,
      VB.integrityReport(doc)[0]);

    // 2. filled no-stroke rect PAINTS OVER underlying art
    VB.brushStroke(doc, [{ x: 1000, y: 6000 }, { x: 9000, y: 6000 }], 400, blue);
    var blueIdx = VB.geom.fillAt(doc, 5000, 6000);
    check("brush band painted", blueIdx > 0);
    VB.shapeCommit(doc, VB.rectLoop(4000, 5000, 7000, 7000), red, null);
    check("rect filled inside", VB.geom.fillAt(doc, 5500, 6000) === 1);
    check("rect replaced covered paint", VB.geom.fillAt(doc, 5500, 6000) !== blueIdx);
    check("band outside rect survives", VB.geom.fillAt(doc, 2000, 6000) === blueIdx);
    check("rect consistent", VB.integrityReport(doc).length === 0,
      VB.integrityReport(doc)[0]);
    var phantom = doc.edges.filter(function (e) {
      return e.cx === null && e.line === 0 &&
        Math.hypot(e.bx - e.ax, e.by - e.ay) > 300;
    });
    check("lineless rect boundary is all-quad (census-safe)", phantom.length === 0,
      phantom.length + " straight lineless");

    // 3. line tool: merges into the map, splitting what it crosses
    var before = doc.edges.length;
    VB.lineCommit(doc, { x: 3000, y: 4600 }, { x: 8000, y: 4600 }, blk);
    check("line merged", doc.edges.length > before,
      doc.edges.length + " vs " + before);
    check("line consistent", VB.integrityReport(doc).length === 0,
      VB.integrityReport(doc)[0]);

    // 4. journal replay of all three primitives + undo/redo
    var ops = [
      { op: "new", width: 11000, height: 8000 },
      { op: "oval", x0: 2000, y0: 1500, x1: 6000, y1: 4500, fill: red, line: blk },
      { op: "rect", x0: 4000, y0: 5000, x1: 7000, y1: 7000, fill: red, line: null },
      { op: "line", a: { x: 1000, y: 1000 }, b: { x: 9000, y: 1000 },
        style: blk, snapTol: 55 },
      { op: "undo" },
      { op: "redo" }
    ];
    var res = await VB.replayJournal(ops);
    check("primitives replay deterministically",
      res.doc.edges.length > 10 && VB.integrityReport(res.doc).length === 0,
      res.doc.edges.length + " edges; " + VB.integrityReport(res.doc)[0]);
    check("replayed oval still filled", VB.geom.fillAt(res.doc, 4000, 3000) === 1);
  })();

  // ======================= unit tests: arrow tool ===========================
  // Semantics from the Arrow001 reference diffs: reshape pins endpoints
  // and solves the quad control through the drag point (Arrow002->003 is
  // L->Q with identical endpoints); node moves carry incident records;
  // fills lift-and-drop with paint-over; deleting a fill stamps its own
  // sides empty.
  log("arrow tool:");
  await (async function () {
    var red = { r: 204, g: 102, b: 102, a: 255 };
    var blk = { width: 40, color: { r: 0, g: 0, b: 0, a: 255 } };

    // 1. reshape a straight stroke: L -> Q, endpoints pinned, curve
    //    through the drag point
    var doc = new VB.Y2KVectorDocument();
    doc.width = 11000; doc.height = 8000;
    VB.lineCommit(doc, { x: 2000, y: 2000 }, { x: 8000, y: 2000 }, blk, 0);
    check("reshape target is one straight record",
      doc.edges.length === 1 && doc.edges[0].cx === null);
    var key = VB.arrowEdgeKey(doc.edges[0]);
    VB.arrowReshape(doc, key, 0.5, 5000, 3000);
    check("reshape L->Q", doc.edges.length === 1 && doc.edges[0].cx !== null);
    check("reshape endpoints pinned",
      doc.edges[0].ax === 2000 && doc.edges[0].ay === 2000 &&
      doc.edges[0].bx === 8000 && doc.edges[0].by === 2000);
    var mid = VB.geom.evalEdge(doc.edges[0], 0.5);
    check("reshaped curve passes through the drag point",
      Math.hypot(mid.x - 5000, mid.y - 3000) < 3,
      "(" + Math.round(mid.x) + "," + Math.round(mid.y) + ")");
    check("reshape keeps the stroke", doc.edges[0].line === 1);

    // 2. move a stroked rectangle's corner node

    doc2.width = 11000; doc2.height = 8000;
    VB.shapeCommit(doc2, VB.rectLoop(2100, 3700, 6300, 5400), null, blk);
    VB.arrowMoveNode(doc2, 2100, 3700, 1500, 1200);
    var atNew = 0, atOld = 0;
    doc2.edges.forEach(function (e) {
      if ((e.ax === 1500 && e.ay === 1200) || (e.bx === 1500 && e.by === 1200)) atNew++;
      if ((e.ax === 2100 && e.ay === 3700) || (e.bx === 2100 && e.by === 3700)) atOld++;
    });

      atNew + " at new, " + atOld + " at old");
    check("node move consistent", VB.integrityReport(doc2).length === 0,
      VB.integrityReport(doc2)[0]);

    // 3. fill face: lift-and-drop, then delete

    doc3.width = 11000; doc3.height = 8000;

    VB.arrowMoveFill(doc3, 4000, 3000, 3000, 1500);

    check("moved fill: destination filled", VB.geom.fillAt(doc3, 7000, 4500) === 1);
    check("moved fill consistent", VB.integrityReport(doc3).length === 0,

    VB.lineCommit(doc5, { x: 3000, y: 2000 }, { x: 5000, y: 1000 }, blk, 0);
    VB.lineCommit(doc5, { x: 5000, y: 1000 }, { x: 7000, y: 2200 }, blk, 0);
    VB.lineCommit(doc5, { x: 1000, y: 6000 }, { x: 7000, y: 6000 }, blk, 0); // detached

    VB.shapeCommit(doc6, VB.rectLoop(5000, 2000, 8000, 5000), red, blk);
    var borderKeys = [];
    doc6.edges.forEach(function (e) {
      if (e.line > 0 && e.ax === 5000 && e.bx === 5000) {
        borderKeys.push(VB.arrowEdgeKey(e));
      }
    });
    check("shared border found", borderKeys.length > 0, borderKeys.length + " records");
    VB.arrowDeleteSel(doc6, [], borderKeys);
    var borderLeft = doc6.edges.some(function (e) {
      if (e.ax !== 5000 || e.bx !== 5000) return false;
      var m6 = VB.geom.evalEdge(e, 0.5);
      return m6.y > 2100 && m6.y < 4900;
    });
    check("same-color fills collapsed (border gone)", !borderLeft);
    check("merged region still filled",
      VB.geom.fillAt(doc6, 3500, 3500) === VB.geom.fillAt(doc6, 6500, 3500) &&
      VB.geom.fillAt(doc6, 3500, 3500) > 0);
    check("collapse consistent", VB.integrityReport(doc6).length === 0,
      VB.integrityReport(doc6)[0]);

    // 7. free transform: rotate 90° + scale 1.5 about the fill's center
    var doc7 = new VB.Y2KVectorDocument();
    doc7.width = 11000; doc7.height = 8000;

    check("transform consistent", VB.integrityReport(doc7).length === 0,

    var ops8 = [
      { op: "new", width: 11000, height: 8000 },
      { op: "rect", x0: 2000, y0: 2000, x1: 4000, y1: 4000, fill: red, line: null },
      { op: "line", a: { x: 2000, y: 5000 }, b: { x: 4000, y: 5000 },
        style: blk, snapTol: 0 }
    ];
    var res8a = await VB.replayJournal(ops8);
    var strokeKey = null;
    res8a.doc.edges.forEach(function (e) {

    check("transformSel replay consistent",

    doc9.width = 11000; doc9.height = 8000;

    check("marquee cut: source of chunk empty", VB.geom.fillAt(doc9, 5000, 3000) === 0);
    check("marquee cut: moved chunk filled", VB.geom.fillAt(doc9, 8000, 3000) === 1);

    VB.regionDelete(doc9, tri);
    check("lasso delete: wedge erased", VB.geom.fillAt(doc9, 2800, 2600) === 0);
    check("lasso delete: rest intact", VB.geom.fillAt(doc9, 2200, 3800) === 1);
    check("lasso delete consistent", VB.integrityReport(doc9).length === 0,

    // 11. region ops replay deterministically (with a stroke crossing)

      { op: "new", width: 11000, height: 8000 },
      { op: "rect", x0: 2000, y0: 2000, x1: 6000, y1: 4000, fill: red, line: null },
      { op: "line", a: { x: 1000, y: 3000 }, b: { x: 7000, y: 3000 },

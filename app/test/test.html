        .poses[0].symbols[0].symbols[0].drawings[0].cell.edges.length ===
        pupilCell.edges.length,
      ase.project.actors.length + " actors after undo");

    // .y2kactor: export → import regenerates every id, art byte-identical
    var bytesA = VB.encodeY2KActor(VB.actorById(ase.project, "actor_t1"));
    var imported = VB.decodeY2KActor(bytesA);
    check("y2kactor import regenerates ids",
      imported.id !== "actor_t1" &&
      imported.poses[0].id !== "pose_t1" &&
      imported.poses[0].symbols[0].id !== "sym_eyes" &&
      imported.poses[0].symbols[0].symbols[0].drawings[0].id !== "drw_p1",
      imported.id);
    ase.exec({ op: "actorImport", actor: imported });
    var impLive = VB.actorById(ase.project, imported.id);
    check("actorImport lands the copy with identical art",
      ase.project.actors.length === 3 &&
      JSON.stringify(impLive.poses[0].symbols[0].symbols[0].drawings[0]
        .cell.edges) === JSON.stringify(pupilCell.edges),
      ase.project.actors.length + " actors");
    // full-cell replay equality on the IMPORTED actor: its art travels
    // INSIDE the actorImport op (t1's direct-drawn art journals in the
    // beat-2 editing slice)
    var repImp = await VB.replayJournal(JSON.parse(JSON.stringify(ase.journal)));
    check("actorImport replays byte-exact (art included)",
      JSON.stringify(VB.actorToPlain(
        VB.actorById(repImp.project, imported.id))) ===
      JSON.stringify(VB.actorToPlain(impLive)));

    // edit target: journaled symbol-edit mode — the active cell, the
    // stage rect, and every journaled ART op retarget to the actor cell,
    // and replay agrees because the mode switch is itself an op
    var sceneCell = ase.project.scenes[0].layers[0].frames[0];
    var sceneEdges = sceneCell.edges.length;
    ase.exec({ op: "editTargetSet",
               target: { actor: "actor_t2", pose: "pose_t2" } });
    var t2cell = VB.actorById(ase.project, "actor_t2").poses[0].cell;
    check("edit target retargets the active cell",
      ase.project.activeCell() === t2cell &&
      ase.project.stage().width === 15360 &&
      ase.project.scene().layers.length === 1,
      ase.project.scene().layers[0].name);
    ase.exec({ op: "brush",
               points: [{ x: 2000, y: 3000 }, { x: 9000, y: 3600 }],
               radius: 400, color: { r: 220, g: 40, b: 40, a: 255 } });
    ase.exec({ op: "pencil",
               points: [{ x: 1500, y: 6000 }, { x: 9000, y: 6400 }],
               style: { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } } });
    check("journaled art ops land in the actor cell, not the scene",
      t2cell.edges.length > 0 && sceneCell.edges.length === sceneEdges,
      t2cell.edges.length + " actor edges, scene " +
      sceneCell.edges.length + "/" + sceneEdges);
    check("actor-mode undo restores the actor cell",
      (function () {
        var before = t2cell.edges.length;
        ase.history.undo(); // undoes the pencil
        var after = VB.actorById(ase.project, "actor_t2").poses[0].cell.edges.length;
        return after < before;
      })(), "");
    ase.history.redo();
    ase.exec({ op: "editTargetClear" });
    // undo/redo rebuilt every cell object — compare against the LIVE one
    check("clearing the target returns to the scene cell",
      ase.project.activeCell() === ase.project.scenes[0].layers[0].frames[0] &&
      ase.project.stage().width === 11000);
    var repT = await VB.replayJournal(JSON.parse(JSON.stringify(ase.journal)));
    check("actor art ops replay byte-exact through the mode switch",
      JSON.stringify(VB.actorById(repT.project, "actor_t2").poses[0].cell.edges) ===
      JSON.stringify(VB.actorById(ase.project, "actor_t2").poses[0].cell.edges),
      VB.actorById(repT.project, "actor_t2").poses[0].cell.edges.length + " edges");

    // the oracle renders the actor cell in edit mode (stage + art)
    ase.exec({ op: "editTargetSet",
               target: { actor: "actor_t2", pose: "pose_t2" } });
    var ecv = document.createElement("canvas");
    ecv.width = 550; ecv.height = 400;
    var ectx = ecv.getContext("2d");
    VB.renderProject(ectx, ase.project, { zoom: 0.5, panX: 0, panY: 0, dpr: 1 });
    var brushPx = ectx.getImageData(
      Math.round(2000 / 20 * 0.5) + 50, Math.round(3000 / 20 * 0.5), 1, 1).data;
    var brushMid = ectx.getImageData(
      Math.round(5500 / 20 * 0.5), Math.round(3300 / 20 * 0.5), 1, 1).data;
    check("edit-mode render shows the actor art",
      (brushMid[0] > 180 && brushMid[1] < 120) ||
      (brushPx[0] > 180 && brushPx[1] < 120),
      "rgb(" + brushMid[0] + "," + brushMid[1] + "," + brushMid[2] + ")");
    ase.exec({ op: "editTargetClear" });

    // streamed thumbnails (thumbs.js — beat 3): oracle-rendered, keyed
    // by content hash, AssetCache-tenanted, prefetcher-loaded
    var thCell = VB.actorById(ase.project, "actor_t2").poses[0].cell;
    var th1 = await VB.thumbRequest("pose:test", thCell, 48, 36, 1);
    var thPix = th1.getContext("2d").getImageData(17, 13, 1, 1).data;
    check("thumbnail shows the cell art",
      thPix[0] > 150 && thPix[1] < 130,
      "rgb(" + thPix[0] + "," + thPix[1] + "," + thPix[2] + ")");
    var thRenders = VB._thumbRenders;
    var th2 = await VB.thumbRequest("pose:test", thCell, 48, 36, 1);
    check("fresh thumbnails come from the cache",
      th2 === th1 && VB._thumbRenders === thRenders &&
      VB.thumbGet("pose:test", thCell) === th1);
    VB.pencilCommit(thCell, [{ x: 500, y: 500 }, { x: 14000, y: 700 }],
                    { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } });
    check("edited cells miss the cache",
      VB.thumbGet("pose:test", thCell) === null);
    var th3 = await VB.thumbRequest("pose:test", thCell, 48, 36, 1);
    check("edited cells re-render once",
      th3 !== th1 && VB._thumbRenders === thRenders + 1);
    var thData3 = th3.getContext("2d").getImageData(0, 0, 48, 36).data;
    var thBudget = VB.assets.budget;
    VB.assets.setBudget(1);
    VB.assets.claim("test:thumbstarver", 2, function () {});
    check("a starved AssetCache drops the thumb",
      VB.thumbGet("pose:test", thCell) === null);
    var th4 = await VB.thumbRequest("pose:test", thCell, 48, 36, 1);
    VB.assets.release("test:thumbstarver");
    VB.assets.setBudget(thBudget);
    var thData4 = th4.getContext("2d").getImageData(0, 0, 48, 36).data;
    var thDiff = 0;
    for (var thI = 0; thI < thData3.length; thI++) {
      if (thData3[thI] !== thData4[thI]) thDiff++;
    }
    check("evicted thumbs recompute pixel-identical", thDiff === 0,
      thDiff + " differing bytes");

    // guards: the last pose / last drawing stay
    ase.exec({ op: "poseRemove", actor: "actor_t2", pose: "pose_t2" });
    check("the last pose cannot be removed",
      VB.actorById(ase.project, "actor_t2").poses.length === 1);
    check("wrong-version y2kactor is rejected", (function () {
      try {
        VB.decodeY2KActor(new TextEncoder().encode(
          '{"format":"y2kactor","version":9,"actor":{}}'));
        return false;
      } catch (e) { return /version 9/.test(e.message); }
    })());
  } catch (err) {
    fail++;
    log("  ACTORS EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // ============================== library =====================================
  // The object library (library.js): SYMBOLS — marquee/lasso selections
  // converted through their self-contained clip (the same payload the
  // clipboard carries) — and stage-sized BACKGROUNDS. Entries are
  // containers whose cells the whole tool suite edits through the
  // journaled editTarget; everything replays byte-exact.
  log("");
  log("library:");
  try {
    var lse = new VB.Session({ width: 11000, height: 8000 });
    lse.exec({ op: "brush",
               points: [{ x: 2000, y: 2000 }, { x: 3000, y: 2200 }],
               radius: 300, color: { r: 220, g: 40, b: 40, a: 255 } });
    var lband = [{ x: 1500, y: 1500 }, { x: 3600, y: 1500 },
                 { x: 3600, y: 2700 }, { x: 1500, y: 2700 }];
    var lclip = VB.clipFromLifted(
      VB.regionLift(lse.project.activeCell(), lband), null);
    check("marquee clip lifts the art",
      lclip.edges.length > 0 && lclip.fills.length === 1,
      lclip.edges.length + " edges");
    lse.exec({ op: "symbolCreate", id: "lib_s1",
               clip: JSON.parse(JSON.stringify(lclip)) });
    var libS1 = VB.libraryEntryById(lse.project, "lib_s1");
    check("convert-to-symbol lands in the library",
      lse.project.library.length === 1 && libS1 &&
      libS1.entry.kind === "symbol" && libS1.entry.name === "symbol 01" &&
      libS1.entry.cell.edges.length === lclip.edges.length &&
      VB.geom.fillAt(libS1.entry.cell, 2500, 2100) === 1,
      libS1 && libS1.entry.name);
    check("the original art stays in place",
      VB.geom.fillAt(lse.project.activeCell(), 2500, 2100) === 1);

    lse.exec({ op: "symbolCreate", id: "lib_bg1", kind: "background" });
    var libBg = VB.libraryEntryById(lse.project, "lib_bg1");
    check("backgrounds are stage-sized containers",
      libBg && libBg.entry.kind === "background" &&
      libBg.entry.cell.width === 11000 && libBg.entry.cell.height === 8000 &&
      libBg.entry.name === "background 01",
      libBg && libBg.entry.name);

    // the library cell takes journaled art through the edit target
    lse.exec({ op: "editTargetSet", target: { librarySymbol: "lib_bg1" } });
    check("edit target retargets to the library cell",
      lse.project.activeCell() === libBg.entry.cell &&
      lse.project.stage().width === 11000);
    lse.exec({ op: "pencil",
               points: [{ x: 1000, y: 1000 }, { x: 9000, y: 1400 }],
               style: { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } } });
    check("journaled art lands in the library cell",
      libBg.entry.cell.edges.length > 0,
      libBg.entry.cell.edges.length + " edges");
    lse.exec({ op: "editTargetClear" });

    lse.exec({ op: "symbolRename", id: "lib_s1", name: "hero blob" });
    check("symbolRename applies",
      VB.libraryEntryById(lse.project, "lib_s1").entry.name === "hero blob");

    var lPlain = function (p) {
      return JSON.stringify((p.library || []).map(function (e) {
        return { id: e.id, kind: e.kind, name: e.name,
                 w: e.cell.width, h: e.cell.height, edges: e.cell.edges };
      }));
    };
    var lRep = await VB.replayJournal(JSON.parse(JSON.stringify(lse.journal)));
    check("library replays byte-exact (cells included)",
      lPlain(lRep.project) === lPlain(lse.project));

    // journaled undo so the replay comparison still holds
    lse.exec({ op: "symbolRemove", id: "lib_s1" });
    check("delete drops the library entry",
      lse.project.library.length === 1 &&
      !VB.libraryEntryById(lse.project, "lib_s1"));
    lse.exec({ op: "undo" });
    check("undo restores the library (art included)",
      lse.project.library.length === 2 &&
      VB.libraryEntryById(lse.project, "lib_s1").entry.name === "hero blob" &&
      VB.geom.fillAt(
        VB.libraryEntryById(lse.project, "lib_s1").entry.cell, 2500, 2100) === 1);
    var lRep2 = await VB.replayJournal(JSON.parse(JSON.stringify(lse.journal)));
    check("remove/undo replays byte-exact",
      lPlain(lRep2.project) === lPlain(lse.project));
  } catch (err) {
    fail++;
    log("  LIBRARY EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // ================================ audio =====================================
  // The Audio section (audio.js, docs/AudioResearch.md): stems are
  // package units referenced by id — ops carry only integer-ms
  // structure, so the journal replays byte-exact with or without the
  // bytes. Plus the WAV codec that bakes the master.
  log("");
  log("audio:");
  try {
    var aue = new VB.Session({ width: 11000, height: 8000 });
    aue.exec({ op: "trackAdd", id: "au_t1" });
    aue.exec({ op: "trackAdd", id: "au_t2", name: "Dialogue" });
    aue.exec({ op: "audioImport", id: "au_a1", name: "rain",
               unit: "assets/audio/au_a1", duration: 4000,
               sampleRate: 48000, channels: 2 });
    check("tracks and stems land with auto/explicit names",
      aue.project.audio.tracks.length === 2 &&
      aue.project.audio.tracks[0].name === "Track 01" &&
      aue.project.audio.tracks[1].name === "Dialogue" &&
      aue.project.audio.assets.length === 1 &&
      aue.project.audio.assets[0].duration === 4000);

    check("audioHasClips is false before any clip",
      VB.audioHasClips(aue.project) === false);
    aue.exec({ op: "clipAdd", id: "au_c1", track: "au_t1",
               asset: "au_a1", at: 1000 });
    check("audioHasClips sees the clip (the animatic's audio gate)",
      VB.audioHasClips(aue.project) === true);
    var auC1 = VB.audioClipById(aue.project, "au_c1");
    check("clipAdd defaults to the whole stem at gain 1",
      auC1 && auC1.clip.at === 1000 && auC1.clip.offset === 0 &&
      auC1.clip.duration === 4000 && auC1.clip.gain === 1 &&
      VB.audioEndMs(aue.project) === 5000,
      JSON.stringify(auC1 && auC1.clip));

    aue.exec({ op: "clipMove", id: "au_c1", at: 500, track: "au_t2" });
    auC1 = VB.audioClipById(aue.project, "au_c1");
    check("clipMove crosses tracks",
      auC1.trackIndex === 1 && auC1.clip.at === 500 &&
      aue.project.audio.tracks[0].clips.length === 0);

    // trim: final values in the op; duration clamps to the stem tail
    aue.exec({ op: "clipTrim", id: "au_c1", at: 700,
               offset: 200, duration: 9999 });
    auC1 = VB.audioClipById(aue.project, "au_c1");
    check("clipTrim clamps duration to the stem tail",
      auC1.clip.at === 700 && auC1.clip.offset === 200 &&
      auC1.clip.duration === 3800,
      JSON.stringify(auC1.clip));

    aue.exec({ op: "clipGain", id: "au_c1", gain: 5 });
    check("clipGain clamps to [0,2]",
      VB.audioClipById(aue.project, "au_c1").clip.gain === 2);

    // replay byte-exact through every structural op
    var auRep = await VB.replayJournal(JSON.parse(JSON.stringify(aue.journal)));
    check("audio structure replays byte-exact",
      JSON.stringify(auRep.project.audio) ===
      JSON.stringify(aue.project.audio));

    // removing a stem removes its clips — ONE journaled undo restores
    aue.exec({ op: "clipAdd", id: "au_c2", track: "au_t1",
               asset: "au_a1", at: 0, duration: 1000 });
    aue.exec({ op: "audioRemove", id: "au_a1" });
    check("audioRemove cascades to every clip",
      aue.project.audio.assets.length === 0 &&
      aue.project.audio.tracks[0].clips.length === 0 &&
      aue.project.audio.tracks[1].clips.length === 0);
    aue.exec({ op: "undo" });
    check("undo restores the stem and both clips",
      aue.project.audio.assets.length === 1 &&
      aue.project.audio.tracks[0].clips.length === 1 &&
      VB.audioClipById(aue.project, "au_c1").clip.duration === 3800);
    var auRep2 = await VB.replayJournal(JSON.parse(JSON.stringify(aue.journal)));
    check("remove/undo replays byte-exact",
      JSON.stringify(auRep2.project.audio) ===
      JSON.stringify(aue.project.audio));

    // WAV codec: header + decode roundtrip through the real decoder
    var auN = 4800, auRate = 48000;
    var auSig = new Float32Array(auN);
    for (var auI = 0; auI < auN; auI++) {
      auSig[auI] = Math.sin(auI / auN * Math.PI * 2 * 10) * 0.5;
    }
    var auWav = VB.wavEncode([auSig], auRate);
    var auV = new DataView(auWav);
    check("wav header is well-formed",
      auWav.byteLength === 44 + auN * 2 &&
      auV.getUint32(4, true) === 36 + auN * 2 &&
      auV.getUint16(20, true) === 1 &&      // PCM
      auV.getUint16(22, true) === 1 &&      // mono
      auV.getUint32(24, true) === auRate &&
      auV.getUint16(34, true) === 16,
      auWav.byteLength + " bytes");
    var auOC = new OfflineAudioContext(1, 1, auRate);
    var auDecoded = await new Promise(function (res, rej) {
      auOC.decodeAudioData(auWav.slice(0), res, rej);
    });
    var auOut = auDecoded.getChannelData(0);
    var auErr = 0;
    for (var auJ = 0; auJ < auN; auJ++) {
      auErr = Math.max(auErr, Math.abs(auOut[auJ] - auSig[auJ]));
    }
    check("wav roundtrips through decodeAudioData",
      auDecoded.length === auN && auDecoded.sampleRate === auRate &&
      auErr < 1e-3,
      auDecoded.length + " samples, err " + auErr.toFixed(6));
  } catch (err) {
    fail++;
    log("  AUDIO EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // =============================== sequence ===================================
  // The master timeline (sequence.js): scene definitions get stable ids
  // and the sequence holds INSTANCES — behaviors ported from the
  // Animation Program V2 reference (duration inheritance via the
  // clone-source rule, the >=1-instance guard, boundary trims that
  // keep both sides >=1, locks freezing boundaries), improved with
  // journaled ops and a direct reorder.
  log("");
  log("sequence:");
  try {
    var sqe = new VB.Session({ width: 11000, height: 8000 });
    check("a project is born with one 144-frame instance of Scene 1",
      sqe.project.scenes[0].id === "scene@0" &&
      JSON.stringify(sqe.project.sequence) === JSON.stringify(
        [{ id: "seq@0", scene: "scene@0", duration: 144, locked: false }]));

    sqe.exec({ op: "sceneAdd", id: "sc_b", name: "Bridge" });
    sqe.exec({ op: "sceneAdd" }); // legacy op without an id
    check("sceneAdd carries its id; legacy ops get the deterministic fallback",
      sqe.project.scenes[1].id === "sc_b" &&
      sqe.project.scenes[2].id === "scene@2" &&
      sqe.project.cur.scene === 2);

    // no same-scene instance yet -> inherits from the after-instance
    sqe.exec({ op: "sceneInstAdd", id: "sq_b1", scene: "sc_b" });
    check("first instance inherits the tail instance's duration",
      sqe.project.sequence.length === 2 &&
      sqe.project.sequence[1].duration === 144 &&
      sqe.project.cur.scene === 1); // the cursor follows the instance
    sqe.exec({ op: "sceneInstDuration", id: "sq_b1", frames: 48 });
    // clone-source rule: nearest same-scene instance wins over neighbors
    sqe.exec({ op: "sceneInstAdd", id: "sq_b2", scene: "sc_b",
               after: "seq@0" });
    check("clone source: the nearest same-scene instance sets the duration",
      sqe.project.sequence[1].id === "sq_b2" &&
      sqe.project.sequence[1].duration === 48);

    check("sequence math: duration and frame lookup",
      VB.sequenceDuration(sqe.project) === 144 + 48 + 48 &&
      VB.sequenceAt(sqe.project, 0).inst.id === "seq@0" &&
      VB.sequenceAt(sqe.project, 150).inst.id === "sq_b2" &&
      VB.sequenceAt(sqe.project, 150).start === 144 &&
      VB.sequenceAt(sqe.project, 99999).inst.id === "sq_b1");

    // boundary trims: END resizes (downstream slides), START steals
    // from the previous instance and keeps this instance's end fixed
    sqe.exec({ op: "sceneBoundarySet", inst: "seq@0", edge: "end",
               frame: 100 });
    check("end-edge trim resizes the instance",
      sqe.project.sequence[0].duration === 100);
    sqe.exec({ op: "sceneBoundarySet", inst: "sq_b2", edge: "start",
               frame: 80 });
    check("start-edge trim steals from the previous instance",
      sqe.project.sequence[0].duration === 80 &&
      sqe.project.sequence[1].duration === 68); // end stays at 148
    sqe.exec({ op: "sceneInstLock", id: "sq_b2", on: true });
    sqe.exec({ op: "sceneBoundarySet", inst: "seq@0", edge: "end",
               frame: 60 });
    sqe.exec({ op: "sceneInstDuration", id: "sq_b2", frames: 999 });
    check("locks freeze boundaries and durations",
      sqe.project.sequence[0].duration === 80 &&
      sqe.project.sequence[1].duration === 68);
    sqe.exec({ op: "sceneInstLock", id: "sq_b2", on: false });

    sqe.exec({ op: "sceneInstMove", id: "sq_b1", index: 0 });
    check("instances reorder directly",
      sqe.project.sequence[0].id === "sq_b1" &&
      sqe.project.sequence[1].id === "seq@0");

    sqe.exec({ op: "sceneRename", scene: "sc_b", name: "Scene 1" });
    check("rename keeps names unique (reference rule)",
      VB.sceneById(sqe.project, "sc_b").scene.name === "Scene 1 2");

    // removal: never below one instance; the neighbor takes selection
    sqe.exec({ op: "sceneInstRemove", id: "sq_b2" });
    sqe.exec({ op: "sceneInstRemove", id: "sq_b1" });
    sqe.exec({ op: "sceneInstRemove", id: "seq@0" });
    check("at least one instance always remains",
      sqe.project.sequence.length === 1 &&
      sqe.project.sequence[0].id === "seq@0");

    var sqPlain = function (p) {
      return JSON.stringify({
        seq: p.sequence,
        scenes: p.scenes.map(function (s) { return { id: s.id, name: s.name }; }),
        cur: p.cur.scene
      });
    };
    var sqRep = await VB.replayJournal(JSON.parse(JSON.stringify(sqe.journal)));
    check("the sequence replays byte-exact",
      sqPlain(sqRep.project) === sqPlain(sqe.project));
    sqe.exec({ op: "undo" });
    check("journaled undo restores the removed instance",
      sqe.project.sequence.length === 2);
    var sqRep2 = await VB.replayJournal(JSON.parse(JSON.stringify(sqe.journal)));
    check("remove/undo replays byte-exact",
      sqPlain(sqRep2.project) === sqPlain(sqe.project));

    // boundary DRAG (reference set_scene_instance_boundary): the strip's
    // edge drag rebalances two instances inside their FIXED zone; only
    // the last instance's right edge extends the sequence
    var sqd = new VB.Session({ width: 11000, height: 8000 });
    sqd.exec({ op: "sceneAdd", id: "d_b" });
    sqd.exec({ op: "sceneInstAdd", id: "d_i2", scene: "d_b", duration: 100 });
    sqd.exec({ op: "sceneBoundaryDrag", inst: "seq@0", edge: "right",
               frame: 100 });
    check("boundary drag rebalances inside the fixed zone",
      sqd.project.sequence[0].duration === 100 &&
      sqd.project.sequence[1].duration === 144 &&
      VB.sequenceDuration(sqd.project) === 244);
    sqd.exec({ op: "sceneBoundaryDrag", inst: "d_i2", edge: "left",
               frame: 200 });
    check("a left-edge drag moves the same shared boundary",
      sqd.project.sequence[0].duration === 200 &&
      sqd.project.sequence[1].duration === 44);
    sqd.exec({ op: "sceneBoundaryDrag", inst: "seq@0", edge: "right",
               frame: 0 });
    check("drags clamp so both sides keep a frame",
      sqd.project.sequence[0].duration === 1 &&
      sqd.project.sequence[1].duration === 243 &&
      VB.sequenceDuration(sqd.project) === 244);
    sqd.exec({ op: "sceneBoundaryDrag", inst: "d_i2", edge: "right",
               frame: 400 });
    check("the last right edge extends the sequence",
      sqd.project.sequence[1].duration === 399 &&
      VB.sequenceDuration(sqd.project) === 400);
    sqd.exec({ op: "sceneInstLock", id: "d_i2", on: true });
    sqd.exec({ op: "sceneBoundaryDrag", inst: "seq@0", edge: "right",
               frame: 150 });
    check("locked neighbors freeze the shared boundary",
      sqd.project.sequence[0].duration === 1 &&
      sqd.project.sequence[1].duration === 399);
    var sqRep3 = await VB.replayJournal(JSON.parse(JSON.stringify(sqd.journal)));
    check("boundary drags replay byte-exact",
      sqPlain(sqRep3.project) === sqPlain(sqd.project));

    // the playhead may park ANYWHERE inside an instance: frameSelect
    // clamps to the scene's longest instance span (frame-hold covers
    // rendering), not just its drawn frames
    sqd.exec({ op: "frameSelect", index: 100 });
    check("the playhead parks mid-instance (span > drawn frames)",
      sqd.project.cur.frame === 100);
    sqd.exec({ op: "frameSelect", index: 99999 });
    check("frameSelect clamps to the instance span",
      sqd.project.cur.frame === 398);
    var sqRep4 = await VB.replayJournal(JSON.parse(JSON.stringify(sqd.journal)));
    check("a mid-instance playhead replays byte-exact",
      sqRep4.project.cur.frame === 398 &&
      sqPlain(sqRep4.project) === sqPlain(sqd.project));
  } catch (err) {
    fail++;
    log("  SEQUENCE EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // =============================== y2kshell ===================================
  // The unified workspace shell's geometry engine (y2kshell.js — the
  // xRack port): pure module/toolbar/drawer physics, no DOM. Island
  // pushes, cross-side moves, snap settles, and scroll/width clamps
  // must be deterministic — the DOM merely renders this state.
  log("");
  log("y2kshell:");
  try {
    var Sh = VB.Y2KShell;
    var sh = Sh.defaults();
    Sh.addModule(sh, "right", { id: "a", h: 100 });
    Sh.addModule(sh, "right", { id: "b", h: 100 });
    Sh.addModule(sh, "right", { id: "c", h: 100 });
    check("modules stack under each other on add",
      sh.racks.right.modules[0].y === 0 &&
      sh.racks.right.modules[1].y === 100 &&
      sh.racks.right.modules[2].y === 200 &&
      Sh.rackContentHeight(sh, "right") === 300);

    Sh.toggleModule(sh, "b");
    check("collapsed modules are a tab",
      Sh.moduleHeight(Sh.moduleById(sh, "b").mod) === Sh.TAB_H);
    Sh.toggleModule(sh, "b");

    // island push: dragging a into b pushes b, which pushes c
    var starts = { a: 0, b: 100, c: 200 };
    Sh.dragModule(sh, "a", "right", starts, 150, 1);
    var byId = function (id) { return Sh.moduleById(sh, id).mod; };
    check("dragging pushes colliding neighbors as an island",
      byId("a").y === 150 && byId("b").y === 250 && byId("c").y === 350);
    // pushing against the top jams instead of overlapping
    Sh.dragModule(sh, "c", "right", { a: 0, b: 100, c: 200 }, 50, -1);
    check("a jammed column never overlaps or goes above zero",
      byId("a").y === 0 && byId("b").y === 100 && byId("c").y === 200);

    // settle: small gaps snap shut, order comes from y
    byId("c").y = 208; // 8 above b's bottom edge — inside SNAP range
    Sh.endModuleDrag(sh, "right");
    check("drop settle snaps small gaps shut",
      byId("c").y === 200, byId("c").y + "");

    // cross-side move opens the other rack
    Sh.dragModule(sh, "a", "left", { a: byId("a").y }, 40, 1);
    check("dragging across the midline changes racks",
      Sh.moduleById(sh, "a").side === "left" &&
      sh.racks.left.width === Sh.RACK_DEFAULT &&
      sh.racks.right.modules.length === 2);

    // width + scroll clamps
    Sh.setRackWidth(sh, "right", 9999, 1200);
    check("rack width clamps against the shell",
      sh.racks.right.width <= Sh.RACK_MAX);
    Sh.setRackWidth(sh, "right", 90, 1200);
    check("widths follow the drag smoothly (no jerky minimum)",
      sh.racks.right.open === true && sh.racks.right.width === 90);
    Sh.setRackWidth(sh, "right", 2, 1200);
    check("only the ~4px edge zone snaps the rack shut",
      sh.racks.right.open === false &&
      sh.racks.right.width === 90); // width survives for reopen
    Sh.setRackWidth(sh, "right", Sh.RACK_DEFAULT, 1200);
    check("a real width reopens the rack", sh.racks.right.open === true);
    sh.racks.right.scroll = 9999;
    Sh.clampRackScroll(sh, "right", 100);
    check("column scroll clamps to the content",
      sh.racks.right.scroll <=
      Sh.rackContentHeight(sh, "right") - 100 + Sh.CELL);

    // toolbars: the same physics sideways
    Sh.addPanel(sh, "top", { id: "p1", w: 128 });
    Sh.addPanel(sh, "top", { id: "p2", w: 128 });
    Sh.dragPanel(sh, "top", "p1", { p1: 0, p2: 128 }, 60, 1);
    var p2 = sh.toolbars.top.panels[1];
    check("toolbar panels push sideways as an island",
      sh.toolbars.top.panels[0].x === 60 && p2.x === 188);
    Sh.endPanelDrag(sh, "top");
    check("toolbar drop settles without overlap",
      p2.x >= sh.toolbars.top.panels[0].x + 128);

    // packed stacking — the shell's ACTUAL positioning (user decision:
    // panels always collapse together; no free positions)
    var pk = Sh.defaults();
    Sh.addModule(pk, "right", { id: "a", h: 100 });
    Sh.addModule(pk, "right", { id: "b", h: 100 });
    Sh.addModule(pk, "right", { id: "c", h: 100 });
    Sh.toggleModule(pk, "b"); // collapsed tab
    Sh.packRack(pk, "right");
    var pkById = function (id) { return Sh.moduleById(pk, id).mod; };
    check("packing stacks with collapsed tabs at tab height",
      pkById("a").y === 0 && pkById("b").y === 100 &&
      pkById("c").y === 100 + Sh.TAB_H &&
      Sh.rackContentHeight(pk, "right") === 200 + Sh.TAB_H);
    check("insertion index halves on module midlines",
      Sh.insertionIndexAt(pk, "right", 0) === 0 &&
      Sh.insertionIndexAt(pk, "right", 60) === 1 &&
      Sh.insertionIndexAt(pk, "right", 9999) === 3);
    Sh.reorderModule(pk, "c", "right", 0);
    check("reorder repacks the stack",
      pkById("c").y === 0 && pkById("a").y === 100 &&
      pkById("b").y === 200);
    pk.racks.left.open = false;
    Sh.reorderModule(pk, "a", "left", 0);
    check("moving into a closed rack opens it packed",
      Sh.moduleById(pk, "a").side === "left" &&
      pk.racks.left.open === true && pkById("a").y === 0 &&
      pkById("c").y === 0 && pkById("b").y === 100);

    // persistence roundtrip (view state, never the journal)
    var sh2 = Sh.restore(Sh.serialize(sh));
    check("shell state roundtrips",
      Sh.serialize(sh2) === Sh.serialize(sh));
    check("garbage restores to defaults",
      Sh.restore("{oops").racks.right.width === Sh.RACK_DEFAULT &&
      Sh.restore("{oops").cols.left.open === true);
  } catch (err) {
    fail++;
    log("  Y2KSHELL EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // ============================ step sequencer ================================
  // Instances + timing runs (stepseq.js, docs/StepSequencer.md): the
  // prototype/instance discipline on the stage, ranged exposure ops
  // that maintain runs with deterministic fragment ids, and both
  // renderers drawing placed cells under instance transforms.
  log("");
  log("step sequencer:");
  try {
    var ste = new VB.Session({ width: 11000, height: 8000 });
    // a red symbol in the library to place (same clip path as convert)
    ste.exec({ op: "brush",
               points: [{ x: 2000, y: 2000 }, { x: 3000, y: 2200 }],
               radius: 300, color: { r: 220, g: 40, b: 40, a: 255 } });
    var stBand = [{ x: 1500, y: 1500 }, { x: 3600, y: 1500 },
                  { x: 3600, y: 2700 }, { x: 1500, y: 2700 }];
    ste.exec({ op: "symbolCreate", id: "st_sym", clip:
      JSON.parse(JSON.stringify(VB.clipFromLifted(
        VB.regionLift(ste.project.activeCell(), stBand), null))) });
    ste.exec({ op: "actorAdd", id: "st_actor", poseId: "st_p1" });
    ste.exec({ op: "poseAdd", actor: "st_actor", id: "st_p2" });

    ste.exec({ op: "instancePlace", id: "st_i1", scene: "scene@0",
               ref: "st_sym", kind: "symbol", x: 4000, y: 1000 });
    ste.exec({ op: "instancePlace", id: "st_i2", scene: "scene@0",
               ref: "st_actor", kind: "actor", x: 0, y: 0 });
    ste.exec({ op: "instancePlace", id: "st_bad", scene: "scene@0",
               ref: "nope", kind: "actor", x: 0, y: 0 });
    var stScene = ste.project.scenes[0];
    check("placement lands instances (bad refs no-op)",
      stScene.cast.length === 2 &&
      stScene.cast[0].id === "st_i1" && stScene.cast[0].scale === 1);
    check("placing drops a whole-scene Visible span (144f default seq)",
      VB.stepClipsFor(stScene, "vis:st_i1").length === 1 &&
      VB.stepClipsFor(stScene, "vis:st_i1")[0].duration === 144 &&
      VB.stepVisibleAt(stScene, "st_i1", 100) === true);

    // exposure runs: paint, overwrite, erase, merge
    ste.exec({ op: "exposureSet", id: "r1", scene: "scene@0",
               lane: "pose", target: "pose:st_i2",
               from: 10, to: 20, value: "st_p1" });
    ste.exec({ op: "exposureSet", id: "r2", scene: "scene@0",
               lane: "pose", target: "pose:st_i2",
               from: 15, to: 30, value: "st_p2" });
    var stRuns = VB.stepClipsFor(stScene, "pose:st_i2");
    check("overlapping paint splits the earlier run",
      stRuns.length === 2 &&
      stRuns[0].start === 10 && stRuns[0].duration === 5 &&
      stRuns[0].label === "st_p1" &&
      stRuns[1].start === 15 && stRuns[1].duration === 16 &&
      stRuns[1].label === "st_p2",
      JSON.stringify(stRuns));
    ste.exec({ op: "exposureSet", id: "r3", scene: "scene@0",
               lane: "pose", target: "pose:st_i2",
               from: 12, to: 17, value: null });
    stRuns = VB.stepClipsFor(stScene, "pose:st_i2");
    check("erase carves runs",
      stRuns.length === 2 &&
      stRuns[0].start === 10 && stRuns[0].duration === 2 &&
      stRuns[1].start === 18 && stRuns[1].duration === 13);
    ste.exec({ op: "exposureSet", id: "r4", scene: "scene@0",
               lane: "pose", target: "pose:st_i2",
               from: 12, to: 17, value: "st_p1" });
    stRuns = VB.stepClipsFor(stScene, "pose:st_i2");
    check("adjacent same-value runs merge",
      stRuns.length === 2 &&
      stRuns[0].start === 10 && stRuns[0].duration === 8 &&
      stRuns[0].label === "st_p1",
      JSON.stringify(stRuns));
    check("pose lookup honors the painted run",
      VB.stepPoseAt(ste.project, stScene, stScene.cast[1], 12).id === "st_p1" &&
      VB.stepPoseAt(ste.project, stScene, stScene.cast[1], 20).id === "st_p2" &&
      VB.stepPoseAt(ste.project, stScene, stScene.cast[1], 100).id === "st_p1");

    // transforms clamp; removal cascades every clip of the instance
    ste.exec({ op: "instanceTransform", id: "st_i1",
               scale: 0, rotation: 45 });
    check("transform clamps scale and keeps rotation",
      stScene.cast[0].scale === 0.01 && stScene.cast[0].rotation === 45);
    ste.exec({ op: "instanceTransform", id: "st_i1", scale: 1, rotation: 0 });
    ste.exec({ op: "instanceRemove", id: "st_i2" });
    check("removal cascades the instance's clips",
      stScene.cast.length === 1 &&
      VB.stepClipsFor(stScene, "pose:st_i2").length === 0 &&
      VB.stepClipsFor(stScene, "vis:st_i2").length === 0);
    ste.exec({ op: "undo" });
    var stScene2 = ste.project.scenes[0]; // history rebuilt the scene
    check("undo restores the cast and its runs",
      stScene2.cast.length === 2 &&
      VB.stepClipsFor(stScene2, "pose:st_i2").length === 2);

    var stPlain = function (p) {
      return JSON.stringify(p.scenes.map(function (s) {
        return { cast: s.cast, tracks: s.tracks };
      }));
    };
    var stRep = await VB.replayJournal(JSON.parse(JSON.stringify(ste.journal)));
    check("instances and runs replay byte-exact",
      stPlain(stRep.project) === stPlain(ste.project));

    // the oracle draws a placed instance under its transform
    ste.exec({ op: "editTargetClear" }); // ensure scene rendering
    var stCv = document.createElement("canvas");
    stCv.width = 550; stCv.height = 400;
    var stCtx = stCv.getContext("2d");
    VB.renderProject(stCtx, ste.project, { zoom: 1, panX: 0, panY: 0, dpr: 1 });
    // the symbol's red blob sits near (2500,2100)tw in its cell; the
    // instance offsets it by (4000,1000)tw -> (325, 155)px at zoom 1
    var stPx = stCtx.getImageData(325, 155, 1, 1).data;
    check("the oracle renders the placed instance offset",
      stPx[0] > 180 && stPx[1] < 120,
      "rgb(" + stPx[0] + "," + stPx[1] + "," + stPx[2] + ")");
  } catch (err) {
    fail++;
    log("  STEPSEQ EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // =========================== streaming skeleton ============================
  // AssetCache (one global LRU byte budget), Prefetcher (priority queue),
  // and the eviction contract: dropping a resident asset costs a
  // recompute, never wrong pixels (Implementation.md phase 4).
  log("");
  log("streaming:");
  try {
    var ac = new VB.AssetCache(100);
    var acEv = [];
    ac.claim("a", 40, function () { acEv.push("a"); });
    ac.claim("b", 40, function () { acEv.push("b"); });
    ac.touch("a"); // b becomes LRU
    ac.claim("c", 40, function () { acEv.push("c"); });
    check("LRU eviction under budget",
      acEv.join(",") === "b" && ac.resident === 80 && ac.stats().count === 2,
      "evicted [" + acEv.join(",") + "], resident " + ac.resident);
    ac.claim("a", 10, function () { acEv.push("a2"); }); // same-key replace
    check("same-key claim replaces accounting",
      ac.resident === 50 && acEv.join(",") === "b", ac.resident + " bytes");
    ac.release("a");
    check("release drops without evict callback",
      ac.resident === 40 && acEv.join(",") === "b", ac.resident + " bytes");

    var ac2 = new VB.AssetCache(10);
    var ac2Ev = [];
    ac2.claim("big", 100, function () { ac2Ev.push("big"); });
    check("oversized lone asset stays resident",
      ac2Ev.length === 0 && ac2.resident === 100, ac2.resident + " bytes");
    ac2.claim("second", 5, function () { ac2Ev.push("second"); });
    check("next claim evicts the oversized LRU",
      ac2Ev.join(",") === "big" && ac2.resident === 5, ac2.resident + " bytes");

    var ac3 = new VB.AssetCache(50);
    var ac3Ev = [];
    ac3.frameStart();
    ac3.claim("f1", 40, function () { ac3Ev.push("f1"); });
    ac3.claim("f2", 40, function () { ac3Ev.push("f2"); });
    check("in-frame claims are eviction-exempt (frame may run over budget)",
      ac3Ev.length === 0 && ac3.resident === 80, ac3.resident + " bytes");
    ac3.frameStart();
    ac3.claim("f3", 40, function () { ac3Ev.push("f3"); });
    check("next frame evicts the previous frame's claims LRU-first",
      ac3Ev.join(",") === "f1,f2" && ac3.resident === 40,
      "evicted [" + ac3Ev.join(",") + "]");

    // Prefetcher: priority order, dedup, cancel — all under concurrency 1
    var pf = new VB.Prefetcher(1);
    var pfOrder = [];
    var pfGate;
    var pfGateP = new Promise(function (r) { pfGate = r; });
    var pfP1 = pf.schedule("one", 1, function () { pfOrder.push("one"); return pfGateP; });
    var pfP2 = pf.schedule("two", 5, function () { pfOrder.push("two"); return "T"; });
    var pfP3 = pf.schedule("three", 9, function () { pfOrder.push("three"); return "H"; });
    var pfDup = pf.schedule("two", 99, function () { pfOrder.push("DUP"); return "X"; });
    check("duplicate keys share one scheduled load", pfP2 === pfDup);
    pfGate("done");
    var pfV1 = await pfP1, pfV2 = await pfP2;
    await pfP3;
    check("priority order under the concurrency cap",
      pfOrder.join(",") === "one,two,three" && pfV1 === "done" && pfV2 === "T",
      pfOrder.join(","));
    var pf2 = new VB.Prefetcher(1);
    var pf2Gate;
    var pf2GateP = new Promise(function (r) { pf2Gate = r; });
    pf2.schedule("running", 1, function () { return pf2GateP; });
    var pfVictim = pf2.schedule("victim", 1, function () { pfOrder.push("victim"); return 1; });
    pf2.cancel("victim");
    pf2Gate();
    check("cancel resolves null without running the load",
      (await pfVictim) === null && pfOrder.indexOf("victim") < 0);

    // matcap paints under eviction: starve the global cache between two
    // oracle renders — the recomputed composite must be pixel-identical
    var mcStyle = VB.materialDefaults("matcap");
    mcStyle.matcap = "studio"; mcStyle.bumpScale = 120; mcStyle.blurPx = 2;
    var mcRes = await VB.replayJournal([
      { op: "new", width: 11000, height: 8000 },
      { op: "brush", points: [{ x: 2500, y: 3000 }, { x: 6500, y: 3400 }],
        radius: 700, color: { r: 102, g: 204, b: 255, a: 255 } },
      { op: "fillStyle", index: 0, style: mcStyle }]);
    function renderShot(doc) {
      var cv = document.createElement("canvas");
      cv.width = 550; cv.height = 400;
      var c2 = cv.getContext("2d");
      VB.render(c2, doc, { zoom: 1, panX: 0, panY: 0, dpr: 1 });
      return c2.getImageData(0, 0, 550, 400).data;
    }
    var shotA = renderShot(mcRes.doc);
    var savedBudget = VB.assets.budget;
    VB.assets.setBudget(1);
    VB.assets.claim("test:starver", 2, function () {});
    var shotB = renderShot(mcRes.doc); // recomputed after eviction
    VB.assets.release("test:starver");
    VB.assets.setBudget(savedBudget);
    var mcDiff = 0;
    for (var mi3 = 0; mi3 < shotA.length; mi3++) {
      if (shotA[mi3] !== shotB[mi3]) mcDiff++;
    }
    check("matcap paint recomputes pixel-identical after eviction",
      mcDiff === 0, mcDiff + " differing bytes");
  } catch (err) {
    fail++;
    log("  STREAMING EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // ============================ package store ================================
  // The .y2kproj package (packagestore.js): many small addressable units
  // in IndexedDB, honest range reads, zip interchange, segmented journal
  // (Implementation.md phase 3). Isolated db per run, deleted at the end.
  log("");
  log("package store:");
  var pdbName = "vbtest-pkg-" + Date.now();
  // Keepalive for headless gates: under --virtual-time-budget, IndexedDB
  // completions arrive from a real IO thread while virtual time races
  // past and the budget expires with the work still pending. A
  // setTimeout(0) chain keeps macrotasks turning (real time keeps
  // passing) so every IDB event gets a turn to dispatch. Test-page
  // concern only — headed browsers never run under virtual time.
  var pkgTicking = true;
  (function pkgTick() { if (pkgTicking) setTimeout(pkgTick, 0); })();
  try {
    var pstore = await VB.PackageStore.open(pdbName);
    var prec = await pstore.create({ name: "Suite Project" });
    var plist = await pstore.list();
    check("project appears in the index",
      plist.some(function (r) { return r.id === prec.id && r.name === "Suite Project"; }),
      plist.length + " projects");

    var ph = pstore.open(prec.id);
    var pdoc = new VB.Y2KVectorDocument();
    pdoc.width = 11000; pdoc.height = 8000;
    VB.pencilCommit(pdoc, [{ x: 1000, y: 1000 }, { x: 9000, y: 2000 }],
                    { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } });
    var pbytes = await VB.encodeY2KVector(pdoc, { compress: true });
    await ph.writeUnit("scenes/scene-1/roughs/frame-1.y2kvector", pbytes);
    await ph.writeUnit("notes/hello.txt", "infinite canvas");
    await ph.flushManifest({ format: "y2kproj", version: 1, name: "Suite Project" });

    function sameBytes(a, b) {
      if (!a || !b || a.length !== b.length) return false;
      for (var i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
      return true;
    }
    var backBytes = await pstore.open(prec.id)
      .readUnit("scenes/scene-1/roughs/frame-1.y2kvector");
    var backDoc = await VB.decodeY2KVector(backBytes);
    check("units round-trip byte-identical and decode",
      sameBytes(backBytes, pbytes) &&
      JSON.stringify(backDoc.doc.edges) === JSON.stringify(pdoc.edges),
      (backBytes ? backBytes.length : "null") + " vs " + pbytes.length + " bytes");

    var range = await ph.readRange("scenes/scene-1/roughs/frame-1.y2kvector", 5, 16);
    check("range read equals the whole-read slice",
      sameBytes(range, pbytes.subarray(5, 21)) &&
      (await ph.unitSize("scenes/scene-1/roughs/frame-1.y2kvector")) === pbytes.length,
      range && range.length + " bytes at 5..21");

    var scoped = await ph.listUnits("scenes/");
    check("listUnits filters by prefix",
      scoped.length === 1 && (await ph.listUnits()).length === 3,
      scoped.join(", "));

    var zblob = await ph.exportZip();
    var imported = await pstore.importZip(zblob, { name: "Imported Copy" });
    var ih = pstore.open(imported.id);
    var iPaths = await ih.listUnits();
    var iManifest = await ih.manifest();
    check("zip export → import reproduces the unit tree",
      iPaths.join("|") === (await ph.listUnits()).join("|") &&
      sameBytes(await ih.readUnit("scenes/scene-1/roughs/frame-1.y2kvector"), pbytes) &&
      iManifest && iManifest.format === "y2kproj",
      iPaths.length + " units");

    // segmented journal replay ≡ monolithic replay
    var segOps = [{ op: "new", width: 11000, height: 8000 },
      { op: "pencil", points: [{ x: 1000, y: 1000 }, { x: 5000, y: 1500 }],
        style: { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } } },
      { op: "brush", points: [{ x: 2000, y: 4000 }, { x: 6000, y: 4200 }],
        radius: 300, color: { r: 220, g: 40, b: 40, a: 255 } },
      { op: "erase", points: [{ x: 3000, y: 3800 }, { x: 4500, y: 4300 }],
        radius: 250 }];
    var segs = VB.segmentJournal(segOps, 2);
    check("journal segments split at the requested size",
      segs.length === 2 && segs[0].path === "journal/seg-00001.json");
    var joined = VB.joinJournalSegments(
      [segs[1].json, segs[0].json]); // out of order on purpose
    var repMono = await VB.replayJournal(JSON.parse(JSON.stringify(segOps)));
    var repSeg = await VB.replayJournal(JSON.parse(JSON.stringify(joined)));
    check("segmented journal replays byte-exact",
      JSON.stringify(repSeg.doc.edges) === JSON.stringify(repMono.doc.edges),
      repSeg.doc.edges.length + " vs " + repMono.doc.edges.length + " edges");

    await pstore.remove(prec.id);
    var afterRemove = await pstore.list();
    check("remove deletes the project and its units",
      !afterRemove.some(function (r) { return r.id === prec.id; }) &&
      (await pstore.open(prec.id).listUnits()).length === 0,
      afterRemove.length + " projects left");
  } catch (err) {
    fail++;
    log("  PACKAGE EXCEPTION: " + (err && err.stack || err), "fail");
  }
  pkgTicking = false;
  try { indexedDB.deleteDatabase(pdbName); } catch (e) {}

  // ============================ Session seam ================================
  // The ProjectSession (session.js) is what the coming shell mounts
  // sections against: it owns the store, journal, undo, and op dispatch.
  // Exec-routed ops must journal, apply, fire the hooks, replay
  // byte-exact, and undo — same guarantees the app facade had before
  // the seam was carved (Implementation.md phase 2).
  log("");
  log("session:");
  try {
    var ses = new VB.Session({ width: 11000, height: 8000 });
    check("session seeds the journal with the creating op",
      ses.journal.length === 1 && ses.journal[0].op === "new" &&
      ses.journal[0].width === 11000);
    var sesRecorded = [], sesChanged = 0;
    ses.onRecord = function (op) { sesRecorded.push(op.op); };
    ses.onChanged = function () { sesChanged++; };
    ses.exec({ op: "pencil",
               points: [{ x: 1000, y: 1000 }, { x: 5000, y: 1200 }],
               style: { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } } });
    ses.exec({ op: "brush",
               points: [{ x: 2000, y: 4000 }, { x: 6000, y: 4200 }],
               radius: 300, color: { r: 220, g: 40, b: 40, a: 255 } });
    var sesEdges = ses.project.activeCell().edges.length;
    check("exec journals and applies through the registry",
      ses.journal.length === 3 && sesEdges > 0 &&
      sesRecorded.join(",") === "pencil,brush" && sesChanged === 2,
      ses.journal.length + " ops, " + sesEdges + " edges, hooks " +
      sesRecorded.length + "/" + sesChanged);
    var sesRep = await VB.replayJournal(JSON.parse(JSON.stringify(ses.journal)));
    check("session journal replays byte-exact",
      JSON.stringify(sesRep.doc.edges) ===
      JSON.stringify(ses.project.activeCell().edges),
      sesRep.doc.edges.length + " vs " + sesEdges + " edges");
    check("session undo restores the pre-op project",
      ses.history.canUndo() &&
      (ses.history.undo(),
       JSON.stringify(ses.project.activeCell().edges) ===
       JSON.stringify((await VB.replayJournal(
         JSON.parse(JSON.stringify(ses.journal.slice(0, 2))))).doc.edges)),
      ses.project.activeCell().edges.length + " edges after undo");
  } catch (err) {
    fail++;
    log("  SESSION EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // ============== incremental swath union ≡ batch union ====================
  // The brush/eraser tools unite swept capsules DURING the drag
  // (paperglue.SwathUnion); replay always recomputes the batch tree
  // union. Live and replay must therefore commit byte-identical edges —
  // for every capsule-count shape of the merge tree (powers of two,
  // 2^k-1 fold-heavy counts, odd counts, single capsule, dab) and for
  // buildSwath's end-replacement of the final thinned point.
  log("");
  log("incremental swath union:");
  try {
    var IU_RADIUS = 300;
    function iuStroke(nPts, seed) {
      var s = seed >>> 0;
      function rnd() { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; }
      var pts = [];
      for (var i = 0; i < nPts; i++) {
        pts.push({
          x: 1200 + i * 420 + Math.round(rnd() * 160),
          y: 3600 + Math.round(2200 * Math.sin(i / 2.1)) + Math.round(rnd() * 160)
        });
      }
      return pts;
    }
    function iuBase(doc) {
      doc.width = 26000; doc.height = 8000;
      VB.brushStroke(doc, [{ x: 1000, y: 3600 }, { x: 24000, y: 3800 }], 700,
                     { r: 60, g: 120, b: 240, a: 255 });
    }
    function edgeString(doc) {
      return doc.edges.map(function (e) {
        return [e.ax, e.ay, e.cx, e.cy, e.bx, e.by, e.fill0, e.fill1, e.line].join("/");
      }).join(" ");
    }
    function iuFeed(pts) {
      var u = new VB.SwathUnion(IU_RADIUS);
      for (var i = 0; i < pts.length; i++) u.add(pts[i]);
      return u;
    }
    var red = { r: 220, g: 40, b: 40, a: 255 };
    // capsule counts 0(dab),1,2,4,7,8,15,16,32 — every tree shape class
    [1, 2, 3, 5, 8, 9, 16, 17, 33].forEach(function (nPts) {
      var ptsB = iuStroke(nPts, 7 + nPts);
      var docA = new VB.Y2KVectorDocument(); iuBase(docA);
      var docB = new VB.Y2KVectorDocument(); iuBase(docB);
      VB.brushStroke(docA, ptsB, IU_RADIUS, red);
      VB.brushStroke(docB, ptsB, IU_RADIUS, red, iuFeed(ptsB));
      check("brush " + nPts + " pts: incremental == batch",
            edgeString(docA) === edgeString(docB),
            docA.edges.length + " vs " + docB.edges.length + " edges");

      var docC = new VB.Y2KVectorDocument(); iuBase(docC);
      var docD = new VB.Y2KVectorDocument(); iuBase(docD);
      VB.eraseStroke(docC, ptsB, IU_RADIUS);
      VB.eraseStroke(docD, ptsB, IU_RADIUS, iuFeed(ptsB));
      check("erase " + nPts + " pts: incremental == batch",
            edgeString(docC) === edgeString(docD),
            docC.edges.length + " vs " + docD.edges.length + " edges");
    });
    // end-replacement: final point lands within the thinning step of the
    // previous one — buildSwath REPLACES the last thinned point while the
    // accumulator rejected it; finish() must rebuild the last capsule
    // from the authoritative path
    var ptsR = iuStroke(9, 99);
    ptsR.push({ x: ptsR[8].x + 30, y: ptsR[8].y - 25 });
    var docE = new VB.Y2KVectorDocument(); iuBase(docE);
    var docF = new VB.Y2KVectorDocument(); iuBase(docF);
    VB.brushStroke(docE, ptsR, IU_RADIUS, red);
    VB.brushStroke(docF, ptsR, IU_RADIUS, red, iuFeed(ptsR));
    check("brush end-replacement: incremental == batch",
          edgeString(docE) === edgeString(docF),
          docE.edges.length + " vs " + docF.edges.length + " edges");
    // a stale accumulator (radius changed mid-drag) must be discarded and
    // fall back to the batch union, not corrupt the commit
    var ptsW = iuStroke(9, 42);
    var uW = new VB.SwathUnion(IU_RADIUS + 40);
    for (var w = 0; w < ptsW.length; w++) uW.add(ptsW[w]);
    var docG = new VB.Y2KVectorDocument(); iuBase(docG);
    var docH = new VB.Y2KVectorDocument(); iuBase(docH);
    VB.brushStroke(docG, ptsW, IU_RADIUS, red);
    VB.brushStroke(docH, ptsW, IU_RADIUS, red, uW);
    check("radius-mismatch union falls back to batch",
          edgeString(docG) === edgeString(docH),
          docG.edges.length + " vs " + docH.edges.length + " edges");
  } catch (err) {
    fail++;
    log("  INCREMENTAL UNION EXCEPTION: " + (err && err.stack || err), "fail");
  }

  var summary = "VBTEST DONE pass=" + pass + " fail=" + fail;
  document.title = summary;
  log("");
  log(summary, fail ? "fail" : "pass");
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VBTEST RUNNING</title>
<style>
  body { font: 12px/1.5 Consolas, monospace; background: #1b1d20; color: #cfd2d6; margin: 16px; }
  pre { white-space: pre-wrap; }
  .grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .cell { background: #26282c; padding: 6px; border: 1px solid #000; }
  .cell div { color: #8a8d93; font-size: 11px; margin-bottom: 4px; }
  canvas { display: block; background: #fff; }
  .pass { color: #7ad97a; }
  .fail { color: #ff7a7a; font-weight: bold; }
</style>
</head>
<body>
<h3>VectorBrush pipeline tests</h3>
<pre id="out"></pre>
<div class="grid" id="grid"></div>

<script src="../js/bitio.js"></script>
<script src="../js/doc.js"></script>
<script src="../js/geom.js"></script>
<script src="../js/swf.js"></script>
<script src="../js/trace.js"></script>
<script src="../js/render.js"></script>
<script src="../js/vbd.js"></script>
<script src="../js/swfwrite.js"></script>
<script src="../js/fit.js"></script>
<script src="../js/merge.js"></script>
<script src="../js/faces.js"></script>
<script src="../js/normalize.js"></script>
<script src="../js/bucket.js"></script>
<script src="../js/swath.js"></script>
<script src="../lib/paper-core.min.js"></script>
<script src="../js/paperglue.js"></script>
<script src="../js/mask.js"></script>
<script src="../js/eraser.js"></script>
<script src="../js/brush.js"></script>
<script src="../js/planarity.js"></script>
<script src="../js/journal.js"></script>
<script src="../js/history.js"></script>
<script src="../js/debug.js"></script>
<script src="../js/pencil.js"></script>
<script src="../js/shapes.js"></script>
<script src="../js/arrow.js"></script>
<script src="../js/transform.js"></script>
<script src="../js/lasso.js"></script>
<script src="fixtures.js"></script>
<script src="userlog.js"></script>
<script src="userlog2.js"></script>
<script src="userlog3.js"></script>
<script src="userlog4.js"></script>
<script>
(async function () {
  "use strict";
  var out = document.getElementById("out");
  var pass = 0, fail = 0;

  function log(line, cls) {
    var span = document.createElement("span");
    span.textContent = line + "\n";
    if (cls) span.className = cls;
    out.appendChild(span);
  }

  function check(name, cond, detail) {
    if (cond) { pass++; }
    else { fail++; log("  FAIL " + name + (detail ? " — " + detail : ""), "fail"); }
    return cond;
  }

  function b64ToBuf(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }

  function hexColor(c) {
    function h(v) { return v.toString(16).padStart(2, "0"); }
    return "#" + h(c.r) + h(c.g) + h(c.b);
  }

  function edgeKeySet(doc) {
    var keys = [];
    for (var i = 0; i < doc.edges.length; i++) {
      var e = doc.edges[i];
      if (VB.edgeIsDegenerate(e)) continue;
      keys.push([e.ax, e.ay, e.cx, e.cy, e.bx, e.by, e.fill0, e.fill1, e.line].join("/"));
    }
    keys.sort();
    return keys;
  }

  function sameStringArrays(a, b) {
    if (a.length !== b.length) return "length " + a.length + " vs " + b.length;
    for (var i = 0; i < a.length; i++) {
      if (a[i] !== b[i]) return "first diff at " + i + ": " + a[i] + " vs " + b[i];
    }
    return null;
  }

  // ======================= unit tests: geometry ============================
  log("geometry:");
  (function () {
    var G = VB.geom;

    // line × line cross
    var a = VB.edge(-1000, 0, null, null, 1000, 0, 0, 0, 1);
    var b = VB.edge(0, -1000, null, null, 0, 1000, 0, 0, 1);
    var hits = G.edgeIntersections(a, b);
    check("lineLine 1 hit", hits.length === 1, "got " + hits.length);
    if (hits.length) {
      check("lineLine at origin",
        Math.abs(hits[0].point.x) < 1 && Math.abs(hits[0].point.y) < 1,
        JSON.stringify(hits[0].point));
      check("lineLine t=u=0.5", Math.abs(hits[0].t - 0.5) < 1e-6 && Math.abs(hits[0].u - 0.5) < 1e-6);
    }

    // line × quad: horizontal line through an arch hits twice
    var arch = VB.edge(-1000, 0, 0, -2000, 1000, 0, 0, 0, 1);   // apex y=-1000
    var cut = VB.edge(-2000, -500, null, null, 2000, -500, 0, 0, 1);
    var h2 = G.edgeIntersections(cut, arch);
    check("lineQuad 2 hits", h2.length === 2, "got " + h2.length);
    for (var i = 0; i < h2.length; i++) {
      check("lineQuad hit on line y=-500", Math.abs(h2[i].point.y + 500) < 1, "y=" + h2[i].point.y);
    }

    // quad × quad: arch and inverted arch cross twice
    var arch2 = VB.edge(-1000, -1000, 0, 1000, 1000, -1000, 0, 0, 1); // sags down
    var h3 = G.edgeIntersections(arch, arch2);
    check("quadQuad 2 hits", h3.length === 2, "got " + h3.length);
    for (var j = 0; j < h3.length; j++) {
      var pa = G.evalEdge(arch, h3[j].t), pb = G.evalEdge(arch2, h3[j].u);
      check("quadQuad points agree", Math.hypot(pa.x - pb.x, pa.y - pb.y) < 1,
        Math.hypot(pa.x - pb.x, pa.y - pb.y).toFixed(2) + " twips apart");
    }

    // split a quad at t=0.5: two welded pieces, ends preserved
    var pieces = G.splitEdge(arch, [{ t: 0.5 }]);
    check("splitEdge 2 pieces", pieces.length === 2, "got " + pieces.length);
    if (pieces.length === 2) {
      check("splitEdge welded", pieces[0].bx === pieces[1].ax && pieces[0].by === pieces[1].ay);
      check("splitEdge ends kept",
        pieces[0].ax === arch.ax && pieces[0].ay === arch.ay &&
        pieces[1].bx === arch.bx && pieces[1].by === arch.by);
      check("splitEdge styles kept", pieces[0].line === 1 && pieces[1].line === 1);
    }

    // point-in-fill on a unit square
    var doc = new VB.VBDocument();
    doc.fills.push(VB.solidFill(255, 0, 0));
    doc.edges.push(
      VB.edge(0, 0, null, null, 4000, 0, 0, 1, 0),
      VB.edge(4000, 0, null, null, 4000, 4000, 0, 1, 0),
      VB.edge(4000, 4000, null, null, 0, 4000, 0, 1, 0),
      VB.edge(0, 4000, null, null, 0, 0, 0, 1, 0));
    check("fillAt inside", G.fillAt(doc, 2000, 2000) === 1);
    check("fillAt outside", G.fillAt(doc, 5000, 2000) === 0);
    check("fillAt left of square", G.fillAt(doc, -500, 2000) === 0);
  })();

  // ======================= unit tests: fitting =============================
  log("fitting:");
  (function () {
    // straight run → exactly one straight edge
    var line = [];
    for (var i = 0; i <= 10; i++) line.push({ x: i * 400, y: 0 });
    var g1 = VB.fitStroke(line);
    check("fit straight = 1 line", g1.length === 1 && g1[0].cx === null,
      g1.length + " pieces");

    // semicircle → few quads, all samples near the fit, pieces welded
    var pts = [];
    for (var k = 0; k <= 40; k++) {
      var th = Math.PI * k / 40;
      pts.push({ x: Math.round(2000 * Math.cos(th)), y: Math.round(2000 * Math.sin(th)) });
    }
    var g2 = VB.fitStroke(pts);
    check("fit arc is compact", g2.length >= 2 && g2.length <= 8, g2.length + " pieces");
    var welded = true;
    for (var w = 1; w < g2.length; w++) {
      if (g2[w].ax !== g2[w - 1].bx || g2[w].ay !== g2[w - 1].by) welded = false;
    }
    check("fit pieces welded", welded);
    var worst = 0;
    for (var s = 0; s < pts.length; s++) {
      var best = Infinity;
      for (var e2 = 0; e2 < g2.length; e2++) {
        var ge = g2[e2];
        best = Math.min(best, VB.geom.distToEdge(
          VB.edge(ge.ax, ge.ay, ge.cx, ge.cy, ge.bx, ge.by, 0, 0, 0), pts[s].x, pts[s].y));
      }
      worst = Math.max(worst, best);
    }
    check("fit error bound", worst <= VB.FIT_TOLERANCE * 1.5, worst.toFixed(1) + " twips");
  })();

  // ======================= unit tests: planar merge ========================
  log("planar merge:");
  (function () {
    var style = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };

    // two crossing pencil strokes → both split at the shared node
    var doc = new VB.VBDocument();
    VB.pencilCommit(doc, [{ x: 0, y: 0 }, { x: 2000, y: 0 }, { x: 4000, y: 0 }], style);
    check("first stroke = 1 edge", doc.edges.length === 1, doc.edges.length + " edges");
    VB.pencilCommit(doc, [{ x: 2000, y: -2000 }, { x: 2000, y: 0 }, { x: 2000, y: 2000 }], style);
    check("cross = 4 edges", doc.edges.length === 4, doc.edges.length + " edges");
    var nodeShared = doc.edges.every(function (e) {
      return (e.ax === 2000 && e.ay === 0) || (e.bx === 2000 && e.by === 0);
    });
    check("cross node shared by all 4", nodeShared);
    check("line styles deduped", doc.lines.length === 1, doc.lines.length + " styles");

    // stroke across a filled square inherits the fill on both sides
    var doc2 = new VB.VBDocument();
    doc2.fills.push(VB.solidFill(0, 160, 60));
    doc2.edges.push(
      VB.edge(0, 0, null, null, 4000, 0, 0, 1, 0),
      VB.edge(4000, 0, null, null, 4000, 4000, 0, 1, 0),
      VB.edge(4000, 4000, null, null, 0, 4000, 0, 1, 0),
      VB.edge(0, 4000, null, null, 0, 0, 0, 1, 0));
    VB.pencilCommit(doc2, [
      { x: -1000, y: 2000 }, { x: 1000, y: 2000 }, { x: 3000, y: 2000 }, { x: 5000, y: 2000 }
    ], style);
    check("square+stroke = 9 edges", doc2.edges.length === 9, doc2.edges.length + " edges");
    var inside = doc2.edges.filter(function (e) {
      return e.line === 1 && e.fill0 === 1 && e.fill1 === 1;
    });
    var outside = doc2.edges.filter(function (e) {
      return e.line === 1 && e.fill0 === 0 && e.fill1 === 0;
    });
    check("inside piece inherits fill", inside.length === 1, inside.length + " inside pieces");
    check("outside pieces stay unfilled", outside.length === 2, outside.length + " outside pieces");
    if (inside.length === 1) {
      check("inside piece spans the square",
        inside[0].ax === 0 && inside[0].bx === 4000 ||
        inside[0].ax === 4000 && inside[0].bx === 0,
        "(" + inside[0].ax + "→" + inside[0].bx + ")");
    }

    // self-crossing stroke splits itself
    var doc3 = new VB.VBDocument();
    VB.pencilCommit(doc3, [
      { x: 0, y: 0 }, { x: 2000, y: 2000 }, { x: 2000, y: 0 }, { x: 0, y: 2000 }
    ], style);
    check("self-cross = 5 edges", doc3.edges.length === 5, doc3.edges.length + " edges");

    // merged documents keep the Flash-parity invariant (integers, indices)
    check("merge keeps invariant (cross)", doc.validate().length === 0, doc.validate()[0]);
    check("merge keeps invariant (fill)", doc2.validate().length === 0, doc2.validate()[0]);
    check("merge keeps invariant (self)", doc3.validate().length === 0, doc3.validate()[0]);

    // Flash-record inspector: reports must match the stored geometry
    var rec = VB.debugEdgeRecord(doc2, doc2.edges.length - 1);
    var le = doc2.edges[doc2.edges.length - 1];
    if (le.cx === null) {
      check("record deltas exact",
        rec.deltas.dx === le.bx - le.ax && rec.deltas.dy === le.by - le.ay);
    } else {
      check("record deltas exact",
        rec.deltas.cdx === le.cx - le.ax && rec.deltas.adx === le.bx - le.cx);
    }
    check("record bit width sane", rec.nbits >= 2 && rec.nbits <= 17, "nbits=" + rec.nbits);

    // undo / redo round-trip
    var doc4 = new VB.VBDocument();
    var hist = new VB.History();
    VB.pencilCommit(doc4, [{ x: 0, y: 0 }, { x: 1000, y: 0 }, { x: 2000, y: 0 }], style);
    var before = doc4.edges.length;
    hist.push(doc4);
    VB.pencilCommit(doc4, [{ x: 0, y: 500 }, { x: 1000, y: 500 }, { x: 2000, y: 500 }], style);
    var after = doc4.edges.length;
    hist.undo(doc4);
    check("undo restores", doc4.edges.length === before, doc4.edges.length + " vs " + before);
    hist.redo(doc4);
    check("redo restores", doc4.edges.length === after, doc4.edges.length + " vs " + after);
  })();

  // ======================= unit tests: bucket fill =========================
  log("bucket fill:");
  (function () {
    var stroke = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };
    var red = { color: { r: 220, g: 40, b: 40, a: 255 } };
    var blue = { color: { r: 40, g: 80, b: 220, a: 255 } };

    // 1. Fill a pencil-outlined rectangle: edges gain a fill on the
    //    interior side, keep their line style, nothing dissolves.
    var doc = new VB.VBDocument();
    VB.pencilCommit(doc, [{ x: 0, y: 0 }, { x: 4000, y: 0 }], stroke);
    VB.pencilCommit(doc, [{ x: 4000, y: 0 }, { x: 4000, y: 3000 }], stroke);
    VB.pencilCommit(doc, [{ x: 4000, y: 3000 }, { x: 0, y: 3000 }], stroke);
    VB.pencilCommit(doc, [{ x: 0, y: 3000 }, { x: 0, y: 0 }], stroke);
    var r1 = VB.bucketFill(doc, 2000, 1500, red);
    check("outline fill stamps 4 sides", r1.stamped === 4, r1.stamped + " stamped");
    check("outline fill dissolves none", r1.dissolved === 0, r1.dissolved + " dissolved");
    check("outline fill contains center", VB.geom.fillAt(doc, 2000, 1500) === 1);
    check("outline fill keeps outside empty", VB.geom.fillAt(doc, 5000, 1500) === 0);
    check("outline fill keeps strokes", doc.edges.every(function (e) { return e.line === 1; }));
    check("outline fill invariant", doc.validate().length === 0, doc.validate()[0]);

    // 2. Click outside any region: no-op.
    var r0 = VB.bucketFill(doc, 9000, 9000, red);
    check("outside click is a no-op", r0.stamped === 0 && doc.edges.length === 4);

    // 3. Pencil line across the filled rect splits it into two faces;
    //    each fills independently.
    VB.pencilCommit(doc, [{ x: 2000, y: -500 }, { x: 2000, y: 1500 }, { x: 2000, y: 3500 }], stroke);
    var r2 = VB.bucketFill(doc, 1000, 1500, blue);
    check("left half fill works", r2.stamped > 0);
    var fLeft = VB.geom.fillAt(doc, 1000, 1500);
    var fRight = VB.geom.fillAt(doc, 3000, 1500);
    check("left half is blue", JSON.stringify(doc.fills[fLeft - 1].color).indexOf("220") > 0 &&
      doc.fills[fLeft - 1].color.b === 220, "fill " + fLeft);
    check("right half still red", doc.fills[fRight - 1].color.r === 220, "fill " + fRight);
    check("halves differ", fLeft !== fRight);
    check("split-fill invariant", doc.validate().length === 0, doc.validate()[0]);

    // 4. Dissolution: two rects sharing a lineless border; filling the
    //    right one with the left one's color merges them.
    var doc2 = new VB.VBDocument();
    doc2.fills.push(VB.solidFill(200, 60, 60)); // style 1
    doc2.fills.push(VB.solidFill(60, 60, 200)); // style 2
    doc2.edges.push(
      // left rect (clockwise, fill1 = interior)
      VB.edge(0, 0, null, null, 2000, 0, 0, 1, 0),
      VB.edge(2000, 2000, null, null, 0, 2000, 0, 1, 0),
      VB.edge(0, 2000, null, null, 0, 0, 0, 1, 0),
      // shared border: left rect on right of south travel, right rect on left
      VB.edge(2000, 0, null, null, 2000, 2000, 2, 1, 0),
      // right rect (clockwise)
      VB.edge(2000, 0, null, null, 4000, 0, 0, 2, 0),
      VB.edge(4000, 0, null, null, 4000, 2000, 0, 2, 0),
      VB.edge(4000, 2000, null, null, 2000, 2000, 0, 2, 0));
    var r3 = VB.bucketFill(doc2, 3000, 1000, { color: { r: 200, g: 60, b: 60, a: 255 } });
    check("dissolve happened", r3.dissolved === 1, r3.dissolved + " dissolved");
    check("merged region count", doc2.edges.length === 6, doc2.edges.length + " edges");
    check("left still filled", VB.geom.fillAt(doc2, 1000, 1000) === 1);
    check("right now same fill", VB.geom.fillAt(doc2, 3000, 1000) === 1);
    check("dissolve invariant", doc2.validate().length === 0, doc2.validate()[0]);

    // 5. Island: fill the annulus between two squares; the island keeps
    //    its own fill (hole assignment).
    var doc3 = new VB.VBDocument();
    doc3.fills.push(VB.solidFill(0, 150, 80));  // style 1: island fill
    doc3.edges.push(
      // outer square (clockwise, no fill yet — outline-less region)
      VB.edge(0, 0, null, null, 6000, 0, 0, 0, 0),
      VB.edge(6000, 0, null, null, 6000, 6000, 0, 0, 0),
      VB.edge(6000, 6000, null, null, 0, 6000, 0, 0, 0),
      VB.edge(0, 6000, null, null, 0, 0, 0, 0, 0),
      // island square (clockwise): interior = style 1, exterior empty
      VB.edge(2000, 2000, null, null, 4000, 2000, 0, 1, 0),
      VB.edge(4000, 2000, null, null, 4000, 4000, 0, 1, 0),
      VB.edge(4000, 4000, null, null, 2000, 4000, 0, 1, 0),
      VB.edge(2000, 4000, null, null, 2000, 2000, 0, 1, 0));
    var r4 = VB.bucketFill(doc3, 1000, 1000, { color: { r: 255, g: 200, b: 0, a: 255 } });
    check("annulus stamps outer+hole", r4.stamped === 8, r4.stamped + " stamped");
    var fAnnulus = VB.geom.fillAt(doc3, 1000, 1000);
    var fIsland = VB.geom.fillAt(doc3, 3000, 3000);
    check("annulus filled", fAnnulus === 2, "fill " + fAnnulus);
    check("island keeps its fill", fIsland === 1, "fill " + fIsland);
    check("island edges dual-faced", doc3.edges.filter(function (e) {
      return e.fill0 === 2 && e.fill1 === 1;
    }).length === 4);
    check("island invariant", doc3.validate().length === 0, doc3.validate()[0]);

    // 6. Refill with the same color (idempotent, style deduped).
    var stylesBefore = doc3.fills.length;
    VB.bucketFill(doc3, 1000, 1000, { color: { r: 255, g: 200, b: 0, a: 255 } });
    check("refill dedupes style", doc3.fills.length === stylesBefore);
    check("refill keeps fill", VB.geom.fillAt(doc3, 1000, 1000) === 2);
  })();

  // =============== unit tests: gap snapping & curved islands ===============
  // Regression for the flood-fill bug: casually drawn strokes leave twip
  // gaps; endpoint snapping must close them or fills leak everywhere.
  log("gap snapping:");
  (function () {
    var stroke = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };
    function arc(cx, cy, r, gapTw, n) {
      var pts = [];
      var to = Math.PI * 2 - gapTw / r;
      for (var i = 0; i <= n; i++) {
        var a = to * (i / n);
        pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
      }
      return pts;
    }

    // near-closed pencil loop auto-closes and fills like a circle
    var doc = new VB.VBDocument();
    VB.pencilCommit(doc, arc(4000, 4000, 900, 40, 30), stroke);
    var e0 = doc.edges[0], eN = doc.edges[doc.edges.length - 1];
    check("loop auto-closed", e0.ax === eN.bx && e0.ay === eN.by);
    var rl = VB.bucketFill(doc, 4000, 4000, { color: { r: 255, g: 0, b: 200, a: 255 } });
    check("loop fills inside", rl.stamped > 0 && VB.geom.fillAt(doc, 4000, 4000) !== 0);
    check("loop fill contained", VB.geom.fillAt(doc, 6000, 4000) === 0);
    check("loop planar", VB.validatePlanar(doc).length === 0);

    // outline + curved island + short divider: fill one lobe only
    var doc2 = new VB.VBDocument();
    VB.pencilCommit(doc2, arc(6000, 6000, 4000, 40, 60), stroke);
    VB.pencilCommit(doc2, arc(4800, 6000, 900, 40, 30), stroke);
    VB.pencilCommit(doc2, [
      { x: 8300, y: 2790 }, { x: 8350, y: 4500 }, { x: 8400, y: 6000 },
      { x: 8350, y: 7500 }, { x: 8300, y: 9210 }
    ], stroke); // stops ~60tw short of the outline: must T-weld
    var rg = VB.bucketFill(doc2, 7000, 6000, { color: { r: 100, g: 220, b: 120, a: 255 } });
    check("lobe fill works", rg.stamped > 0);
    check("curved island blocks fill", VB.geom.fillAt(doc2, 4800, 6000) === 0);
    check("divider T-weld blocks fill", VB.geom.fillAt(doc2, 9200, 6000) === 0);
    check("outside stays empty", VB.geom.fillAt(doc2, 500, 500) === 0);
    check("gap doc planar", VB.validatePlanar(doc2).length === 0);
  })();

  // ======================= unit tests: eraser ==============================
  log("eraser:");
  (function () {
    var stroke = { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } };
    function filledSquare() {
      var d = new VB.VBDocument();
      d.fills.push(VB.solidFill(200, 60, 60));
      d.edges.push(
        VB.edge(0, 0, null, null, 4000, 0, 0, 1, 0),
        VB.edge(4000, 0, null, null, 4000, 4000, 0, 1, 0),
        VB.edge(4000, 4000, null, null, 0, 4000, 0, 1, 0),
        VB.edge(0, 4000, null, null, 0, 0, 0, 1, 0));
      return d;
    }

    // 1. Band erase across a filled square: two filled regions remain.
    var doc = filledSquare();
    var r1 = VB.eraseStroke(doc, [
      { x: -600, y: 2000 }, { x: 2000, y: 2000 }, { x: 4600, y: 2000 }
    ], 400);
    check("band removes edges", r1.removed > 0, r1.removed + " removed");
    check("band keeps boundary", r1.boundary > 0, r1.boundary + " kept");
    check("band: top still filled", VB.geom.fillAt(doc, 2000, 800) === 1);
    check("band: middle erased", VB.geom.fillAt(doc, 2000, 2000) === 0);
    check("band: bottom still filled", VB.geom.fillAt(doc, 2000, 3300) === 1);
    check("band: invariant", doc.validate().length === 0, doc.validate()[0]);
    check("band: planar", VB.validatePlanar(doc).length === 0);

    // 2. Dab hole in a fill, then bucket-refill heals it completely.
    var doc2 = filledSquare();
    var r2 = VB.eraseStroke(doc2, [{ x: 2000, y: 2000 }], 500);
    check("dab erases hole", VB.geom.fillAt(doc2, 2000, 2000) === 0);
    check("dab keeps surround", VB.geom.fillAt(doc2, 500, 500) === 1);
    check("dab boundary has no line", doc2.edges.every(function (e) {
      return e.line === 0 || (e.fill0 !== 0 || e.fill1 !== 0);
    }));
    var oneSided = doc2.edges.filter(function (e) {
      return (e.fill0 === 1) !== (e.fill1 === 1);
    });
    // The boolean-mask core emits a FITTED outline (Flash-lean): a round
    // hole is ~8-12 quads, not the raw fragment count the old pipeline had.
    check("dab boundary one-sided", oneSided.length >= 6, oneSided.length + " edges");
    VB.bucketFill(doc2, 2000, 2000, { color: { r: 200, g: 60, b: 60, a: 255 } });

    check("trim keeps line style", doc3.edges.every(function (e) { return e.line === 1; }));

    var stormFills = VB.buildFillPaths(storm);
    var stormOpen = 0;
    for (var sp = 1; sp < stormFills.length; sp++) {

  // ======================= unit tests: brush ===============================

    check("dab chains closed + planar", VB.integrityReport(doc).length === 0,

    check("union no interior borders", doc2.edges.every(function (e) {

    VB.brushStroke(doc3, [{ x: 1500, y: 4000 }, { x: 6500, y: 4000 }], 400, blue);

    check("overlap owned by new color", VB.geom.fillAt(doc3, 4000, 4000) === 2);

    var doc4 = new VB.VBDocument();
    VB.pencilCommit(doc4, [{ x: 1000, y: 4000 }, { x: 4000, y: 4000 }, { x: 7000, y: 4000 }], stroke);

    check("paint region filled", VB.geom.fillAt(doc4, 4000, 4000) === 1);

    // 5. Brush across an existing fill (different color): paints over.

    doc5.edges.push(

    VB.brushStroke(doc5, [{ x: 1000, y: 4000 }, { x: 7000, y: 4000 }], 400, red);
    check("paint-over: band is red", VB.geom.fillAt(doc5, 4000, 4000) === 2);
    check("paint-over: above still blue", VB.geom.fillAt(doc5, 4000, 2800) === 1);
    check("paint-over: below still blue", VB.geom.fillAt(doc5, 4000, 5200) === 1);
    check("paint-over: outside band red tips", VB.geom.fillAt(doc5, 1200, 4000) === 2);
    check("paint-over consistent", VB.integrityReport(doc5).length === 0,
      VB.integrityReport(doc5)[0]);

    // 6. Long self-crossing scribble (the reported wedge corruption):
    //    heavy self-overlap must yield a clean union with closed
    //    boundaries and no phantom chord edges.
    (function () {
      var lcg = 777;
      function rr() { lcg = (lcg * 1103515245 + 12345) & 0x7fffffff; return lcg / 0x7fffffff; }
      var sdoc = new VB.VBDocument();
      var x = 3000, y = 3000, heading = rr() * Math.PI * 2;
      var spts = [];
      for (var i = 0; i < 180; i++) {

  })();

  // ============== regression: real user session (189KB journal) ============
  // Replays a recorded session (1 pencil scribble, 18 fills, 55 erases,
  // 27 undos) that exhibited "erasing makes a whole region disappear" at
  // ops 42/72/101. Coverage-diffs every erase: fills may only vanish
  // within reach of the erase path.
  log("user session replay:");
  await (async function () {
    var ops = window.VBUserLog.ops;
    var GRID = 500;
    function sampleFills(doc) {
      var m = new Map();
      for (var x = GRID / 2; x < doc.width; x += GRID) {
        for (var y = GRID / 2; y < doc.height; y += GRID) {
          var f = VB.geom.fillAt(doc, x, y);
          if (f) m.set(x + "," + y, f);
        }
      }
      return m;
    }
    var prevSamples = null;
    var vanishEvents = 0, firstCorrupt = -1;
    var res = await VB.replayJournal(ops, {
      onOp: function (i, op, doc) {
        if (firstCorrupt < 0 && VB.integrityReport(doc).length) firstCorrupt = i;
        var cur = sampleFills(doc);
        if (prevSamples && op.op === "erase") {
          prevSamples.forEach(function (f, key) {
            if (cur.has(key)) return;
            var xy = key.split(",");
            if (VB.distToPath(op.points, +xy[0], +xy[1]) > op.radius + 80) vanishEvents++;
          });
        }
        prevSamples = cur;
      }
    });
    check("session replays without corruption", firstCorrupt < 0, "corrupt at op#" + firstCorrupt);
    check("no region vanishes beyond the eraser", vanishEvents === 0,
      vanishEvents + " far-vanish samples");
    check("session end state non-trivial", res.doc.edges.length > 100,
      res.doc.edges.length + " edges");
  })();

  await (async function () {
    var red = { r: 204, g: 102, b: 102, a: 255 };
    var blk = { width: 40, color: { r: 0, g: 0, b: 0, a: 255 } };

    // 1. reshape a straight stroke: L -> Q, endpoints pinned, curve
    //    through the drag point
    var doc = new VB.VBDocument();
    doc.width = 11000; doc.height = 8000;
    VB.lineCommit(doc, { x: 2000, y: 2000 }, { x: 8000, y: 2000 }, blk, 0);
    check("reshape target is one straight record",
      doc.edges.length === 1 && doc.edges[0].cx === null);
    var key = VB.arrowEdgeKey(doc.edges[0]);
    VB.arrowReshape(doc, key, 0.5, 5000, 3000);
    check("reshape L->Q", doc.edges.length === 1 && doc.edges[0].cx !== null);
    check("reshape endpoints pinned",
      doc.edges[0].ax === 2000 && doc.edges[0].ay === 2000 &&
      doc.edges[0].bx === 8000 && doc.edges[0].by === 2000);
    var mid = VB.geom.evalEdge(doc.edges[0], 0.5);
    check("reshaped curve passes through the drag point",
      Math.hypot(mid.x - 5000, mid.y - 3000) < 3,
      "(" + Math.round(mid.x) + "," + Math.round(mid.y) + ")");
    check("reshape keeps the stroke", doc.edges[0].line === 1);

    // 2. move a stroked rectangle's corner node
    var doc2 = new VB.VBDocument();
    doc2.width = 11000; doc2.height = 8000;
    VB.shapeCommit(doc2, VB.rectLoop(2100, 3700, 6300, 5400), null, blk);
    VB.arrowMoveNode(doc2, 2100, 3700, 1500, 1200);
    var atNew = 0, atOld = 0;
    doc2.edges.forEach(function (e) {
      if ((e.ax === 1500 && e.ay === 1200) || (e.bx === 1500 && e.by === 1200)) atNew++;
      if ((e.ax === 2100 && e.ay === 3700) || (e.bx === 2100 && e.by === 3700)) atOld++;
    });
    check("node move: incident records follow", atNew === 2 && atOld === 0,
      atNew + " at new, " + atOld + " at old");
    check("node move consistent", VB.integrityReport(doc2).length === 0,
      VB.integrityReport(doc2)[0]);

    // 3. fill face: lift-and-drop, then delete
    var doc3 = new VB.VBDocument();
    doc3.width = 11000; doc3.height = 8000;
    VB.shapeCommit(doc3, VB.ellipseLoop(4000, 3000, 1500, 1200), red, null);
    VB.arrowMoveFill(doc3, 4000, 3000, 3000, 1500);
    check("moved fill: source empty", VB.geom.fillAt(doc3, 4000, 3000) === 0);
    check("moved fill: destination filled", VB.geom.fillAt(doc3, 7000, 4500) === 1);
    check("moved fill consistent", VB.integrityReport(doc3).length === 0,
      VB.integrityReport(doc3)[0]);
    VB.arrowDeleteFill(doc3, 7000, 4500);
    check("deleted fill: empty", VB.geom.fillAt(doc3, 7000, 4500) === 0);
    check("deleted fill: lineless boundary dissolved", doc3.edges.length === 0,
      doc3.edges.length + " edges left");

    // 4. journal replay of arrow ops with undo/redo
    var ops = [
      { op: "new", width: 11000, height: 8000 },
      { op: "oval", x0: 2500, y0: 1800, x1: 5500, y1: 4200, fill: red, line: null },
      { op: "moveFill", x: 4000, y: 3000, dx: 2500, dy: 1000 },
      { op: "undo" },
      { op: "redo" },
      { op: "deleteFill", x: 6500, y: 4000 }
    ];
    var res = await VB.replayJournal(ops);
    check("arrow ops replay deterministically",
      VB.integrityReport(res.doc).length === 0 &&
      VB.geom.fillAt(res.doc, 6500, 4000) === 0 &&
      VB.geom.fillAt(res.doc, 4000, 3000) === 0,
      VB.integrityReport(res.doc)[0]);

    // 5. connected strokes: a pencil zig-zag is one attached chain
    var doc5 = new VB.VBDocument();
    doc5.width = 11000; doc5.height = 8000;
    VB.lineCommit(doc5, { x: 1000, y: 1000 }, { x: 3000, y: 2000 }, blk, 0);
    VB.lineCommit(doc5, { x: 3000, y: 2000 }, { x: 5000, y: 1000 }, blk, 0);
    VB.lineCommit(doc5, { x: 5000, y: 1000 }, { x: 7000, y: 2200 }, blk, 0);
    VB.lineCommit(doc5, { x: 1000, y: 6000 }, { x: 7000, y: 6000 }, blk, 0); // detached
    var chain = VB.connectedStrokeKeys(doc5, 0);
    check("double-click selects attached strokes", chain.length === 3,
      chain.length + " records");

    // 6. deleting a shared stroked border collapses same-color fills
    var doc6 = new VB.VBDocument();
    doc6.width = 11000; doc6.height = 8000;
    VB.shapeCommit(doc6, VB.rectLoop(2000, 2000, 5000, 5000), red, blk);
    VB.shapeCommit(doc6, VB.rectLoop(5000, 2000, 8000, 5000), red, blk);
    var borderKeys = [];
    doc6.edges.forEach(function (e) {
      if (e.line > 0 && e.ax === 5000 && e.bx === 5000) {
        borderKeys.push(VB.arrowEdgeKey(e));
      }
    });
    check("shared border found", borderKeys.length > 0, borderKeys.length + " records");
    VB.arrowDeleteSel(doc6, [], borderKeys);
    var borderLeft = doc6.edges.some(function (e) {
      if (e.ax !== 5000 || e.bx !== 5000) return false;
      var m6 = VB.geom.evalEdge(e, 0.5);
      return m6.y > 2100 && m6.y < 4900;
    });
    check("same-color fills collapsed (border gone)", !borderLeft);
    check("merged region still filled",
      VB.geom.fillAt(doc6, 3500, 3500) === VB.geom.fillAt(doc6, 6500, 3500) &&
      VB.geom.fillAt(doc6, 3500, 3500) > 0);
    check("collapse consistent", VB.integrityReport(doc6).length === 0,
      VB.integrityReport(doc6)[0]);

    // 7. free transform: rotate 90° + scale 1.5 about the fill's center
    var doc7 = new VB.VBDocument();
    doc7.width = 11000; doc7.height = 8000;
    VB.shapeCommit(doc7, VB.rectLoop(3000, 3000, 5000, 4000), red, null);
    var cx7 = 4000, cy7 = 3500, s7 = 1.5;
    var m7 = [0, s7, -s7, 0, cx7 + s7 * cy7, cy7 - s7 * cx7];
    VB.arrowTransformSel(doc7, [{ x: 4000, y: 3500 }], [], m7);
    check("transform: center stays filled", VB.geom.fillAt(doc7, 4000, 3500) === 1);
    check("transform: rotated extent",
      VB.geom.fillAt(doc7, 4000, 3500 + 1200) === 1 &&
      VB.geom.fillAt(doc7, 4000 + 1200, 3500) === 0);
    check("transform consistent", VB.integrityReport(doc7).length === 0,
      VB.integrityReport(doc7)[0]);

    // 8. transformSel replay determinism (fill + stroke moved together)
    var ops8 = [
      { op: "new", width: 11000, height: 8000 },
      { op: "rect", x0: 2000, y0: 2000, x1: 4000, y1: 4000, fill: red, line: null },
      { op: "line", a: { x: 2000, y: 5000 }, b: { x: 4000, y: 5000 },
        style: blk, snapTol: 0 }
    ];
    var res8a = await VB.replayJournal(ops8);
    var strokeKey = null;
    res8a.doc.edges.forEach(function (e) {
      if (e.line > 0) strokeKey = VB.arrowEdgeKey(e);
    });
    ops8.push({ op: "transformSel", fills: [{ x: 3000, y: 3000 }],
                edgeKeys: [strokeKey], m: [1, 0, 0, 1, 4000, 0] });
    ops8.push({ op: "undo" });
    ops8.push({ op: "redo" });
    var res8 = await VB.replayJournal(ops8);
    check("transformSel moves fill+stroke together",
      VB.geom.fillAt(res8.doc, 7000, 3000) === 1 &&
      VB.geom.fillAt(res8.doc, 3000, 3000) === 0 &&
      res8.doc.edges.some(function (e) {
        return e.line > 0 && e.ay === 5000 && e.ax >= 6000;
      }),
      "fill/stroke placement");
    check("transformSel replay consistent",
      VB.integrityReport(res8.doc).length === 0, VB.integrityReport(res8.doc)[0]);

    // 9. marquee region CUTS through geometry: drag half a fill away
    var doc9 = new VB.VBDocument();
    doc9.width = 11000; doc9.height = 8000;
    VB.shapeCommit(doc9, VB.rectLoop(2000, 2000, 6000, 4000), red, null);
    var regionPts = [{ x: 4000, y: 1500 }, { x: 6500, y: 1500 },
                     { x: 6500, y: 4500 }, { x: 4000, y: 4500 }];
    VB.regionTransform(doc9, regionPts, [1, 0, 0, 1, 3000, 0]);
    check("marquee cut: left half stays", VB.geom.fillAt(doc9, 3000, 3000) === 1);
    check("marquee cut: source of chunk empty", VB.geom.fillAt(doc9, 5000, 3000) === 0);
    check("marquee cut: moved chunk filled", VB.geom.fillAt(doc9, 8000, 3000) === 1);
    check("marquee cut consistent", VB.integrityReport(doc9).length === 0,
      VB.integrityReport(doc9)[0]);

    // 10. lasso polygon delete carves a wedge
    var tri = [{ x: 2200, y: 2200 }, { x: 3800, y: 2400 }, { x: 2600, y: 3600 }];
    VB.regionDelete(doc9, tri);
    check("lasso delete: wedge erased", VB.geom.fillAt(doc9, 2800, 2600) === 0);
    check("lasso delete: rest intact", VB.geom.fillAt(doc9, 2200, 3800) === 1);
    check("lasso delete consistent", VB.integrityReport(doc9).length === 0,
      VB.integrityReport(doc9)[0]);

    // 11. region ops replay deterministically (with a stroke crossing)
    var ops11 = [
      { op: "new", width: 11000, height: 8000 },
      { op: "rect", x0: 2000, y0: 2000, x1: 6000, y1: 4000, fill: red, line: null },
      { op: "line", a: { x: 1000, y: 3000 }, b: { x: 7000, y: 3000 },
        style: blk, snapTol: 0 },
      { op: "regionTransform",
        points: [{ x: 4000, y: 1500 }, { x: 6500, y: 1500 },
                 { x: 6500, y: 4500 }, { x: 4000, y: 4500 }],
        m: [1, 0, 0, 1, 0, 3200] },
      { op: "undo" },
      { op: "redo" }
    ];
    var res11 = await VB.replayJournal(ops11);
    check("region replay: chunk moved down",
      VB.geom.fillAt(res11.doc, 5000, 3000 + 3200) === 1 &&
      VB.geom.fillAt(res11.doc, 5000, 3000) === 0);
    check("region replay: clipped stroke moved too",
      res11.doc.edges.some(function (e) {
        if (e.line === 0) return false;
        var m11 = VB.geom.evalEdge(e, 0.5);
        return m11.y > 5800 && m11.x > 4000;
      }));
    check("region replay consistent",
      VB.integrityReport(res11.doc).length === 0, VB.integrityReport(res11.doc)[0]);

    // 12. reshape SWEEPS its lens across a fill island: the swept area
    //     changes owner and the island's stale boundary inside the lens
    //     is reconciled (the invisible-overlap bug)
    var doc12 = new VB.VBDocument();
    doc12.width = 11000; doc12.height = 8000;
    VB.shapeCommit(doc12, VB.rectLoop(2000, 2000, 6000, 4000), red, null);
    VB.regionDelete(doc12, [{ x: 3000, y: 2600 }, { x: 4000, y: 2600 },
                            { x: 4000, y: 3400 }, { x: 3000, y: 3400 }]);
    check("island carved", VB.geom.fillAt(doc12, 3500, 3000) === 0);
    var leftKey = null;
    doc12.edges.forEach(function (e) {
      if (e.ax === 2000 && e.bx === 2000 && e.line === 0 &&
          Math.abs(e.ay - e.by) > 1000) leftKey = VB.arrowEdgeKey(e);
    });
    check("left boundary found", !!leftKey);
    // drag the left boundary INWARD past the island: the lens empties,
    // consuming the island and its boundary
    VB.arrowReshape(doc12, leftKey, 0.5, 4500, 3000);
    check("swept lens emptied", VB.geom.fillAt(doc12, 2500, 3000) === 0);
    check("island area clean (no stale overlap)",
      VB.geom.fillAt(doc12, 3500, 3000) === 0);
    var staleIsland = doc12.edges.filter(function (e) {
      var m12 = VB.geom.evalEdge(e, 0.5);
      return m12.x > 3050 && m12.x < 3950 && m12.y > 2900 && m12.y < 3100;
    });
    check("island boundary inside the lens reconciled", staleIsland.length === 0,
      staleIsland.length + " stale edges");
    check("rest of rect intact", VB.geom.fillAt(doc12, 5500, 3000) === 1);
    check("reshape-over-island consistent",
      VB.integrityReport(doc12).length === 0, VB.integrityReport(doc12)[0]);

    // 13. reshaping OUTWARD drags the fill with the boundary
    var doc13 = new VB.VBDocument();
    doc13.width = 11000; doc13.height = 8000;
    VB.shapeCommit(doc13, VB.rectLoop(2000, 2000, 6000, 4000), red, null);
    var leftKey13 = null;
    doc13.edges.forEach(function (e) {
      if (e.ax === 2000 && e.bx === 2000 && e.line === 0) {
        leftKey13 = VB.arrowEdgeKey(e);
      }
    });
    VB.arrowReshape(doc13, leftKey13, 0.5, 800, 3000);
    check("outward reshape fills the lens", VB.geom.fillAt(doc13, 1400, 3000) === 1,
      "fillAt=" + VB.geom.fillAt(doc13, 1400, 3000));
    check("outward reshape keeps the rest", VB.geom.fillAt(doc13, 5000, 3000) === 1);
    check("outward reshape consistent",
      VB.integrityReport(doc13).length === 0, VB.integrityReport(doc13)[0]);

    // 14. moving strokes OFF a bucket-filled region leaves the fill
    //     behind a lineless boundary (fills don't follow their strokes)
    var doc14 = new VB.VBDocument();
    doc14.width = 11000; doc14.height = 8000;
    VB.shapeCommit(doc14, VB.rectLoop(2000, 2000, 5000, 4000), null, blk);
    VB.bucketFill(doc14, 3500, 3000, { color: { r: 102, g: 204, b: 255, a: 255 } });
    check("bucket filled the stroked rect", VB.geom.fillAt(doc14, 3500, 3000) > 0);
    var strokeKeys14 = [];
    doc14.edges.forEach(function (e) {
      if (e.line > 0) strokeKeys14.push(VB.arrowEdgeKey(e));
    });
    check("stroked outline found", strokeKeys14.length >= 4,
      strokeKeys14.length + " records");
    VB.arrowTransformSel(doc14, [], strokeKeys14, [1, 0, 0, 1, 0, 3200]);
    check("fill stays when its strokes move away",
      VB.geom.fillAt(doc14, 3500, 3000) > 0,
      "fillAt=" + VB.geom.fillAt(doc14, 3500, 3000));
    var linelessBoundary14 = doc14.edges.some(function (e) {
      return e.line === 0 && (e.fill0 > 0) !== (e.fill1 > 0) &&
        VB.geom.evalEdge(e, 0.5).y < 4500;
    });
    check("fill boundary became lineless", linelessBoundary14);
    var movedStrokes14 = doc14.edges.filter(function (e) {
      return e.line > 0 && VB.geom.evalEdge(e, 0.5).y > 4600;
    });
    check("strokes arrived at destination", movedStrokes14.length >= 4,
      movedStrokes14.length + " records");
    check("stroke-lift consistent",
      VB.integrityReport(doc14).length === 0, VB.integrityReport(doc14)[0]);
  })();

  // ======================= SWF export round-trip ===========================
  // The exporter's claim is 1:1: whatever the editor holds comes back
  // bit-identical through our own SWF reader (which is itself validated
  // against the MX 2004 reference files). Styles, stage, background and
  // the full edge-record multiset must survive the trip.
  log("swf export:");
  await (async function () {
    // A document drawn with the real tools.
    var doc = new VB.VBDocument();
    doc.width = 11000; doc.height = 8000;
    VB.brushStroke(doc, [{ x: 2000, y: 4000 }, { x: 4200, y: 3400 }, { x: 6000, y: 4400 }],
      400, { r: 204, g: 102, b: 102, a: 255 });
    VB.pencilCommit(doc, [{ x: 1000, y: 1000 }, { x: 4000, y: 1400 }, { x: 8000, y: 900 }],
      { width: 40, color: { r: 0, g: 0, b: 0, a: 255 } });
    VB.brushStroke(doc, [{ x: 7000, y: 5500 }], 500, { r: 102, g: 204, b: 255, a: 255 });

    var bytes = VB.encodeSWF(doc);
    check("export produces a movie", bytes.length > 64, bytes.length + " B");
    check("FWS v7 header", bytes[0] === 0x46 && bytes[1] === 0x57 &&
      bytes[2] === 0x53 && bytes[3] === 7);
    var fileLen = bytes[4] | (bytes[5] << 8) | (bytes[6] << 16) | (bytes[7] << 24);
    check("header length field", fileLen === bytes.length, fileLen + " vs " + bytes.length);

    var back = await VB.parseSWF(bytes.buffer);
    var doc2 = back.doc;
    check("reimports through our reader", !!doc2 && doc2.edges.length > 0);
    check("stage round-trips", doc2.width === doc.width && doc2.height === doc.height);
    check("background round-trips", hexColor(doc2.background) === hexColor(doc.background));
    check("styles round-trip", doc2.fills.length === doc.fills.length &&
      doc2.lines.length === doc.lines.length,
      doc2.fills.length + "/" + doc2.lines.length + " vs " +
      doc.fills.length + "/" + doc.lines.length);
    var diff = sameStringArrays(edgeKeySet(doc), edgeKeySet(doc2));
    check("edge records round-trip 1:1", diff === null, diff);

    // Reference files survive load -> export -> reload unchanged.
    for (var xi = 0; xi < Math.min(3, window.VBTestFixtures.length); xi++) {
      var fx2 = window.VBTestFixtures[xi];
      var orig = (await VB.parseSWF(b64ToBuf(fx2.b64))).doc;
      var re = (await VB.parseSWF(VB.encodeSWF(orig).buffer)).doc;
      var d2 = sameStringArrays(edgeKeySet(orig), edgeKeySet(re));
      check("fixture " + fx2.name + " re-export 1:1", d2 === null, d2);
    }
  })();

  // ======================= fixture pipeline tests ==========================
  for (var fi = 0; fi < window.VBTestFixtures.length; fi++) {
    var fx = window.VBTestFixtures[fi];
    log(fx.name + ":");
    try {
      var buf = b64ToBuf(fx.b64);
      var t0 = performance.now();
      var res = await VB.parseSWF(buf);
      var parseMs = performance.now() - t0;
      var doc = res.doc;
      var s = doc.stats();
      var ex = fx.expected;

      check("stage width", doc.width === ex.widthTwips, doc.width + " vs " + ex.widthTwips);
      check("stage height", doc.height === ex.heightTwips, doc.height + " vs " + ex.heightTwips);
      check("background", hexColor(doc.background) === ex.bg, hexColor(doc.background) + " vs " + ex.bg);
      check("fill styles", s.fills === ex.fills, s.fills + " vs " + ex.fills);
      check("line styles", s.lines === ex.lines, s.lines + " vs " + ex.lines);
      check("straight edges", s.straight === ex.straight, s.straight + " vs " + ex.straight);
      check("curved edges", s.curved === ex.curved, s.curved + " vs " + ex.curved);

      // Flash-parity invariant: integer twips + valid style indices.
      var bad = doc.validate();
      check("integer-twips invariant", bad.length === 0, bad[0]);

      // Encoder stats must agree with the actual uncompressed encoding.
      var st = VB.vbdStats(doc);
      check("stats edges match doc",
        st.straightEdges + st.curvedEdges >= s.edges,   // >= because oversized edges may split
        st.straightEdges + st.curvedEdges + " vs " + s.edges);

      // Fill/stroke tracing sanity: every fill style with edges must yield
      // at least one closed loop.
      var fillPaths = VB.buildFillPaths(doc);
      var openLoops = 0, loops = 0;
      for (var f = 1; f < fillPaths.length; f++) {
        for (var c = 0; c < fillPaths[f].length; c++) {
          loops++;
          if (!fillPaths[f][c].closed) openLoops++;
        }
      }
      check("fill loops close", openLoops === 0, openLoops + " of " + loops + " loops open");

      // VBD round-trip, uncompressed.
      var rawVbd = await VB.encodeVBD(doc, { compress: false });
      check("stats bytes match encoding", st.fileBytes === rawVbd.length,
        st.fileBytes + " vs " + rawVbd.length);
      var dec1 = await VB.decodeVBD(rawVbd);
      var diff1 = sameStringArrays(edgeKeySet(doc), edgeKeySet(dec1.doc));
      check("vbd roundtrip edges", diff1 === null, diff1);
      check("vbd roundtrip fills", JSON.stringify(doc.fills) === JSON.stringify(dec1.doc.fills));
      check("vbd roundtrip lines", JSON.stringify(doc.lines) === JSON.stringify(dec1.doc.lines));
      check("vbd roundtrip stage", dec1.doc.width === doc.width && dec1.doc.height === doc.height);

      // VBD round-trip, compressed.
      var zipVbd = await VB.encodeVBD(doc, { compress: true });
      var dec2 = await VB.decodeVBD(zipVbd);
      var diff2 = sameStringArrays(edgeKeySet(doc), edgeKeySet(dec2.doc));
      check("vbd compressed roundtrip", diff2 === null, diff2);

      log("  ok · parse " + parseMs.toFixed(1) + "ms · swf " + fx.b64.length * 3 / 4 +
          "B ≈ vbd " + rawVbd.length + "B raw / " + zipVbd.length + "B deflate", "pass");

      // Render for the screenshot pass.
      var cell = document.createElement("div");
      cell.className = "cell";
      var label = document.createElement("div");
      label.textContent = fx.name;
      var cv = document.createElement("canvas");
      var scale = 260 / (doc.width / VB.TWIPS);
      cv.width = 260;
      cv.height = Math.round(doc.height / VB.TWIPS * scale);
      cell.appendChild(label);
      cell.appendChild(cv);
      document.getElementById("grid").appendChild(cell);
      VB.render(cv.getContext("2d"), doc, { zoom: scale, panX: 0, panY: 0, dpr: 1 });
    } catch (err) {
      fail++;
      log("  EXCEPTION: " + (err && err.stack || err), "fail");
    }
  }

  // ================== visual: debug overlay + synthetic pencil ==============
  try {
    // Debug view over a real two-fill drawing (fill-side tick check).
    var fxB = window.VBTestFixtures.find(function (f) { return f.name.indexOf("Brush003") >= 0; });
    var resB = await VB.parseSWF(b64ToBuf(fxB.b64));
    var cellD = document.createElement("div");
    cellD.className = "cell";
    var labD = document.createElement("div");
    labD.textContent = "DEBUG VIEW: " + fxB.name;
    var cvD = document.createElement("canvas");
    var zD = 520 / (resB.doc.width / VB.TWIPS);
    cvD.width = 520;
    cvD.height = Math.round(resB.doc.height / VB.TWIPS * zD);
    cellD.appendChild(labD);
    cellD.appendChild(cvD);
    document.getElementById("grid").appendChild(cellD);
    var ctxD = cvD.getContext("2d");
    VB.render(ctxD, resB.doc, { zoom: zD, panX: 0, panY: 0, dpr: 1 });
    VB.renderDebug(ctxD, resB.doc, { zoom: zD, panX: 0, panY: 0, dpr: 1 }, -1);

    // Synthetic pencil drawing: wavy stroke + crossing stroke over a square.
    var docP = new VB.VBDocument();
    docP.width = 8000; docP.height = 6000;
    docP.fills.push(VB.solidFill(120, 200, 255));
    docP.edges.push(
      VB.edge(1000, 1000, null, null, 5000, 1000, 0, 1, 0),
      VB.edge(5000, 1000, null, null, 5000, 5000, 0, 1, 0),
      VB.edge(5000, 5000, null, null, 1000, 5000, 0, 1, 0),
      VB.edge(1000, 5000, null, null, 1000, 1000, 0, 1, 0));
    var wave = [];
    for (var wv = 0; wv <= 60; wv++) {
      wave.push({ x: 200 + wv * 125, y: 3000 + Math.round(1800 * Math.sin(wv / 6)) });
    }
    VB.pencilCommit(docP, wave, { width: 40, color: { r: 200, g: 40, b: 40, a: 255 } });
    var cellP = document.createElement("div");
    cellP.className = "cell";
    var labP = document.createElement("div");
    labP.textContent = "SYNTHETIC PENCIL over fill (+debug)";
    var cvP = document.createElement("canvas");
    cvP.width = 520; cvP.height = 390;
    cellP.appendChild(labP);
    cellP.appendChild(cvP);
    document.getElementById("grid").appendChild(cellP);
    var vP = { zoom: 520 / 400, panX: 0, panY: 0, dpr: 1 };
    VB.render(cvP.getContext("2d"), docP, vP);
    VB.renderDebug(cvP.getContext("2d"), docP, vP, -1);

    // sanity: the wave was merged into the square's planar map
    var waveInside = docP.edges.filter(function (e) { return e.line === 1 && e.fill0 === 1; }).length;
    check("wave inherits fill inside square", waveInside > 0, "0 inside pieces");
    check("wave split against square", docP.edges.length > 4 + 8, docP.edges.length + " edges");
  } catch (err) {
    fail++;
    log("  VISUAL EXCEPTION: " + (err && err.stack || err), "fail");
  }

  var summary = "VBTEST DONE pass=" + pass + " fail=" + fail;
  document.title = summary;
  log("");
  log(summary, fail ? "fail" : "pass");
})();
</script>

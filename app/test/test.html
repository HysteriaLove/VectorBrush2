      { op: "regionTransform",
        points: [{ x: 4000, y: 1500 }, { x: 6500, y: 1500 },
                 { x: 6500, y: 4500 }, { x: 4000, y: 4500 }],
        m: [1, 0, 0, 1, 0, 3200] },
      { op: "undo" },
      { op: "redo" }
    ];
    var res11 = await VB.replayJournal(ops11);
    check("region replay: chunk moved down",
      VB.geom.fillAt(res11.doc, 5000, 3000 + 3200) === 1 &&
      VB.geom.fillAt(res11.doc, 5000, 3000) === 0);
    check("region replay: clipped stroke moved too",
      res11.doc.edges.some(function (e) {
        if (e.line === 0) return false;
        var m11 = VB.geom.evalEdge(e, 0.5);
        return m11.y > 5800 && m11.x > 4000;
      }));
    check("region replay consistent",
      VB.integrityReport(res11.doc).length === 0, VB.integrityReport(res11.doc)[0]);

    // 12. reshape SWEEPS its lens across a fill island: the swept area
    //     changes owner and the island's stale boundary inside the lens
    //     is reconciled (the invisible-overlap bug)
    var doc12 = new VB.Y2KVectorDocument();
    doc12.width = 11000; doc12.height = 8000;
    VB.shapeCommit(doc12, VB.rectLoop(2000, 2000, 6000, 4000), red, null);
    VB.regionDelete(doc12, [{ x: 3000, y: 2600 }, { x: 4000, y: 2600 },
                            { x: 4000, y: 3400 }, { x: 3000, y: 3400 }]);
    check("island carved", VB.geom.fillAt(doc12, 3500, 3000) === 0);
    var leftKey = null;
    doc12.edges.forEach(function (e) {
      if (e.ax === 2000 && e.bx === 2000 && e.line === 0 &&
          Math.abs(e.ay - e.by) > 1000) leftKey = VB.arrowEdgeKey(e);
    });
    check("left boundary found", !!leftKey);
    // drag the left boundary INWARD past the island: the lens empties,
    // consuming the island and its boundary
    VB.arrowReshape(doc12, leftKey, 0.5, 4500, 3000);
    check("swept lens emptied", VB.geom.fillAt(doc12, 2500, 3000) === 0);
    check("island area clean (no stale overlap)",
      VB.geom.fillAt(doc12, 3500, 3000) === 0);
    var staleIsland = doc12.edges.filter(function (e) {
      var m12 = VB.geom.evalEdge(e, 0.5);
      return m12.x > 3050 && m12.x < 3950 && m12.y > 2900 && m12.y < 3100;
    });
    check("island boundary inside the lens reconciled", staleIsland.length === 0,
      staleIsland.length + " stale edges");
    check("rest of rect intact", VB.geom.fillAt(doc12, 5500, 3000) === 1);
    check("reshape-over-island consistent",
      VB.integrityReport(doc12).length === 0, VB.integrityReport(doc12)[0]);

    // 13. reshaping OUTWARD drags the fill with the boundary
    var doc13 = new VB.Y2KVectorDocument();
    doc13.width = 11000; doc13.height = 8000;
    VB.shapeCommit(doc13, VB.rectLoop(2000, 2000, 6000, 4000), red, null);
    var leftKey13 = null;
    doc13.edges.forEach(function (e) {
      if (e.ax === 2000 && e.bx === 2000 && e.line === 0) {
        leftKey13 = VB.arrowEdgeKey(e);
      }
    });
    VB.arrowReshape(doc13, leftKey13, 0.5, 800, 3000);
    check("outward reshape fills the lens", VB.geom.fillAt(doc13, 1400, 3000) === 1,
      "fillAt=" + VB.geom.fillAt(doc13, 1400, 3000));
    check("outward reshape keeps the rest", VB.geom.fillAt(doc13, 5000, 3000) === 1);
    check("outward reshape consistent",
      VB.integrityReport(doc13).length === 0, VB.integrityReport(doc13)[0]);

    // 14. moving strokes OFF a bucket-filled region leaves the fill
    //     behind a lineless boundary (fills don't follow their strokes)
    var doc14 = new VB.Y2KVectorDocument();
    doc14.width = 11000; doc14.height = 8000;
    VB.shapeCommit(doc14, VB.rectLoop(2000, 2000, 5000, 4000), null, blk);
    VB.bucketFill(doc14, 3500, 3000, { color: { r: 102, g: 204, b: 255, a: 255 } });
    check("bucket filled the stroked rect", VB.geom.fillAt(doc14, 3500, 3000) > 0);
    var strokeKeys14 = [];
    doc14.edges.forEach(function (e) {
      if (e.line > 0) strokeKeys14.push(VB.arrowEdgeKey(e));
    });
    check("stroked outline found", strokeKeys14.length >= 4,
      strokeKeys14.length + " records");
    VB.arrowTransformSel(doc14, [], strokeKeys14, [1, 0, 0, 1, 0, 3200]);
    check("fill stays when its strokes move away",
      VB.geom.fillAt(doc14, 3500, 3000) > 0,
      "fillAt=" + VB.geom.fillAt(doc14, 3500, 3000));
    var linelessBoundary14 = doc14.edges.some(function (e) {
      return e.line === 0 && (e.fill0 > 0) !== (e.fill1 > 0) &&
        VB.geom.evalEdge(e, 0.5).y < 4500;
    });
    check("fill boundary became lineless", linelessBoundary14);
    var movedStrokes14 = doc14.edges.filter(function (e) {
      return e.line > 0 && VB.geom.evalEdge(e, 0.5).y > 4600;
    });
    check("strokes arrived at destination", movedStrokes14.length >= 4,
      movedStrokes14.length + " records");
    check("stroke-lift consistent",
      VB.integrityReport(doc14).length === 0, VB.integrityReport(doc14)[0]);

    // 15. free-transform SESSION: the tool stays live between gestures.
    //     The first gesture LIFTS the selection into a floating clip
    //     (un-journaled, like the arrow's float) so the drawing updates
    //     live; clicking away merges it back as ONE journal op.
    var doc15 = new VB.Y2KVectorDocument();
    doc15.width = 11000; doc15.height = 8000;
    VB.shapeCommit(doc15, VB.rectLoop(2000, 2000, 5000, 4000), red, null);
    var edges15 = doc15.edges.length;
    var journal15 = [], tool15, cursor15 = null;
    var app15 = {
      doc: doc15,
      view: { zoom: 1 },
      record: function (op) { journal15.push(op); },
      history: new VB.History(),
      docChanged: function () { tool15.discard(); },
      requestRender: function () {},
      setMsg: function () {},
      setCursor: function (c) { cursor15 = c; }
    };
    tool15 = VB.FreeTransformTool(app15);
    function gesture15(dx, dy) {
      var b = tool15.box;
      var c = { x: (b.x0 + b.x1) / 2, y: (b.y0 + b.y1) / 2 };
      tool15.onDown(c, {});
      tool15.onMove({ x: c.x + dx, y: c.y + dy });
      tool15.onUp({ x: c.x + dx, y: c.y + dy });
    }
    tool15.adopt({ fills: [{ x: 3500, y: 3000 }], edgeKeys: [] });
    check("adopting lifts the selection right away",
      !!tool15.float && VB.geom.fillAt(doc15, 3500, 3000) === 0 &&
      journal15.length === 0,
      "fillAt=" + VB.geom.fillAt(doc15, 3500, 3000));
    gesture15(1000, 0);
    gesture15(0, 500);
    check("session gestures keep the box live", !!tool15.box);
    check("session gestures journal nothing", journal15.length === 0,
      journal15.length + " ops");
    check("session keeps the selection lifted",
      !!tool15.float && VB.geom.fillAt(doc15, 3500, 3000) === 0,
      "fillAt=" + VB.geom.fillAt(doc15, 3500, 3000));
    var fq15 = tool15.frameQuad();
    check("frame followed the gestures",
      Math.abs(fq15[0].x - 3000) < 2 && Math.abs(fq15[0].y - 2500) < 2,
      JSON.stringify(fq15[0]));
    fq15 = (tool15.undoPending(), tool15.frameQuad());
    check("session undo pops one gesture",
      !!tool15.float &&
      Math.abs(fq15[0].x - 3000) < 2 && Math.abs(fq15[0].y - 2000) < 2,
      JSON.stringify(fq15[0]));
    check("session undo to zero un-lifts and restores the doc",
      tool15.undoPending() === true && tool15.float === null &&
      doc15.edges.length === edges15 && VB.geom.fillAt(doc15, 3500, 3000) === 1 &&
      journal15.length === 0,
      doc15.edges.length + " edges, fillAt=" + VB.geom.fillAt(doc15, 3500, 3000));
    gesture15(1000, 0);
    gesture15(0, 500);
    tool15.onDown({ x: 10500, y: 7500 }, {}); // click away
    tool15.onUp({ x: 10500, y: 7500 });
    check("click-away lands ONE composed op",
      journal15.length === 1 && journal15[0].op === "transformSel" &&
      Math.abs(journal15[0].m[4] - 1000) < 2 && Math.abs(journal15[0].m[5] - 500) < 2,
      JSON.stringify(journal15.map(function (o) { return o.op; })));
    check("session commit moved the fill",
      VB.geom.fillAt(doc15, 2500, 2200) === 0 &&
      VB.geom.fillAt(doc15, 5500, 4200) === 1);
    check("session commit consistent",
      VB.integrityReport(doc15).length === 0, VB.integrityReport(doc15)[0]);
    check("session commit deselects",
      tool15.items === null && tool15.box === null && tool15.float === null);
    // Escape abandons the pending gestures without committing: the
    // lifted clip goes back exactly (rect now 3000..6000 x 2500..4500)
    var edges15b = doc15.edges.length;
    tool15.adopt({ fills: [{ x: 4500, y: 3500 }], edgeKeys: [] });
    gesture15(800, 0);
    check("session gesture lifts again", !!tool15.float);
    check("session revert restores box and doc",
      tool15.revertPending() === true && tool15.float === null &&
      Math.abs(tool15.box.x0 - 3000) < 2 &&
      doc15.edges.length === edges15b && VB.geom.fillAt(doc15, 4500, 3500) === 1,
      "x0=" + (tool15.box && tool15.box.x0) + " edges=" + doc15.edges.length);
    tool15.onDown({ x: 10500, y: 7500 }, {});
    tool15.onUp({ x: 10500, y: 7500 });
    check("session revert commits nothing", journal15.length === 1,
      journal15.length + " ops");
    // ROTATED FRAME: the box remembers its rotation for the whole
    // session (Flash), and scaling then runs along the rotated axes.
    // Rect sits at 3000..6000 x 2500..4500 (center 4500,3500).
    tool15.adopt({ fills: [{ x: 4500, y: 3500 }], edgeKeys: [] });
    // hover cursors: rotate over the knob, resize over handles (world
    // direction), move inside
    tool15.onHover({ x: 4500, y: 1980 });
    check("knob hover shows the rotate cursor", /svg/.test(cursor15), cursor15);
    tool15.onHover({ x: 3000, y: 2500 });
    check("corner hover shows a resize cursor", /resize/.test(cursor15), cursor15);
    tool15.onHover({ x: 4500, y: 3500 });
    check("inside hover shows the move cursor", cursor15 === "move", cursor15);
    // the rotation knob floats above the mid-top edge (26 px stem)
    tool15.onDown({ x: 4500, y: 1980 }, {});
    check("rotation knob arms rotation",
      tool15.drag && tool15.drag.kind === "rotate",
      tool15.drag && tool15.drag.kind);
    tool15.onUp({ x: 4500, y: 1980 }); // no movement, nothing accumulates
    tool15.onDown({ x: 2600, y: 2300 }, {}); // outside corner: rotate zone
    check("near-corner grab arms rotation",
      tool15.drag && tool15.drag.kind === "rotate",
      tool15.drag && tool15.drag.kind);
    // drag to the down-point rotated 90 deg about the center
    tool15.onMove({ x: 5700, y: 1600 });
    tool15.onUp({ x: 5700, y: 1600 });
    var rq = tool15.frameQuad();
    check("frame stays rotated after the gesture",
      Math.abs(rq[0].x - 5500) < 2 && Math.abs(rq[0].y - 2000) < 2 &&
      Math.abs(rq[1].x - 5500) < 2 && Math.abs(rq[1].y - 5000) < 2,
      JSON.stringify([rq[0], rq[1]]));
    // grab the mid-top handle (now at world 5500,3500) and pull along
    // the ROTATED axis: pristine y scales 1.5 about the opposite edge
    tool15.onDown({ x: 5500, y: 3500 }, {});
    check("rotated handle picked up",
      tool15.drag && tool15.drag.kind === "scale",
      tool15.drag && tool15.drag.kind);
    tool15.onMove({ x: 6500, y: 3500 });
    tool15.onUp({ x: 6500, y: 3500 });
    rq = tool15.frameQuad();
    check("scale runs along the rotated frame axis",
      Math.abs(rq[0].x - 6500) < 2 && Math.abs(rq[0].y - 2000) < 2,
      JSON.stringify(rq[0]));
    check("rotated session reverts clean",
      tool15.revertPending() === true &&
      VB.integrityReport(doc15).length === 0 &&
      VB.geom.fillAt(doc15, 4500, 3500) === 1);
    tool15.onDown({ x: 10500, y: 7500 }, {});
    tool15.onUp({ x: 10500, y: 7500 });
    check("rotated session committed nothing", journal15.length === 1,
      journal15.length + " ops");
    // ONE-MOTION pick-up: pressing on a shape lifts it AND starts the
    // move in the same press (arrow-tool feel)
    tool15.onDown({ x: 4500, y: 3500 }, {});
    check("press on a shape lifts and arms a move in one motion",
      !!tool15.float && tool15.drag && tool15.drag.kind === "move" &&
      VB.geom.fillAt(doc15, 4500, 3500) === 0);
    tool15.onMove({ x: 4700, y: 3500 });
    tool15.onUp({ x: 4700, y: 3500 });
    check("one-motion drag accumulated", tool15.gestures.length === 1,
      tool15.gestures.length + " gestures");
    check("undo pops the gesture and un-lifts",
      tool15.undoPending() === true && tool15.float === null &&
      VB.geom.fillAt(doc15, 4500, 3500) === 1);
    // an untouched lift (picked, never transformed): Ctrl+Z puts it back
    tool15.onDown({ x: 4500, y: 3500 }, {});
    tool15.onUp({ x: 4500, y: 3500 });
    check("untouched lift stays floating",
      !!tool15.float && tool15.gestures.length === 0);
    check("undo puts an untouched lift back",
      tool15.undoPending() === true && tool15.float === null &&
      VB.geom.fillAt(doc15, 4500, 3500) === 1);
    tool15.onDown({ x: 10500, y: 7500 }, {});
    tool15.onUp({ x: 10500, y: 7500 });
    check("one-motion sessions committed nothing extra", journal15.length === 1,
      journal15.length + " ops");
    // BAND-IN-TRANSFORM: dragging on empty space while in transform
    // mode draws a fresh marquee; releasing adopts the region lifted
    tool15.onDown({ x: 2800, y: 2300 }, {}); // empty spot
    tool15.onMove({ x: 4700, y: 3700 });
    tool15.onUp({ x: 4700, y: 3700 });
    check("empty drag in transform mode selects a new region",
      !!tool15.items && !!tool15.items.region && !!tool15.float && !!tool15.box,
      JSON.stringify(tool15.items && tool15.items.region));
    check("band region lifted live", VB.geom.fillAt(doc15, 3500, 3000) === 0,
      "fillAt=" + VB.geom.fillAt(doc15, 3500, 3000));
    check("hasSession + hitsFrame see the live frame",
      tool15.hasSession() === true &&
      tool15.hitsFrame({ x: 3500, y: 3000 }) === true &&
      tool15.hitsFrame({ x: 10500, y: 7500 }) === false);
    check("undo puts the band region back",
      tool15.undoPending() === true && VB.geom.fillAt(doc15, 3500, 3000) === 1);
    tool15.onDown({ x: 10500, y: 7500 }, {});
    tool15.onUp({ x: 10500, y: 7500 });
    check("band sessions committed nothing", journal15.length === 1,
      journal15.length + " ops");
  })();

  // ========================= unit tests: TTF parser =========================
  // The mini fixture font exercises every DefineFont2 conversion rule
  // reverse-engineered from SWFExamples/Font001 (see NOTES.md there):
  // half-up rounding into the 1024 EM y-down space, implied quad
  // anchors from ROUNDED controls, collinear-quad collapse, composite
  // flattening, kerning.
  log("ttf parser:");
  (function () {
    var font = VB.parseTTF(window.VBTTFFixture.bytes());
    check("ttf header", font.unitsPerEm === 2048 && font.numGlyphs === 5 &&
      font.family === "VBTest" && font.ascent === 1638 && font.descent === -410,
      font.unitsPerEm + "/" + font.numGlyphs + "/" + font.family);
    check("ttf cmap", font.glyphIndex(65) === 1 && font.glyphIndex(68) === 4 &&
      font.glyphIndex(90) === 0,
      [font.glyphIndex(65), font.glyphIndex(68), font.glyphIndex(90)].join(","));
    check("ttf advances", font.advance(1) === 2048 && font.advance(2) === 1638 &&
      font.advance(4) === 1000);
    check("ttf kerning", font.kern(1, 2) === -164 && font.kern(2, 1) === 0,
      font.kern(1, 2) + "/" + font.kern(2, 1));
    function segsEq(got, want) {
      if (got.length !== want.length) return false;
      for (var i = 0; i < got.length; i++) {
        var g = got[i], w = want[i];
        if ((g.cx === undefined) !== (w.cx === undefined)) return false;
        if (g.x !== w.x || g.y !== w.y) return false;
        if (w.cx !== undefined && (g.cx !== w.cx || g.cy !== w.cy)) return false;
      }
      return true;
    }
    var a = font.emGlyph(1);
    check("ttf glyph A: half-up rounding into EM y-down",
      a.length === 1 && a[0].mx === 0 && a[0].my === 0 &&
      segsEq(a[0].segs, [{ x: 512, y: -682 }, { x: 1024, y: 0 }, { x: 0, y: 0 }]),
      JSON.stringify(a));
    var b = font.emGlyph(2);
    check("ttf glyph B: implied anchor from ROUNDED controls",
      b.length === 1 &&
      segsEq(b[0].segs, [{ cx: 205, cy: -409, x: 410, y: -409 },
                         { cx: 615, cy: -409, x: 819, y: 0 }, { x: 0, y: 0 }]),
      JSON.stringify(b));
    var c = font.emGlyph(3);
    check("ttf glyph C: composite offset flattened",
      c.length === 1 && c[0].mx === 51 && c[0].my === -25 &&
      segsEq(c[0].segs, [{ x: 562, y: -708 }, { x: 1074, y: -26 },
                         { x: 51, y: -25 }]),
      JSON.stringify(c));
    var d = font.emGlyph(4);
    check("ttf glyph D: collinear quad collapses to a line",
      d.length === 1 &&
      segsEq(d[0].segs, [{ x: 500, y: -500 }, { x: 0, y: 0 }]),
      JSON.stringify(d));
    check("ttf .notdef is empty", font.emGlyph(0).length === 0);
  })();

  // ==================== regression: SWF text import ====================
  // Font001/004 are MX2004 reference files (SWFExamples/Font001): text
  // used to be silently dropped on load — only broken-apart geometry
  // survived (the user's "scattered characters" bug).
  log("swf text import:");
  await (async function () {
    var res1 = await VB.parseSWF(window.VBFontSWF.bytes("Font001"));
    var doc1 = res1.doc;
    check("Font001: four fonts imported",
      doc1.fonts.length === 4 &&
      doc1.fonts[0].name === "Times New Roman" &&
      doc1.fonts[1].name === "Wingdings" &&
      doc1.fonts[3].name === "MS UI Gothic",
      doc1.fonts.map(function (f) { return f.name; }).join("/"));
    check("Font001: glyph subsets verbatim",
      doc1.fonts[0].glyphs.length === 15 && doc1.fonts[1].glyphs.length === 8 &&
      doc1.fonts[2].glyphs.length === 14 && doc1.fonts[3].glyphs.length === 13,
      doc1.fonts.map(function (f) { return f.glyphs.length; }).join(","));
    check("Font001: bold+italic flags survive",
      !doc1.fonts[0].bold && doc1.fonts[3].bold && doc1.fonts[3].italic);
    check("Font001: Times 'T' glyph outline",
      doc1.fonts[0].glyphs[1].code === 84 &&
      doc1.fonts[0].glyphs[1].contours.length === 1 &&
      doc1.fonts[0].glyphs[1].contours[0].mx === 593 &&
      doc1.fonts[0].glyphs[1].contours[0].my === -678 &&
      doc1.fonts[0].glyphs[1].contours[0].segs.length === 24,
      JSON.stringify(doc1.fonts[0].glyphs[1].contours[0]).slice(0, 90));
    check("Font001: four text blocks placed",
      doc1.texts.length === 4 && res1.info.textsPlaced === 4,
      doc1.texts.length + " blocks");
    var t0 = doc1.texts[0];
    check("Font001: first block record (12pt Times, black, 24 glyphs)",
      t0.records.length === 1 && t0.records[0].font === 0 &&
      t0.records[0].height === 240 && t0.records[0].color.a === 255 &&
      t0.records[0].glyphs.length === 24 &&
      t0.matrix[4] === 420 && t0.matrix[5] === 265,
      JSON.stringify({ m: t0.matrix, rec0: t0.records[0].glyphs.length }));
    var t3 = doc1.texts[3];
    check("Font001: transformed block keeps its scale matrix",
      Math.abs(t3.matrix[0] - 2.00653) < 0.001 && t3.matrix[3] === 1 &&
      t3.records.length === 4,
      JSON.stringify(t3.matrix));
    check("Font001: multi-line block has per-line offsets",
      doc1.texts[2].records.length === 3 &&
      doc1.texts[2].records[1].y > doc1.texts[2].records[0].y);

    // rendering: the first block ("Welcome To...") must put ink on the
    // canvas along its baseline — this is the visible half of the bug
    var cv = document.createElement("canvas");
    cv.width = 550; cv.height = 400;
    VB.render(cv.getContext("2d"), doc1, { zoom: 1, panX: 0, panY: 0 });
    var row = cv.getContext("2d").getImageData(20, 18, 160, 8).data;
    var dark = 0;
    for (var px = 0; px < row.length; px += 4) {
      if (row[px] < 128 && row[px + 3] > 128) dark++;
    }
    check("Font001: text renders ink on the stage", dark > 40, dark + " dark px");

    var res4 = await VB.parseSWF(window.VBFontSWF.bytes("Font004"));
    var doc4 = res4.doc;
    check("Font004: merged shape AND text coexist",
      doc4.edges.length > 200 && doc4.texts.length > 30,
      doc4.edges.length + " edges, " + doc4.texts.length + " texts");
    var alphaRec = null;
    doc4.texts.forEach(function (t) {
      t.records.forEach(function (rec) { if (rec.color.a === 128) alphaRec = rec; });
    });
    check("Font004: DefineText2 alpha color imported", !!alphaRec &&
      alphaRec.color.r === 200 || alphaRec.color.r === 240,
      alphaRec && JSON.stringify(alphaRec.color));

    // vbd v2 round-trip: fonts + texts survive save/load losslessly
    var bytes = await VB.encodeY2KVector(doc1, { compress: true });
    var back = await VB.decodeY2KVector(bytes);
    check("vbd v2 round-trips text losslessly",
      back.info.version === 2 &&
      JSON.stringify(back.doc.fonts) === JSON.stringify(doc1.fonts) &&
      JSON.stringify(back.doc.texts) === JSON.stringify(doc1.texts),
      "v" + back.info.version + " fonts=" + back.doc.fonts.length +
      " texts=" + back.doc.texts.length);
    // a doc without text still writes v1
    var plain = new VB.Y2KVectorDocument();
    plain.width = 11000; plain.height = 8000;
    var v1 = await VB.decodeY2KVector(await VB.encodeY2KVector(plain, { compress: false }));
    check("textless vbd stays v1", v1.info.version === 1);

    // magic: new files open with "Y2KV"; the legacy "VBD1" magic (files
    // saved before the y2kvector rename share the byte-identical body
    // layout) must decode forever
    check("y2kvector writes Y2KV magic",
      bytes[0] === 0x59 && bytes[1] === 0x32 && bytes[2] === 0x4B && bytes[3] === 0x56,
      String.fromCharCode(bytes[0], bytes[1], bytes[2], bytes[3]));
    var legacy = new Uint8Array(bytes);
    legacy[0] = 0x56; legacy[1] = 0x42; legacy[2] = 0x44; legacy[3] = 0x31; // "VBD1"
    check("legacy VBD1 magic still recognized", VB.isY2KVector(legacy));
    var legacyBack = await VB.decodeY2KVector(legacy);
    check("legacy VBD1 file decodes identically",
      JSON.stringify(legacyBack.doc.edges) === JSON.stringify(back.doc.edges) &&
      JSON.stringify(legacyBack.doc.fonts) === JSON.stringify(back.doc.fonts),
      legacyBack.doc.edges.length + " vs " + back.doc.edges.length + " edges");

    // history: undo/redo must not destroy text
    var hist = new VB.History();
    hist.push(doc1);
    var savedTexts = doc1.texts.length;
    doc1.texts = [];
    hist.undo(doc1);
    check("history restores text blocks", doc1.texts.length === savedTexts,
      doc1.texts.length + " texts");
  })();

  // ================== unit tests: project DOM (scenes/layers) ==================
  // The Flash-style containment chain (docs/JSFL.pdf): Project -> scenes
  // -> layers -> frame cells. Geometry ops target the ACTIVE layer's
  // planar map; layer/scene switches are journal ops.
  log("project DOM (scenes/layers):");
  await (async function () {
    var red = { r: 204, g: 102, b: 102, a: 255 };
    var blue = { r: 102, g: 204, b: 255, a: 255 };
    var base = [
      { op: "new", width: 11000, height: 8000 },
      { op: "rect", x0: 2000, y0: 2000, x1: 5000, y1: 4000, fill: red, line: null },
      { op: "layerAdd" }, // inserts ABOVE the active layer and selects it
      { op: "rect", x0: 3000, y0: 2500, x1: 6000, y1: 4500, fill: blue, line: null }
    ];
    var res = await VB.replayJournal(base);
    var layers = res.project.scene().layers;
    check("layers isolate their planar maps",
      layers.length === 2 &&
      VB.geom.fillAt(layers[1].frames[0], 2200, 2200) === 1 && // red below
      VB.geom.fillAt(layers[0].frames[0], 2200, 2200) === 0 && // top empty there
      VB.geom.fillAt(layers[0].frames[0], 5500, 4200) === 1,   // blue above
      layers.map(function (l) { return l.frames[0].edges.length; }).join(","));
    check("active cell is the new top layer",
      res.doc === layers[0].frames[0]);

    // render stacking: overlap shows the TOP layer's blue; uncovered
    // area shows the bottom red; hiding the bottom layer removes it
    var cv = document.createElement("canvas");
    cv.width = 550; cv.height = 400;
    VB.renderProject(cv.getContext("2d"), res.project, { zoom: 1, panX: 0, panY: 0 });
    var pOver = cv.getContext("2d").getImageData(200, 150, 1, 1).data;  // (4000,3000)tw
    var pRed = cv.getContext("2d").getImageData(110, 110, 1, 1).data;   // (2200,2200)tw
    check("top layer renders over bottom",
      pOver[2] > 200 && pOver[0] < 150, Array.from(pOver).join(","));
    check("bottom layer shows where uncovered",
      pRed[0] > 180 && pRed[2] < 150, Array.from(pRed).join(","));
    var resHidden = await VB.replayJournal(
      base.concat([{ op: "layerVisible", index: 1, on: false }]));
    VB.renderProject(cv.getContext("2d"), resHidden.project, { zoom: 1, panX: 0, panY: 0 });
    var pHid = cv.getContext("2d").getImageData(110, 110, 1, 1).data;
    check("hidden layer does not render",
      pHid[0] > 230 && pHid[1] > 230 && pHid[2] > 230, Array.from(pHid).join(","));

    // undo unwinds structure: two undos = before blue rect, before layerAdd
    var resUndo = await VB.replayJournal(
      base.concat([{ op: "undo" }, { op: "undo" }]));
    check("undo unwinds layer structure",
      resUndo.project.scene().layers.length === 1 &&
      VB.geom.fillAt(resUndo.doc, 2200, 2200) === 1,
      resUndo.project.scene().layers.length + " layers");

    // vbd: multi-layer forces v3 and round-trips; single default stays v1
    var bytes3 = await VB.encodeY2KVector(res.project, { compress: true });
    var back3 = await VB.decodeY2KVector(bytes3);
    check("vbd project body round-trips the layer DOM",
      back3.info.version === 4 && // v4 = v3 + the global material library
      back3.project.scene().layers.length === 2 &&
      back3.project.scene().layers[0].frames[0].edges.length ===
        layers[0].frames[0].edges.length &&
      back3.project.scene().layers[1].frames[0].edges.length ===
        layers[1].frames[0].edges.length &&
      VB.geom.fillAt(back3.project.scene().layers[1].frames[0], 2200, 2200) === 1,
      "v" + back3.info.version);
    var resSingle = await VB.replayJournal(base.slice(0, 2));
    var bytes1 = await VB.encodeY2KVector(resSingle.project, { compress: false });
    check("single default layer still saves as v1/v2",
      (await VB.decodeY2KVector(bytes1)).info.version <= 2);

    // SWF export: one DefineShape per layer, bottom to top
    var swf = VB.encodeSWF(res.project);
    var imp = await VB.parseSWF(swf.buffer);
    check("layered SWF export defines a shape per layer",
      imp.info.shapesDefined === 2 && imp.info.shapesPlaced === 2,
      JSON.stringify(imp.info));

    // scenes hold independent drawings
    var res5 = await VB.replayJournal([
      { op: "new", width: 11000, height: 8000 },
      { op: "rect", x0: 2000, y0: 2000, x1: 5000, y1: 4000, fill: red, line: null },
      { op: "sceneAdd" },
      { op: "rect", x0: 6000, y0: 5000, x1: 9000, y1: 7000, fill: blue, line: null },
      { op: "sceneSelect", index: 0 }
    ]);
    check("scenes hold independent drawings",
      res5.project.scenes.length === 2 &&
      res5.project.cur.scene === 0 &&
      VB.geom.fillAt(res5.doc, 2200, 2200) === 1 &&
      VB.geom.fillAt(res5.project.scenes[1].layers[0].frames[0], 6500, 5500) === 1 &&
      VB.geom.fillAt(res5.project.scenes[1].layers[0].frames[0], 2200, 2200) === 0);

    // layer delete / move replay deterministically
    var res6 = await VB.replayJournal(base.concat([
      { op: "layerMove", from: 0, to: 1 },   // blue layer to the bottom
      { op: "layerDelete", index: 0 }        // delete red (now on top)
    ]));
    check("layer move + delete replay",
      res6.project.scene().layers.length === 1 &&
      VB.geom.fillAt(res6.doc, 5500, 4200) === 1 && // blue survives
      VB.geom.fillAt(res6.doc, 2100, 2100) === 0,
      res6.project.scene().layers.length + " layers");
  })();

  // ======================= unit tests: text authoring ======================
  // buildTextOp lays a string out with a parsed TTF into a SELF-CONTAINED
  // journal op (font subset + advances baked at authoring time, like
  // MX2004); textApplyOp merges it into the document.
  log("text authoring:");
  await (async function () {
    var red = { r: 204, g: 102, b: 102, a: 255 };
    var ttf = VB.parseTTF(window.VBTTFFixture.bytes());
    // fixture: upm 2048, A adv 2048, B adv 1638, D adv 1000,
    // kern(A,B) = -164, hhea ascent 1638 / descent -410 (no OS/2)
    var op = VB.buildTextOp(ttf, { name: "VBTest", bold: false, italic: false },
                            "AB\nD", 400, red, 1000, 2000);
    check("op font subset in first-use order",
      op.font.name === "VBTest" && op.font.glyphs.length === 3 &&
      op.font.glyphs[0].code === 65 && op.font.glyphs[1].code === 66 &&
      op.font.glyphs[2].code === 68,
      op.font.glyphs.map(function (g) { return g.code; }).join(","));
    check("op bakes kerned advances in twips",
      op.records.length === 2 &&
      op.records[0].glyphs[0].adv === 368 && // (2048-164) * 400/2048
      op.records[0].glyphs[1].adv === 320 && // 1638 * 400/2048
      op.records[1].glyphs[0].adv === 195,   // 1000 * 400/2048
      JSON.stringify(op.records.map(function (r) {
        return r.glyphs.map(function (g) { return g.adv; });
      })));
    check("op lines sit on win-metric baselines",
      op.records[0].y === 320 && op.records[1].y === 720 && // pitch 400
      op.matrix[4] === 1000 && op.matrix[5] === 2000,
      op.records[0].y + "/" + op.records[1].y);

    var doc = new VB.Y2KVectorDocument();
    VB.textApplyOp(doc, op);
    check("textApplyOp installs font + block",
      doc.fonts.length === 1 && doc.fonts[0].glyphs.length === 3 &&
      doc.texts.length === 1 && doc.texts[0].records[0].font === 0);
    // a second block reuses the font, extends the subset, remaps gi
    var op2 = VB.buildTextOp(ttf, { name: "VBTest", bold: false, italic: false },
                             "CB", 400, red, 3000, 4000);
    VB.textApplyOp(doc, op2);
    check("second block merges into the same font",
      doc.fonts.length === 1 && doc.fonts[0].glyphs.length === 4 &&
      doc.fonts[0].glyphs[3].code === 67 &&
      doc.texts[1].records[0].glyphs[0].gi === 3 && // C appended
      doc.texts[1].records[0].glyphs[1].gi === 1,   // B reused
      JSON.stringify(doc.texts[1].records[0].glyphs));

    // journal replay is deterministic and self-contained
    var ops = [{ op: "new", width: 11000, height: 8000 }, op];
    var ra = await VB.replayJournal(ops);
    var rb = await VB.replayJournal(ops);
    check("textCreate replays deterministically",
      JSON.stringify(ra.doc.texts) === JSON.stringify(rb.doc.texts) &&
      ra.doc.texts.length === 1 && ra.doc.fonts.length === 1);

    // rendering: glyph A's triangle puts ink where expected
    var cv = document.createElement("canvas");
    cv.width = 550; cv.height = 400;
    VB.render(cv.getContext("2d"), ra.doc, { zoom: 1, panX: 0, panY: 0 });
    // block at (1000,2000), baseline +320; A spans 400tw wide, 266 up
    var probe = cv.getContext("2d").getImageData(60, 111, 1, 1).data;
    check("authored text renders ink", probe[0] > 180 && probe[2] < 150,
      Array.from(probe).join(","));

    // vbd round-trip of authored text (v2 path via bare doc)
    var back = await VB.decodeY2KVector(await VB.encodeY2KVector(ra.doc, { compress: true }));
    check("authored text survives vbd",
      JSON.stringify(back.doc.texts) === JSON.stringify(ra.doc.texts) &&
      JSON.stringify(back.doc.fonts) === JSON.stringify(ra.doc.fonts));

    // ---- text as an OBJECT: hit, move, transform, edit, delete ----
    var hdoc = new VB.Y2KVectorDocument();
    VB.textApplyOp(hdoc, VB.buildTextOp(ttf, { name: "VBTest" }, "AB", 400, red, 1000, 2000));
    // block-local bounds: A triangle spans y -682..0, x 0..1024 EM at
    // scale 400/1024 -> local x 0..~688 (A 400 wide + B), y -266..0
    // block-local: baseline y=320, height fallback tops out at -80;
    // B's widest contour lands at 368 (kerned pen) + 819*400/1024 = 688
    var hb = VB.textBlockBounds(hdoc, hdoc.texts[0]);
    check("text bounds hug the outlines",
      hb && hb.x0 === 0 && hb.y0 === -80 && hb.x1 === 688 && hb.y1 === 320,
      JSON.stringify(hb));
    check("textHit maps through the matrix",
      VB.textHit(hdoc, 1200, 2200) === 0 &&   // inside (baseline y=2320)
      VB.textHit(hdoc, 5000, 5000) === -1);
    // move
    VB.textTransformApply(hdoc, 0, [1, 0, 0, 1, 500, -300]);
    check("textTransform composes translation",
      hdoc.texts[0].matrix[4] === 1500 && hdoc.texts[0].matrix[5] === 1700 &&
      VB.textHit(hdoc, 1700, 1900) === 0);
    // rotate 90° about the block origin: text stays text
    VB.textTransformApply(hdoc, 0, [0, 1, -1, 0,
      1500 + 1700, 1700 - 1500]);
    check("textTransform composes rotation",
      Math.abs(hdoc.texts[0].matrix[0]) < 1e-9 && hdoc.texts[0].matrix[1] === 1,
      JSON.stringify(hdoc.texts[0].matrix));
    // edit: replace content, keep the (rotated) matrix
    var edit = VB.buildTextOp(ttf, { name: "VBTest" }, "D", 400, red, 0, 0);
    var mBefore = hdoc.texts[0].matrix.slice();
    VB.textEditApply(hdoc, { index: 0, font: edit.font, records: edit.records });
    check("textEdit swaps records, keeps placement",
      JSON.stringify(hdoc.texts[0].matrix) === JSON.stringify(mBefore) &&
      hdoc.texts[0].records.length === 1 &&
      hdoc.fonts[0].glyphs[hdoc.texts[0].records[0].glyphs[0].gi].code === 68);
    VB.textDeleteApply(hdoc, 0);
    check("textDelete removes the block", hdoc.texts.length === 0);

    // replay determinism of the object ops
    var objOps = [
      { op: "new", width: 11000, height: 8000 },
      VB.buildTextOp(ttf, { name: "VBTest" }, "AB", 400, red, 1000, 2000),
      { op: "textTransform", index: 0, m: [0, 1, -1, 0, 3200, 200] },
      VB.buildTextOp(ttf, { name: "VBTest" }, "D", 400, red, 4000, 4000),
      { op: "textDelete", index: 1 },
      { op: "undo" }
    ];
    var oa = await VB.replayJournal(objOps);
    var ob = await VB.replayJournal(objOps);
    check("text object ops replay deterministically",
      JSON.stringify(oa.doc.texts) === JSON.stringify(ob.doc.texts) &&
      oa.doc.texts.length === 2,
      oa.doc.texts.length + " blocks");

    // transform-tool session on a text block: rotate via the knob,
    // commit ONE textTransform op, text stays text
    var tdoc = new VB.Y2KVectorDocument();
    tdoc.width = 11000; tdoc.height = 8000;
    VB.textApplyOp(tdoc, VB.buildTextOp(ttf, { name: "VBTest" }, "AB", 400, red, 3000, 3000));
    var journalT = [], toolT;
    var appT = {
      doc: tdoc,
      view: { zoom: 1 },
      record: function (op) { journalT.push(op); },
      history: new VB.History(),
      docChanged: function () { toolT.discard(); },
      requestRender: function () {},
      setMsg: function () {},
      setCursor: function () {}
    };
    toolT = VB.FreeTransformTool(appT);
    toolT.adopt({ textIndex: 0 });
    check("transform adopts a text block (lifted, frame up)",
      !!toolT.box && !!toolT.float && toolT.float.textBlock &&
      tdoc.texts.length === 0);
    var fq = toolT.frameQuad();
    check("text frame sits at the block's placement",
      fq && Math.abs(fq[0].x - 3000) < 40 && fq[0].y < 3000,
      JSON.stringify(fq && fq[0]));
    // rotate ~90° from just outside a frame corner
    var c0x = (toolT.box.x0 + toolT.box.x1) / 2 + 3000;
    var c0y = (toolT.box.y0 + toolT.box.y1) / 2 + 3000;
    toolT.onDown({ x: fq[0].x - 200, y: fq[0].y - 200 }, {});
    check("text frame arms rotation near corners",
      toolT.drag && toolT.drag.kind === "rotate",
      toolT.drag && toolT.drag.kind);
    // drag to the point rotated 90° about the frame center
    var dx0 = (fq[0].x - 200) - c0x, dy0 = (fq[0].y - 200) - c0y;
    toolT.onMove({ x: c0x - dy0, y: c0y + dx0 });
    toolT.onUp({ x: c0x - dy0, y: c0y + dx0 });
    toolT.onDown({ x: 10500, y: 7500 }, {}); // click away commits
    toolT.onUp({ x: 10500, y: 7500 });
    check("text transform session commits ONE textTransform op",
      journalT.length === 1 && journalT[0].op === "textTransform" &&
      journalT[0].index === 0, JSON.stringify(journalT.map(function (o) { return o.op; })));
    check("text stays text after rotation",
      tdoc.texts.length === 1 && tdoc.edges.length === 0 &&
      Math.abs(Math.abs(tdoc.texts[0].matrix[1]) - 1) < 0.02,
      JSON.stringify(tdoc.texts[0] && tdoc.texts[0].matrix));

    // ---- rotation field math: snap a rotated block back upright ----
    var rdoc = new VB.Y2KVectorDocument();
    VB.textApplyOp(rdoc, VB.buildTextOp(ttf, { name: "VBTest" }, "A", 400, red, 2000, 2000));
    var a30 = 30 * Math.PI / 180;
    VB.textTransformApply(rdoc, 0, [Math.cos(a30), Math.sin(a30),
      -Math.sin(a30), Math.cos(a30), 0, 0]);
    var ang = Math.atan2(rdoc.texts[0].matrix[1], rdoc.texts[0].matrix[0]) * 180 / Math.PI;
    check("matrix angle reads back", Math.abs(ang - 30) < 0.01, ang);
    // snap upright: rotate by -current about the mapped center
    var blk9 = rdoc.texts[0];
    var bb9 = VB.textBlockBounds(rdoc, blk9);
    var lx9 = (bb9.x0 + bb9.x1) / 2, ly9 = (bb9.y0 + bb9.y1) / 2;
    var c9 = { x: blk9.matrix[0] * lx9 + blk9.matrix[2] * ly9 + blk9.matrix[4],
               y: blk9.matrix[1] * lx9 + blk9.matrix[3] * ly9 + blk9.matrix[5] };
    var an = -Math.atan2(blk9.matrix[1], blk9.matrix[0]);
    VB.textTransformApply(rdoc, 0, [Math.cos(an), Math.sin(an), -Math.sin(an),
      Math.cos(an), c9.x - Math.cos(an) * c9.x + Math.sin(an) * c9.y,
      c9.y - Math.sin(an) * c9.x - Math.cos(an) * c9.y]);
    check("snap-to-upright zeroes the angle",
      Math.abs(rdoc.texts[0].matrix[1]) < 1e-9 &&
      Math.abs(rdoc.texts[0].matrix[0] - 1) < 1e-9,
      JSON.stringify(rdoc.texts[0].matrix));

    // ---- transform rotateTo (the toolbar field on a session) ----
    var t2doc = new VB.Y2KVectorDocument();
    t2doc.width = 11000; t2doc.height = 8000;
    VB.textApplyOp(t2doc, VB.buildTextOp(ttf, { name: "VBTest" }, "A", 400, red, 3000, 3000));
    var journal2 = [], tool2;
    var app2 = {
      doc: t2doc, view: { zoom: 1 },
      record: function (op) { journal2.push(op); },
      history: new VB.History(),
      docChanged: function () { tool2.discard(); },
      requestRender: function () {}, setMsg: function () {}, setCursor: function () {}
    };
    tool2 = VB.FreeTransformTool(app2);
    tool2.adopt({ textIndex: 0 });
    tool2.rotateTo(45);
    var sm = tool2.sessionMatrix();
    check("rotateTo sets the session angle",
      Math.abs(Math.atan2(sm[1], sm[0]) * 180 / Math.PI - 45) < 0.01);
    tool2.rotateTo(0); // snap back upright before committing
    tool2.onDown({ x: 10500, y: 7500 }, {});
    tool2.onUp({ x: 10500, y: 7500 });
    check("rotateTo(0) snaps upright and commits nothing extra",
      Math.abs(t2doc.texts[0].matrix[1]) < 1e-6 &&
      (journal2.length === 0 ||
       (journal2.length === 1 && journal2[0].op === "textTransform")),
      JSON.stringify({ ops: journal2.length, m: t2doc.texts[0].matrix }));

    // ---- textBreak: glyph outlines land in the planar map ----
    var bdoc = new VB.Y2KVectorDocument();
    bdoc.width = 11000; bdoc.height = 8000;
    VB.textApplyOp(bdoc, VB.buildTextOp(ttf, { name: "VBTest" }, "A", 400, red, 2000, 3000));
    // rotate it first: break-apart must honor the matrix
    VB.textTransformApply(bdoc, 0, [0, 1, -1, 0, 2000 + 3000, 3000 - 2000]);
    VB.textBreakApply(bdoc, 0);
    // A's triangle centroid, block-local ~(512,148)EM -> local (200,262)
    // above baseline 320-266.. -> local (200, 216); rotated 90° about
    // (2000,3000): local point (2200, 3216) -> (1784, 3200)
    check("textBreak converts glyphs to fills",
      bdoc.texts.length === 0 && bdoc.edges.length >= 3 &&
      VB.geom.fillAt(bdoc, 1784, 3200) === 1,
      bdoc.edges.length + " edges, fillAt=" + VB.geom.fillAt(bdoc, 1784, 3200));
    check("textBreak result is consistent",
      VB.integrityReport(bdoc).length === 0, VB.integrityReport(bdoc)[0]);

    // broken text merges like ink: replay determinism incl. undo
    var bops = [
      { op: "new", width: 11000, height: 8000 },
      VB.buildTextOp(ttf, { name: "VBTest" }, "A", 400, red, 2000, 3000),
      { op: "textBreak", index: 0 },
      { op: "undo" },
      { op: "redo" }
    ];
    var b1 = await VB.replayJournal(bops);
    var b2 = await VB.replayJournal(bops);
    check("textBreak replays deterministically",
      JSON.stringify(b1.doc.edges) === JSON.stringify(b2.doc.edges) &&
      b1.doc.texts.length === 0 && b1.doc.edges.length >= 3);

    // ---- text box WRAP: tabs extend the box, glyphs never scale ----
    // fixture advances at 400tw: A=400(-32 kerned to B=368), B=320,
    // space(gi0)=400, D=195
    var wop = VB.buildTextOp(ttf, { name: "VBTest" }, "AB AB", 400, red,
                             0, 0, 900);
    check("wrap layout breaks at spaces within the width",
      wop.records.length === 2 &&
      !wop.records[0].soft && wop.records[1].soft === true &&
      wop.records[0].str === "AB " && wop.records[1].str === "AB" &&
      wop.records[1].y === wop.records[0].y + wop.pitch &&
      wop.wrapWidth === 900,
      JSON.stringify(wop.records.map(function (r) { return r.str; })));
    var wdoc = new VB.Y2KVectorDocument();
    VB.textApplyOp(wdoc, wop);
    check("wrap metadata lands on the block",
      wdoc.texts[0].wrapWidth === 900 && wdoc.texts[0].pitch === wop.pitch &&
      wdoc.texts[0].records[1].soft === true);
    // records-only reflow: WIDEN and the soft line rejoins its paragraph
    VB.textWrapApply(wdoc, 0, 4000);
    check("widening re-joins soft-wrapped lines",
      wdoc.texts[0].records.length === 1 &&
      wdoc.texts[0].records[0].glyphs.length === 5 &&
      wdoc.texts[0].wrapWidth === 4000,
      wdoc.texts[0].records.length + " records");
    // NARROW again — same break as authoring, no font file involved
    VB.textWrapApply(wdoc, 0, 900);
    check("narrowing re-wraps from baked advances",
      wdoc.texts[0].records.length === 2 &&
      wdoc.texts[0].records[1].soft === true &&
      wdoc.texts[0].records[1].y === wdoc.texts[0].records[0].y + wop.pitch,
      wdoc.texts[0].records.length + " records");
    // vbd carries wrap metadata + soft flags
    var wback = await VB.decodeY2KVector(await VB.encodeY2KVector(wdoc, { compress: true }));
    check("vbd round-trips wrap metadata",
      JSON.stringify(wback.doc.texts) === JSON.stringify(wdoc.texts),
      "got " + JSON.stringify(wback.doc.texts).slice(0, 260) + " want " +
      JSON.stringify(wdoc.texts).slice(0, 260));

    // ---- arrow-selection box tabs: wrap, don't scale ----
    var adoc = new VB.Y2KVectorDocument();
    adoc.width = 11000; adoc.height = 8000;
    VB.textApplyOp(adoc, VB.buildTextOp(ttf, { name: "VBTest" }, "AB AB", 400, red, 2000, 3000));
    var journalA = [], toolA;
    var appA = {
      doc: adoc, view: { zoom: 1 },
      record: function (op) { journalA.push(op); },
      history: new VB.History(),
      docChanged: function () {},
      requestRender: function () {}, setMsg: function () {}, setCursor: function () {},
      onEdgeSelected: function () {}
    };
    toolA = VB.ArrowTool(appA);
    // select with a click (press + release without movement)
    toolA.onDown({ x: 2300, y: 3100 }, {});
    toolA.onUp({ x: 2300, y: 3100 });
    check("arrow click selects the block", toolA.sel.text === 0);
    // single line "AB AB": bounds x1 = 368+320+400+368+320 = 1776 —
    // grab the RIGHT box tab and drag it to local width 900: the text
    // must RE-WRAP to two lines; the matrix must NOT change
    var bbA = VB.textBlockBounds(adoc, adoc.texts[0]);
    var midYA = (bbA.y0 + bbA.y1) / 2;
    toolA.onDown({ x: 2000 + bbA.x1, y: 3000 + midYA }, {});
    check("box tab arms a wrap drag", toolA.drag && toolA.drag.kind === "wrapText",
      toolA.drag && toolA.drag.kind);
    toolA.onMove({ x: 2900, y: 3000 + midYA });
    toolA.onUp({ x: 2900, y: 3000 + midYA });
    check("tab drag commits ONE textWrap",
      journalA.length === 1 && journalA[0].op === "textWrap" &&
      journalA[0].width === 900,
      JSON.stringify(journalA));
    check("box resize re-wrapped without scaling",
      adoc.texts[0].records.length === 2 &&
      adoc.texts[0].records[1].soft === true &&
      JSON.stringify(adoc.texts[0].matrix) === JSON.stringify([1, 0, 0, 1, 2000, 3000]) &&
      toolA.sel.text === 0,
      JSON.stringify({ recs: adoc.texts[0].records.length, m: adoc.texts[0].matrix }));
    // string reconstruction joins soft lines with no injected newline
    var fontA = adoc.fonts[adoc.texts[0].records[0].font];
    var strA = "";
    adoc.texts[0].records.forEach(function (rec, ri) {
      if (ri > 0 && !rec.soft) strA += "\n";
      strA += rec.glyphs.map(function (g) {
        return String.fromCharCode(fontA.glyphs[g.gi].code);
      }).join("");
    });
    check("soft lines reconstruct the original string", strA === "AB AB", strA);
    // ---- alignment + letter spacing layout ----
    var alOp = VB.buildTextOp(ttf, { name: "VBTest" }, "AB\nA", 400, red,
                              0, 0, null, 1, 40); // centered, +40tw tracking
    check("letter spacing bakes into advances",
      alOp.records[0].glyphs[0].adv === 408 && // 368 + 40
      alOp.spacing === 40 && alOp.align === 1,
      JSON.stringify(alOp.records[0].glyphs));
    // box = widest line (AB = 408+360=768); line2 A=440 -> centered x=164
    check("center alignment offsets short lines",
      alOp.records[0].x === 0 && alOp.records[1].x === 164,
      alOp.records[0].x + "/" + alOp.records[1].x);
    var alDoc = new VB.Y2KVectorDocument();
    VB.textApplyOp(alDoc, alOp);
    check("align/spacing persist on the block",
      alDoc.texts[0].align === 1 && alDoc.texts[0].spacing === 40);

    // ---- textSize: records-only point size change ----
    VB.textSizeApply(alDoc, 0, 800, 0); // double it
    check("textSize doubles advances and offsets",
      alDoc.texts[0].records[0].height === 800 &&
      alDoc.texts[0].records[0].glyphs[0].adv === 816 &&
      alDoc.texts[0].records[1].x === 328 &&
      alDoc.texts[0].spacing === 80,
      JSON.stringify(alDoc.texts[0].records[0]));

    // ---- arrow vertical tab = BOX HEIGHT (container only) ----
    var vDoc = new VB.Y2KVectorDocument();
    vDoc.width = 11000; vDoc.height = 8000;
    VB.textApplyOp(vDoc, VB.buildTextOp(ttf, { name: "VBTest" }, "AB", 400, red, 2000, 3000));
    var journalV = [], toolV;
    var appV = {
      doc: vDoc, view: { zoom: 1 },
      record: function (op) { journalV.push(op); },
      history: new VB.History(), docChanged: function () {},
      requestRender: function () {}, setMsg: function () {},
      setCursor: function () {}, onEdgeSelected: function () {}
    };
    toolV = VB.ArrowTool(appV);
    toolV.onDown({ x: 2300, y: 3100 }, {});
    toolV.onUp({ x: 2300, y: 3100 });
    var bbV = VB.textBoxBounds(vDoc, vDoc.texts[0]); // y -80..320
    var midXV = (bbV.x0 + bbV.x1) / 2;
    toolV.onDown({ x: 2000 + midXV, y: 3000 + bbV.y1 }, {}); // bottom tab
    check("vertical tab arms a box-height drag",
      toolV.drag && toolV.drag.kind === "boxText",
      toolV.drag && toolV.drag.kind);
    // drag down: the ENTRY AREA doubles, the glyphs don't
    toolV.onMove({ x: 2000 + midXV, y: 3000 + bbV.y0 + 800 });
    toolV.onUp({ x: 2000 + midXV, y: 3000 + bbV.y0 + 800 });
    check("vertical tab drag commits ONE textBoxH op",
      journalV.length === 1 && journalV[0].op === "textBoxH" &&
      journalV[0].height === 800,
      JSON.stringify(journalV));
    var recV = vDoc.texts[0].records[0];
    check("box height grows the container, never the glyphs",
      vDoc.texts[0].boxHeight === 800 &&
      recV.height === 400 && recV.glyphs[0].adv === 368 &&
      JSON.stringify(vDoc.texts[0].matrix) === JSON.stringify([1, 0, 0, 1, 2000, 3000]),
      JSON.stringify({ boxH: vDoc.texts[0].boxHeight, h: recV.height }));
    var bbV2 = VB.textBoxBounds(vDoc, vDoc.texts[0]);
    check("frame bounds show the grown box",
      bbV2.y1 === bbV2.y0 + 800, JSON.stringify(bbV2));
    check("the grown box is grabbable",
      VB.textHit(vDoc, 2300, 3000 + 600) === 0);
    // vbd carries the box height (section format 4)
    var vBack = await VB.decodeY2KVector(await VB.encodeY2KVector(vDoc, { compress: true }));
    check("vbd round-trips box height",
      JSON.stringify(vBack.doc.texts) === JSON.stringify(vDoc.texts));

    // ---- transform text session: mid tabs are BOX TABS now ----
    var toolT2 = VB.FreeTransformTool(appA);
    toolT2.adopt({ textIndex: 0 });
    var bbT = toolT2.box;
    // grab the RIGHT mid tab and pull to local width 900 -> re-wrap
    toolT2.onDown({ x: 2000 + bbT.x1, y: 3000 + (bbT.y0 + bbT.y1) / 2 }, {});
    check("transform mid tab arms a box drag",
      toolT2.drag && toolT2.drag.kind === "boxtab",
      toolT2.drag && toolT2.drag.kind);
    toolT2.onMove({ x: 2900, y: 3000 + (bbT.y0 + bbT.y1) / 2 });
    // the frame must follow the reflowing block LIVE, before release:
    // pre-drag right edge was 2000+1776; wrapped line 1 = "AB " =
    // 368+320+400 = 1088 local (trailing wrap space included)
    var fqLive = toolT2.frameQuad();
    check("transform frame resizes in realtime during a tab drag",
      Math.abs(fqLive[1].x - 3088) < 4, JSON.stringify(fqLive[1]));
    toolT2.onUp({ x: 2900, y: 3000 + (bbT.y0 + bbT.y1) / 2 });
    // and the BOTTOM tab grows the box height in the same session
    var bbT2 = toolT2.box;
    toolT2.onDown({ x: 2000 + (bbT2.x0 + bbT2.x1) / 2, y: 3000 + bbT2.y1 }, {});
    check("transform bottom tab arms a box drag",
      toolT2.drag && toolT2.drag.kind === "boxtab",
      toolT2.drag && toolT2.drag.kind);
    toolT2.onMove({ x: 2000 + (bbT2.x0 + bbT2.x1) / 2, y: 3000 + bbT2.y0 + 2000 });
    toolT2.onUp({ x: 2000 + (bbT2.x0 + bbT2.x1) / 2, y: 3000 + bbT2.y0 + 2000 });
    var beforeOps = journalA.length;
    toolT2.onDown({ x: 10500, y: 7500 }, {}); // click away commits
    toolT2.onUp({ x: 10500, y: 7500 });
    check("transform box tabs commit textWrap + textBoxH ops",
      journalA.length === beforeOps + 2 &&
      journalA[beforeOps].op === "textWrap" &&
      journalA[beforeOps].width === 900 &&
      journalA[beforeOps + 1].op === "textBoxH" &&
      journalA[beforeOps + 1].height === 2000 &&
      adoc.texts[0].records.length === 2 &&
      adoc.texts[0].boxHeight === 2000 &&
      adoc.texts[0].records[0].height === 400, // glyphs untouched
      JSON.stringify(journalA.slice(beforeOps)));

    // ---- corner handles DRAG on a rotated text frame (user report) ----
    var rotDoc = new VB.Y2KVectorDocument();
    rotDoc.width = 11000; rotDoc.height = 8000;
    VB.textApplyOp(rotDoc, VB.buildTextOp(ttf, { name: "VBTest" }, "AB", 400, red, 3000, 3000));
    VB.textTransformApply(rotDoc, 0, [Math.cos(0.5), Math.sin(0.5),
      -Math.sin(0.5), Math.cos(0.5), 1500, -800]); // ~28.6°
    var journalR = [], toolR;
    var appR = {
      doc: rotDoc, view: { zoom: 1 },
      record: function (op) { journalR.push(op); },
      history: new VB.History(),
      docChanged: function () { toolR.discard(); },
      requestRender: function () {}, setMsg: function () {}, setCursor: function () {}
    };
    toolR = VB.FreeTransformTool(appR);
    toolR.adopt({ textIndex: 0 });
    var fqR = toolR.frameQuad();
    toolR.onDown({ x: fqR[2].x, y: fqR[2].y }, {}); // bottom-right corner
    check("rotated frame corner is grabbable",
      toolR.drag && toolR.drag.kind === "scale",
      toolR.drag && toolR.drag.kind);
    // drag outward: scale up ~1.5x along both axes
    var cR = { x: (fqR[0].x + fqR[2].x) / 2, y: (fqR[0].y + fqR[2].y) / 2 };
    toolR.onMove({ x: cR.x + (fqR[2].x - cR.x) * 1.5, y: cR.y + (fqR[2].y - cR.y) * 1.5 });
    toolR.onUp({ x: cR.x + (fqR[2].x - cR.x) * 1.5, y: cR.y + (fqR[2].y - cR.y) * 1.5 });
    toolR.onDown({ x: 10500, y: 7500 }, {});
    toolR.onUp({ x: 10500, y: 7500 });
    // anchored at the opposite corner, a 1.5x-from-center pull = 1.25x
    check("rotated corner drag commits a transform",
      journalR.length === 1 && journalR[0].op === "textTransform" &&
      Math.hypot(rotDoc.texts[0].matrix[0], rotDoc.texts[0].matrix[1]) > 1.2,
      JSON.stringify(journalR.map(function (o) { return o.op; })) + " scale=" +
      (rotDoc.texts[0] && Math.hypot(rotDoc.texts[0].matrix[0], rotDoc.texts[0].matrix[1])));

    // ---- bundled DejaVu fonts (fonts-builtin.js) ----
    check("builtin fonts registered",
      VB.textFonts.entries.length >= 10 &&
      !!VB.textFonts.find("DejaVu Sans") &&
      !!VB.textFonts.find("DejaVu Sans Bold") &&
      !!VB.textFonts.find("DejaVu Serif Italic") &&
      !!VB.textFonts.find("DejaVu Sans Mono"),
      "errors=[" + (VB.builtinFontErrors || []).join(" ; ") + "] labels=[" +
      VB.textFonts.entries.map(function (e) { return e.label; }).join(" | ") + "]");
    if (!VB.textFonts.find("DejaVu Sans")) return; // don't cascade
    var dj = await VB.textFonts.ensureParsed("DejaVu Sans");
    check("DejaVu Sans parses with style metadata",
      dj.family === "DejaVu Sans" && dj.unitsPerEm === 2048 &&
      dj.winAscent > 0 && dj.glyphIndex(65) > 0,
      dj.family + "/" + dj.subfamily + "/" + dj.unitsPerEm);
    check("legacy kern table survived subsetting",
      dj.kern(dj.glyphIndex(65), dj.glyphIndex(86)) < 0, // A·V
      dj.kern(dj.glyphIndex(65), dj.glyphIndex(86)));
    var djb = await VB.textFonts.ensureParsed("DejaVu Sans Bold");
    check("bold face is its own entry with style",
      djb.subfamily === "Bold" &&
      VB.textFonts.find("DejaVu Sans Bold").style === "Bold");
    var djOp = VB.buildTextOp(dj, { name: "DejaVu Sans" }, "Hello",
                              480, red, 1000, 1000);
    check("builtin font lays out text",
      djOp && djOp.records[0].glyphs.length === 5 &&
      djOp.records[0].glyphs[0].adv > 0 &&
      djOp.font.glyphs[0].contours.length > 0,
      djOp && JSON.stringify(djOp.records[0].glyphs.map(function (g) { return g.adv; })));
  })();

  // ======================= SWF export round-trip ===========================
  // The exporter's claim is 1:1: whatever the editor holds comes back
  // bit-identical through our own SWF reader (which is itself validated
  // against the MX 2004 reference files). Styles, stage, background and
  // the full edge-record multiset must survive the trip.
  log("swf export:");
  await (async function () {
    // A document drawn with the real tools.
    var doc = new VB.Y2KVectorDocument();
    doc.width = 11000; doc.height = 8000;
    VB.brushStroke(doc, [{ x: 2000, y: 4000 }, { x: 4200, y: 3400 }, { x: 6000, y: 4400 }],
      400, { r: 204, g: 102, b: 102, a: 255 });
    VB.pencilCommit(doc, [{ x: 1000, y: 1000 }, { x: 4000, y: 1400 }, { x: 8000, y: 900 }],
      { width: 40, color: { r: 0, g: 0, b: 0, a: 255 } });
    VB.brushStroke(doc, [{ x: 7000, y: 5500 }], 500, { r: 102, g: 204, b: 255, a: 255 });

    var bytes = VB.encodeSWF(doc);
    check("export produces a movie", bytes.length > 64, bytes.length + " B");
    check("FWS v7 header", bytes[0] === 0x46 && bytes[1] === 0x57 &&
      bytes[2] === 0x53 && bytes[3] === 7);
    var fileLen = bytes[4] | (bytes[5] << 8) | (bytes[6] << 16) | (bytes[7] << 24);
    check("header length field", fileLen === bytes.length, fileLen + " vs " + bytes.length);

    var back = await VB.parseSWF(bytes.buffer);
    var doc2 = back.doc;
    check("reimports through our reader", !!doc2 && doc2.edges.length > 0);
    check("stage round-trips", doc2.width === doc.width && doc2.height === doc.height);
    check("background round-trips", hexColor(doc2.background) === hexColor(doc.background));
    check("styles round-trip", doc2.fills.length === doc.fills.length &&
      doc2.lines.length === doc.lines.length,
      doc2.fills.length + "/" + doc2.lines.length + " vs " +
      doc.fills.length + "/" + doc.lines.length);
    var diff = sameStringArrays(edgeKeySet(doc), edgeKeySet(doc2));
    check("edge records round-trip 1:1", diff === null, diff);

    // Reference files survive load -> export -> reload unchanged.
    for (var xi = 0; xi < Math.min(3, window.VBTestFixtures.length); xi++) {
      var fx2 = window.VBTestFixtures[xi];
      var orig = (await VB.parseSWF(b64ToBuf(fx2.b64))).doc;
      var re = (await VB.parseSWF(VB.encodeSWF(orig).buffer)).doc;
      var d2 = sameStringArrays(edgeKeySet(orig), edgeKeySet(re));
      check("fixture " + fx2.name + " re-export 1:1", d2 === null, d2);
    }
  })();

  // ======================= fixture pipeline tests ==========================
  for (var fi = 0; fi < window.VBTestFixtures.length; fi++) {
    var fx = window.VBTestFixtures[fi];
    log(fx.name + ":");
    try {
      var buf = b64ToBuf(fx.b64);
      var t0 = performance.now();
      var res = await VB.parseSWF(buf);
      var parseMs = performance.now() - t0;
      var doc = res.doc;
      var s = doc.stats();
      var ex = fx.expected;

      check("stage width", doc.width === ex.widthTwips, doc.width + " vs " + ex.widthTwips);
      check("stage height", doc.height === ex.heightTwips, doc.height + " vs " + ex.heightTwips);
      check("background", hexColor(doc.background) === ex.bg, hexColor(doc.background) + " vs " + ex.bg);
      check("fill styles", s.fills === ex.fills, s.fills + " vs " + ex.fills);
      check("line styles", s.lines === ex.lines, s.lines + " vs " + ex.lines);
      check("straight edges", s.straight === ex.straight, s.straight + " vs " + ex.straight);
      check("curved edges", s.curved === ex.curved, s.curved + " vs " + ex.curved);

      // Flash-parity invariant: integer twips + valid style indices.
      var bad = doc.validate();
      check("integer-twips invariant", bad.length === 0, bad[0]);

      // Encoder stats must agree with the actual uncompressed encoding.
      var st = VB.y2kvectorStats(doc);
      check("stats edges match doc",
        st.straightEdges + st.curvedEdges >= s.edges,   // >= because oversized edges may split
        st.straightEdges + st.curvedEdges + " vs " + s.edges);

      // Fill/stroke tracing sanity: every fill style with edges must yield
      // at least one closed loop.
      var fillPaths = VB.buildFillPaths(doc);
      var openLoops = 0, loops = 0;
      for (var f = 1; f < fillPaths.length; f++) {
        for (var c = 0; c < fillPaths[f].length; c++) {
          loops++;
          if (!fillPaths[f][c].closed) openLoops++;
        }
      }
      check("fill loops close", openLoops === 0, openLoops + " of " + loops + " loops open");

      // VBD round-trip, uncompressed.
      var rawVbd = await VB.encodeY2KVector(doc, { compress: false });
      check("stats bytes match encoding", st.fileBytes === rawVbd.length,
        st.fileBytes + " vs " + rawVbd.length);
      var dec1 = await VB.decodeY2KVector(rawVbd);
      var diff1 = sameStringArrays(edgeKeySet(doc), edgeKeySet(dec1.doc));
      check("vbd roundtrip edges", diff1 === null, diff1);
      check("vbd roundtrip fills", JSON.stringify(doc.fills) === JSON.stringify(dec1.doc.fills));
      check("vbd roundtrip lines", JSON.stringify(doc.lines) === JSON.stringify(dec1.doc.lines));
      check("vbd roundtrip stage", dec1.doc.width === doc.width && dec1.doc.height === doc.height);

      // VBD round-trip, compressed.
      var zipVbd = await VB.encodeY2KVector(doc, { compress: true });
      var dec2 = await VB.decodeY2KVector(zipVbd);
      var diff2 = sameStringArrays(edgeKeySet(doc), edgeKeySet(dec2.doc));
      check("vbd compressed roundtrip", diff2 === null, diff2);

      log("  ok · parse " + parseMs.toFixed(1) + "ms · swf " + fx.b64.length * 3 / 4 +
          "B ≈ vbd " + rawVbd.length + "B raw / " + zipVbd.length + "B deflate", "pass");

      // Render for the screenshot pass.
      var cell = document.createElement("div");
      cell.className = "cell";
      var label = document.createElement("div");
      label.textContent = fx.name;
      var cv = document.createElement("canvas");
      var scale = 260 / (doc.width / VB.TWIPS);
      cv.width = 260;
      cv.height = Math.round(doc.height / VB.TWIPS * scale);
      cell.appendChild(label);
      cell.appendChild(cv);
      document.getElementById("grid").appendChild(cell);
      VB.render(cv.getContext("2d"), doc, { zoom: scale, panX: 0, panY: 0, dpr: 1 });
    } catch (err) {
      fail++;
      log("  EXCEPTION: " + (err && err.stack || err), "fail");
    }
  }

  // ================== visual: debug overlay + synthetic pencil ==============
  try {
    // Debug view over a real two-fill drawing (fill-side tick check).
    var fxB = window.VBTestFixtures.find(function (f) { return f.name.indexOf("Brush003") >= 0; });
    var resB = await VB.parseSWF(b64ToBuf(fxB.b64));
    var cellD = document.createElement("div");
    cellD.className = "cell";
    var labD = document.createElement("div");
    labD.textContent = "DEBUG VIEW: " + fxB.name;
    var cvD = document.createElement("canvas");
    var zD = 520 / (resB.doc.width / VB.TWIPS);
    cvD.width = 520;
    cvD.height = Math.round(resB.doc.height / VB.TWIPS * zD);
    cellD.appendChild(labD);
    cellD.appendChild(cvD);
    document.getElementById("grid").appendChild(cellD);
    var ctxD = cvD.getContext("2d");
    VB.render(ctxD, resB.doc, { zoom: zD, panX: 0, panY: 0, dpr: 1 });
    VB.renderDebug(ctxD, resB.doc, { zoom: zD, panX: 0, panY: 0, dpr: 1 }, -1);

    // Synthetic pencil drawing: wavy stroke + crossing stroke over a square.
    var docP = new VB.Y2KVectorDocument();
    docP.width = 8000; docP.height = 6000;
    docP.fills.push(VB.solidFill(120, 200, 255));
    docP.edges.push(
      VB.edge(1000, 1000, null, null, 5000, 1000, 0, 1, 0),
      VB.edge(5000, 1000, null, null, 5000, 5000, 0, 1, 0),
      VB.edge(5000, 5000, null, null, 1000, 5000, 0, 1, 0),
      VB.edge(1000, 5000, null, null, 1000, 1000, 0, 1, 0));
    var wave = [];
    for (var wv = 0; wv <= 60; wv++) {
      wave.push({ x: 200 + wv * 125, y: 3000 + Math.round(1800 * Math.sin(wv / 6)) });
    }
    VB.pencilCommit(docP, wave, { width: 40, color: { r: 200, g: 40, b: 40, a: 255 } });
    var cellP = document.createElement("div");
    cellP.className = "cell";
    var labP = document.createElement("div");
    labP.textContent = "SYNTHETIC PENCIL over fill (+debug)";
    var cvP = document.createElement("canvas");
    cvP.width = 520; cvP.height = 390;
    cellP.appendChild(labP);
    cellP.appendChild(cvP);
    document.getElementById("grid").appendChild(cellP);
    var vP = { zoom: 520 / 400, panX: 0, panY: 0, dpr: 1 };
    VB.render(cvP.getContext("2d"), docP, vP);
    VB.renderDebug(cvP.getContext("2d"), docP, vP, -1);

    // sanity: the wave was merged into the square's planar map
    var waveInside = docP.edges.filter(function (e) { return e.line === 1 && e.fill0 === 1; }).length;
    check("wave inherits fill inside square", waveInside > 0, "0 inside pieces");
    check("wave split against square", docP.edges.length > 4 + 8, docP.edges.length + " edges");
  } catch (err) {
    fail++;
    log("  VISUAL EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // ================================ boards ====================================
  // Storyboards: beats → panels (y2kvector cells, durations, attached
  // Story line ids). Line flow is two-way — a panel edit of a line IS
  // the Story blockEdit op. The animatic order/length are pure model.
  log("");
  log("boards:");
  try {
    var dse = new VB.Session({ width: 11000, height: 8000 });
    // a Story line to attach
    dse.exec({ op: "writingDocAdd", id: "bwd" });
    dse.exec({ op: "blockAdd", doc: "bwd", id: "bline", kind: "line",
               character: "MIRA", text: "We jump on three." });
    dse.exec({ op: "beatAdd", id: "bt1" });
    dse.exec({ op: "beatAdd", id: "bt2", name: "The Jump" });
    dse.exec({ op: "panelAdd", beat: "bt1", id: "pn1" });
    dse.exec({ op: "panelAdd", beat: "bt1", id: "pn2" });
    dse.exec({ op: "panelAdd", beat: "bt2", id: "pn3", duration: 48 });
    check("beats and panels land in order",
      dse.project.boards.beats.length === 2 &&
      dse.project.boards.beats[0].panels.length === 2 &&
      dse.project.boards.beats[1].name === "The Jump" &&
      VB.boardsFlatten(dse.project).map(function (e) {
        return e.panel.id; }).join(",") === "pn1,pn2,pn3" &&
      VB.boardsTotalFrames(dse.project) === 24 + 24 + 48,
      VB.boardsTotalFrames(dse.project) + " frames");
    dse.exec({ op: "panelDuration", id: "pn2", frames: 12 });
    check("durations clamp and apply",
      VB.boardsPanelById(dse.project, "pn2").panel.duration === 12 &&
      VB.boardsTotalFrames(dse.project) === 24 + 12 + 48);
    dse.exec({ op: "panelCaption", id: "pn1",
               text: "Mira leans over the edge." });
    check("panel captions journal (the deck's bottom text field)",
      VB.boardsPanelById(dse.project, "pn1").panel.caption ===
      "Mira leans over the edge.");
    dse.exec({ op: "panelLineAttach", panel: "pn1", line: "bline" });
    dse.exec({ op: "panelLineAttach", panel: "pn1", line: "bline" }); // dedupe
    check("lines attach once by id",
      VB.boardsPanelById(dse.project, "pn1").panel.lines.join(",") === "bline");
    // two-way edit: the panel-side edit is the Story blockEdit op
    dse.exec({ op: "blockEdit", doc: "bwd", block: "bline",
               lang: "default", text: "We jump NOW." });
    check("panel-side line edits change the Story doc",
      VB.lineTextOf(VB.lineById(dse.project, "bline").block) === "We jump NOW.");
    dse.exec({ op: "editTargetSet", target: { boardPanel: "pn3" } });
    check("board panel edit target retargets the active cell",
      dse.project.activeCell() ===
      VB.boardsPanelById(dse.project, "pn3").panel.cell &&
      dse.project.resolveEditCell().label === "The Jump ▸ panel 1");
    dse.exec({ op: "pencil",
               points: [{ x: 2000, y: 5000 }, { x: 15000, y: 5400 }],
               style: { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } } });
    dse.exec({ op: "editTargetClear" });
    check("panel ink lands in the panel cell",
      VB.boardsPanelById(dse.project, "pn3").panel.cell.edges.length > 0 &&
      VB.boardsPanelById(dse.project, "pn1").panel.cell.edges.length === 0);
    dse.exec({ op: "panelMove", id: "pn2", index: 0, beat: "bt2" });
    check("panels move across beats",
      dse.project.boards.beats[0].panels.length === 1 &&
      dse.project.boards.beats[1].panels.map(function (p) {
        return p.id; }).join(",") === "pn2,pn3");
    var dRep = await VB.replayJournal(JSON.parse(JSON.stringify(dse.journal)));
    check("boards replay byte-exact",
      JSON.stringify(dRep.project.boards.beats.map(function (bt) {
        return [bt.id, bt.name, bt.panels.map(function (p) {

  // ============================ brainstorm board =============================
  // Thin UI, real model: note items are journaled ops with caller ids;

  // copy-on-write so history shares image data by reference.
  log("");
  log("brainstorm:");
  try {
    var bse = new VB.Session({ width: 11000, height: 8000 });
    var IMG = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAA" +
              "fFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==";
    bse.exec({ op: "noteAdd", id: "n1", kind: "text",

    bse.exec({ op: "noteAdd", id: "n2", kind: "image",
               x: 400, y: 60, w: 320, h: 240, content: IMG });
    bse.exec({ op: "noteAdd", id: "n3", kind: "sketch",

      VB.noteById(bse.project, "n2").item.content === IMG);
    bse.exec({ op: "noteEdit", id: "n1", content: "hero has TWO hats" });
    bse.exec({ op: "noteInk", id: "n3", stroke: {

    bse.exec({ op: "noteInk", id: "n3", stroke: {
      color: "#222", width: 2, pts: [{ x: 30, y: 100 }, { x: 90, y: 120 }] } });

      VB.noteById(bse.project, "n3").item.content.strokes.length === 2 &&
      bItems[bItems.length - 1].id === "n1" &&
      VB.noteById(bse.project, "n1").item.x === 500 &&
      VB.noteById(bse.project, "n2").item.w === 200,
      bItems.map(function (i) { return i.id; }).join(","));

    var bRep = await VB.replayJournal(JSON.parse(JSON.stringify(bse.journal)));
    check("the board replays byte-exact",
      JSON.stringify(bRep.project.notes) === JSON.stringify(bse.project.notes));

    var inkBefore = VB.noteById(bse.project, "n3").item.content.strokes.length;
    bse.exec({ op: "noteInk", id: "n3", stroke: {
      color: "#222", width: 2, pts: [{ x: 1, y: 1 }, { x: 2, y: 2 }] } });
    bse.exec({ op: "undo" }); // journaled — replay must see the undo too

    bse.exec({ op: "noteRemove", id: "n2" });
    check("noteRemove drops the item",

    bse.exec({ op: "undo" }); // journaled — replay must see the undo too
    check("undo restores the removed image note",
      VB.noteById(bse.project, "n2") &&
      VB.noteById(bse.project, "n2").item.content === IMG);

    // group ops: one undo step, group-to-front preserving order

    var bOrder = bse.project.notes.items.map(function (i) { return i.id; });
    check("noteMoveMany moves the group to front in listed order",

      VB.noteById(bse.project, "n2").item.x === 700 &&
      bOrder[bOrder.length - 2] === "n3" && bOrder[bOrder.length - 1] === "n2",
      bOrder.join(","));
    bse.exec({ op: "noteRemoveMany", ids: ["n2", "n3"] });
    check("noteRemoveMany drops the group",
      bse.project.notes.items.length === 1);
    bse.exec({ op: "undo" }); // journaled — replay must see the undo too
    check("group removal is one undo step",
      bse.project.notes.items.length === 3);

    bse.exec({ op: "editTargetSet", target: { notes: true } });
    check("notes edit target retargets the active cell",
      bse.project.activeCell() === bse.project.notes.canvas);
    bse.exec({ op: "brush",
               points: [{ x: 4000, y: 4000 }, { x: 9000, y: 4400 }],

      bse.project.notes.canvas.edges.length + " edges");
    var bRep2 = await VB.replayJournal(JSON.parse(JSON.stringify(bse.journal)));
    check("board ink replays byte-exact",
      JSON.stringify(bRep2.project.notes.canvas.edges) ===
      JSON.stringify(bse.project.notes.canvas.edges) &&
      JSON.stringify(bRep2.project.notes.items) ===
      JSON.stringify(bse.project.notes.items));
    var inkEdges = bse.project.notes.canvas.edges.length;
    bse.exec({ op: "undo" }); // journaled — replay must see the undo too // undoes the pencil on the board canvas
    check("board ink undoes through project history",
      bse.project.notes.canvas.edges.length < inkEdges);
  } catch (err) {
    fail++;
    log("  BRAINSTORM EXCEPTION: " + (err && err.stack || err), "fail");
  }

  // ============================ frames (step 3) ==============================
  // Sequence/Roughs beat 1: a layer's frames[] is its sub-timeline,
  // cur.frame the shared playhead. Frame ops journal like layer ops;
  // shorter layers HOLD their last frame at any playhead (Flash).
  log("");
  log("frames:");
  try {
    var fse = new VB.Session({ width: 11000, height: 8000 });
    fse.exec({ op: "pencil",
               points: [{ x: 1000, y: 1000 }, { x: 5000, y: 1200 }],
               style: { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } } });
    var f0edges = fse.project.activeCell().edges.length;
    fse.exec({ op: "frameAdd", layer: 0 });
    check("frameAdd appends a blank frame and moves the playhead",
      fse.project.cur.frame === 1 && fse.project.frameCount() === 2 &&
      fse.project.activeCell().edges.length === 0,
      "frame " + fse.project.cur.frame + ", " +
      fse.project.activeCell().edges.length + " edges");
    fse.exec({ op: "brush",

  // ============================== Actors =====================================

  // tree as journaled ops (ids carried IN the op — live and replay build

  // applies to, and the .y2kactor interchange (ids regenerate on import).
  log("");
  log("actors:");
  try {
    var ase = new VB.Session({ width: 11000, height: 8000 });
    ase.exec({ op: "actorAdd", id: "actor_t1", poseId: "pose_t1" });
    ase.exec({ op: "actorAdd", id: "actor_t2", poseId: "pose_t2",

    var pupils = VB.actorFindSymbol(aT1, "sym_pupils");
    check("symbols nest and drawings accumulate",
      aT1.poses.length === 2 &&
      VB.actorFindSymbol(aT1, "sym_eyes").symbol.symbols.length === 1 &&
      pupils.symbol.drawings.length === 2 &&
      pupils.symbol.cur.drawing === 0 &&
      pupils.symbol.drawings[1].name === "drawing_02",
      JSON.stringify(pupils && pupils.symbol.cur));

    // art in an actor cell: the SAME planar-map pipeline
    var pupilCell = pupils.symbol.drawings[0].cell;
    VB.pencilCommit(pupilCell, [{ x: 1000, y: 1000 }, { x: 6000, y: 1400 }],
                    { width: 20, color: { r: 0, g: 0, b: 0, a: 255 } });
    VB.brushStroke(pupilCell, [{ x: 2000, y: 3000 }, { x: 6000, y: 3300 }],
                   300, { r: 220, g: 40, b: 40, a: 255 });
    check("actor drawing cells take real geometry",
      pupilCell.edges.length > 0 && VB.integrityReport(pupilCell).length === 0,
      pupilCell.edges.length + " edges");

    var aRep = await VB.replayJournal(JSON.parse(JSON.stringify(
      ase.journal.filter(function (o) { return o.op !== "load"; }))));
    var stripCells = function (plain) {
      var noCells = JSON.parse(JSON.stringify(plain));
      (function strip(o) {
        if (o && typeof o === "object") {
          if (o.cell) o.cell = "CELL";
          Object.keys(o).forEach(function (k) { strip(o[k]); });
        }
      })(noCells);
      return JSON.stringify(noCells);

    check("actor structure replays identically",
      stripCells(aRep.project.actors.map(VB.actorToPlain)) ===
      stripCells(ase.project.actors.map(VB.actorToPlain)));

    ase.exec({ op: "actorRemove", actor: "actor_t1" });
    check("actorRemove drops the actor", ase.project.actors.length === 1);
    ase.history.undo();
    check("undo restores the actor tree (cells included)",
